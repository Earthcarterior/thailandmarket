<!DOCTYPE html>
<html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ตั้งค่าระบบ — Thailand Market</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--accent:#E63329;--g100:#F5F5F5;--g200:#E5E5E5;--g500:#737373;--g700:#404040}
body{font-family:'IBM Plex Sans Thai','Inter',sans-serif;background:#FAFAFA;color:#0A0A0A;font-size:13px}
.nav{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--g200);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;z-index:100}
.back{padding:6px 12px;background:#fff;border:1px solid var(--g200);border-radius:4px;text-decoration:none;color:var(--g700);font-size:12px}
.logo{font-family:'Inter';font-weight:800;font-size:16px;text-decoration:none;color:#0A0A0A}.logo .dot{color:var(--accent)}
.main{padding:24px;max-width:1280px;margin:0 auto}
h1{font-size:22px;font-weight:700;margin-bottom:6px}
.sub{font-size:13px;color:var(--g500);margin-bottom:20px}
.card{background:#fff;border:1px solid var(--g200);border-radius:6px;overflow:hidden}
.card-head{padding:14px 18px;border-bottom:1px solid var(--g200);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.tabs{display:flex;gap:4px;flex-wrap:wrap}
.tab{padding:6px 12px;background:#fff;border:1px solid var(--g200);border-radius:99px;cursor:pointer;font-size:11px;color:var(--g700);font-family:inherit}
.tab.on{background:#0A0A0A;color:#fff;border-color:#0A0A0A}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:18px}
.stat{background:#fff;border:1px solid var(--g200);border-radius:6px;padding:14px}
.stat-lbl{font-size:10px;color:#A3A3A3;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;font-weight:600}
.stat-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:700}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--g100);padding:10px 12px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;color:var(--g700)}
td{padding:10px 12px;border-bottom:1px solid #F0F0F0}
.btn{padding:6px 12px;border-radius:4px;font-size:11px;cursor:pointer;border:1px solid var(--g200);background:#fff;color:var(--g700);font-family:inherit}
.btn-ok{border-color:#10B981;color:#10B981}
.btn-danger{border-color:#EF4444;color:#EF4444}
.btn-primary{background:#E63329;color:#fff;border-color:#E63329}
.btn-dark{background:#0A0A0A;color:#fff;border-color:#0A0A0A}
.empty{padding:60px;text-align:center;color:#A3A3A3}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0A0A0A;color:#fff;padding:12px 24px;border-radius:6px;z-index:9999;font-size:13px;display:none}
.toast.on{display:block}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal.on{display:flex}
.modal-body{background:#fff;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;border-radius:8px;padding:24px}
.modal-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:#A3A3A3}
.fg{margin-bottom:12px}
.lbl{font-size:10px;color:var(--g700);margin-bottom:5px;font-weight:600;text-transform:uppercase;display:block}
.inp,.sel,.txt{width:100%;padding:9px 12px;border:1px solid var(--g200);border-radius:4px;font-size:13px;background:#fff;font-family:inherit}
.txt{min-height:80px;resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:500}
</style></head>
<body>
<nav class="nav">
<a href="admin-cms.html" class="back">← กลับ Admin</a>
<a href="index.html" class="logo">Thailand<span class="dot">.</span>Market</a>
<a href="profile.html" class="back">โปรไฟล์</a>
</nav>
<main class="main">
<h1>⚙️ ตั้งค่าระบบ</h1>
<div class="sub">การตั้งค่าหลักของ marketplace</div>
<div class="card" style="padding:24px;margin-bottom:18px"><h3 style="font-size:14px;margin-bottom:14px">💰 ค่าธรรมเนียม</h3>
<div class="row2"><div class="fg"><label class="lbl">GP Fee (%)</label><input class="inp" type="number" step="0.1" id="gp_fee" value="5"></div><div class="fg"><label class="lbl">Payment Fee (%)</label><input class="inp" type="number" step="0.1" id="pay_fee" value="3"></div></div>
<div class="row2"><div class="fg"><label class="lbl">Payout Fee (฿)</label><input class="inp" type="number" id="payout_fee" value="20"></div><div class="fg"><label class="lbl">Min Payout (฿)</label><input class="inp" type="number" id="min_payout" value="500"></div></div></div>
<div class="card" style="padding:24px;margin-bottom:18px"><h3 style="font-size:14px;margin-bottom:14px">🚚 ค่าจัดส่ง</h3>
<div class="row2"><div class="fg"><label class="lbl">Free shipping (฿)</label><input class="inp" type="number" id="free_ship" value="500"></div><div class="fg"><label class="lbl">COD fee (฿)</label><input class="inp" type="number" id="cod_fee" value="20"></div></div></div>
<div style="display:flex;gap:8px"><button class="btn btn-primary" onclick="save()">💾 บันทึก</button><button class="btn" onclick="load()">↻ โหลดใหม่</button></div>
</main>
<div class="toast" id="toast"></div>
<script>
const _sb = window.supabase.createClient('https://qmgyimsptzewwyafvjzk.supabase.co', 'PLACEHOLDER_ANON_KEY');
function esc(s){return(s==null?'':String(s)).replace(/[&<>"\']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmt(n){return'฿'+Number(n||0).toLocaleString('th-TH');}
function toast(m,k){const t=document.getElementById('toast');t.textContent=m;t.style.background=k==='ok'?'#10B981':k==='err'?'#E63329':'#0A0A0A';t.classList.add('on');setTimeout(()=>t.classList.remove('on'),3500);}
function time(d){if(!d)return'';const n=(Date.now()-new Date(d).getTime())/1000;if(n<3600)return Math.floor(n/60)+'น.';if(n<86400)return Math.floor(n/3600)+'ชม.';return new Date(d).toLocaleDateString('th-TH');}
function statBadge(s){const M={pending:['#FEF3C7','#92400E','⏳'],active:['#D1FAE5','#065F46','✓'],approved:['#D1FAE5','#065F46','✓'],rejected:['#FEE2E2','#991B1B','✕'],completed:['#D1FAE5','#065F46','✅']};const x=M[s]||['#E5E5E5','#525252',s||'—'];return`<span class="badge" style="background:${x[0]};color:${x[1]}">${x[2]}</span>`;}
async function checkAdmin(){const{data:{user}}=await _sb.auth.getUser();if(!user){location.href='login.html?next='+encodeURIComponent(location.pathname);return null;}const{data:u}=await _sb.from('users').select('*').eq('email',user.email).maybeSingle();if(!u||!['admin','super_admin'].includes(u.role)){toast('❌ ต้องเป็น Admin','err');setTimeout(()=>location.href='index.html',1500);return null;}return u;}
async function load(){try{const{data}=await _sb.from('app_settings').select('*').limit(1).maybeSingle();if(data){document.getElementById('gp_fee').value=data.gp_fee||5;document.getElementById('pay_fee').value=data.payment_fee||3;document.getElementById('payout_fee').value=data.payout_fee||20;document.getElementById('min_payout').value=data.min_payout||500;document.getElementById('free_ship').value=data.free_shipping_threshold||500;document.getElementById('cod_fee').value=data.cod_fee||20;}}catch(e){console.warn(e);}}
async function save(){try{const p={gp_fee:parseFloat(document.getElementById('gp_fee').value),payment_fee:parseFloat(document.getElementById('pay_fee').value),payout_fee:parseFloat(document.getElementById('payout_fee').value),min_payout:parseFloat(document.getElementById('min_payout').value),free_shipping_threshold:parseFloat(document.getElementById('free_ship').value),cod_fee:parseFloat(document.getElementById('cod_fee').value),updated_at:new Date().toISOString()};const{data:e}=await _sb.from('app_settings').select('id').limit(1).maybeSingle();if(e){await _sb.from('app_settings').update(p).eq('id',e.id);}else{await _sb.from('app_settings').insert(p);}toast('✅ บันทึก','ok');}catch(e){toast('❌ '+e.message+' (table app_settings)','err');}}
(async()=>{if(await checkAdmin())load();})();
</script>
</body></html>
