<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ลืมรหัสผ่าน — Thailand Market</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=DM+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--accent:#E63329;--g100:#F5F5F5;--g200:#E5E5E5;--g500:#737373;--g700:#404040;--mono:'DM Mono',monospace}
body{font-family:'IBM Plex Sans Thai','Inter',sans-serif;background:#FAFAFA;color:#0A0A0A;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border:1px solid var(--g200);border-radius:8px;padding:40px;max-width:420px;width:100%}
.logo{font-family:'Inter';font-weight:800;font-size:24px;text-align:center;margin-bottom:8px}
.logo .dot{color:var(--accent)}
.subtitle{text-align:center;font-size:13px;color:var(--g500);margin-bottom:28px}
.fg{margin-bottom:14px}
.lbl{font-size:11px;color:var(--g700);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;display:block}
.inp{width:100%;padding:11px 14px;border:1px solid var(--g200);border-radius:4px;font-family:inherit;font-size:14px}
.inp:focus{outline:none;border-color:#0A0A0A}
.btn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:4px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px}
.btn:hover{background:#B5261F}
.btn:disabled{opacity:.5}
.foot{text-align:center;margin-top:20px;font-size:13px;color:var(--g500)}
.foot a{color:var(--accent);text-decoration:none;font-weight:500}
.err{font-size:11px;color:var(--accent);margin-top:4px;text-align:center;display:none}
.err.on{display:block}
.success-icon{font-size:60px;text-align:center;margin-bottom:14px}
.step{display:none}
.step.on{display:block}
.otp-box{display:flex;gap:8px;justify-content:center;margin:24px 0}
.otp-inp{width:48px;height:56px;text-align:center;font-size:22px;font-family:var(--mono);font-weight:700;border:2px solid var(--g200);border-radius:6px;background:#fff}
.otp-inp:focus{outline:none;border-color:var(--accent);background:#FEF2F2}
</style>
</head>
<body>
<div class="card">
<div class="logo">Thailand<span class="dot">.</span>Market</div>
<div class="subtitle" id="subtitle">รีเซ็ตรหัสผ่าน</div>

<!-- STEP 1: ใส่อีเมล -->
<div class="step on" id="step-email">
  <p style="font-size:13px;color:var(--g500);margin-bottom:14px">
    ใส่อีเมลที่สมัครไว้ เราจะส่ง OTP ไปให้
  </p>
  <div class="fg"><label class="lbl">อีเมล</label>
    <input class="inp" id="email" type="email" placeholder="your@email.com" autocomplete="email">
  </div>
  <button class="btn" id="btn-send" onclick="sendReset()">📧 ส่งรหัสรีเซ็ต</button>
  <div class="err" id="err-email"></div>

  <div class="foot">
    จำได้แล้ว? <a href="login.html">เข้าสู่ระบบ</a>
  </div>
</div>

<!-- STEP 2: ใส่ OTP + รหัสใหม่ -->
<div class="step" id="step-reset">
  <div class="success-icon">📬</div>
  <p style="text-align:center;font-size:13px;color:var(--g500);margin-bottom:6px">ส่งรหัสไปที่</p>
  <p style="text-align:center;font-family:var(--mono);font-weight:600;margin-bottom:18px" id="show-email"></p>

  <div class="fg"><label class="lbl">OTP 6 หลัก</label>
    <div style="margin:8px 0 16px">
      <input class="inp" id="otp-single" inputmode="numeric" autocomplete="one-time-code"
        style="text-align:center;font-family:var(--mono);font-size:24px;letter-spacing:6px;font-weight:700;padding:14px"
        placeholder="------"
        maxlength="10">
      <div style="text-align:center;margin-top:8px;font-size:11px;color:var(--g500)">💡 รองรับ 6 หรือ 8 หลัก</div>
    </div>
  </div>

  <div class="fg"><label class="lbl">รหัสผ่านใหม่ (≥ 8 ตัว)</label>
    <input class="inp" id="new-pwd" type="password" placeholder="••••••••" autocomplete="new-password">
  </div>

  <div class="fg"><label class="lbl">ยืนยันรหัสผ่านใหม่</label>
    <input class="inp" id="new-pwd2" type="password" placeholder="••••••••" autocomplete="new-password">
  </div>

  <button class="btn" id="btn-reset" onclick="doReset()">✓ รีเซ็ตรหัสผ่าน</button>
  <div class="err" id="err-reset"></div>

  <div class="foot">
    <a onclick="backToEmail()" style="cursor:pointer">← เปลี่ยนอีเมล</a>
  </div>
</div>

<!-- STEP 3: สำเร็จ -->
<div class="step" id="step-done">
  <div class="success-icon">✅</div>
  <div style="text-align:center;font-size:18px;font-weight:700;margin-bottom:8px">รีเซ็ตรหัสผ่านสำเร็จ!</div>
  <div style="text-align:center;color:var(--g500);font-size:13px;margin-bottom:20px">ลองเข้าสู่ระบบด้วยรหัสใหม่ได้เลย</div>
  <a class="btn" href="login.html" style="display:block;text-decoration:none;text-align:center">เข้าสู่ระบบ →</a>
</div>
</div>

<script>
const _sb = window.supabase.createClient('https://qmgyimsptzewwyafvjzk.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtZ3lpbXNwdHpld3d5YWZ2anprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NjA4NDIsImV4cCI6MjA5MzAzNjg0Mn0.pcexjwmQndb_RhZHfKVZ6m2_21sn09iNAMyESjLOVJ0');
let _email = '';

function showErr(id, m){const el=document.getElementById('err-'+id);if(el){el.textContent=m;el.classList.add('on');}}
function clearErr(id){document.getElementById('err-'+id)?.classList.remove('on');}

function goStep(name){
  document.querySelectorAll('.step').forEach(s => s.classList.remove('on'));
  document.getElementById('step-'+name).classList.add('on');
}

async function sendReset(){
  clearErr('email');
  _email = document.getElementById('email').value.trim().toLowerCase();
  if (!_email.match(/^\S+@\S+\.\S+$/)) { showErr('email', '⚠️ อีเมลไม่ถูกต้อง'); return; }

  const btn = document.getElementById('btn-send');
  btn.disabled = true;
  btn.textContent = '⏳ กำลังส่ง...';

  try {
    // ใช้ signInWithOtp ที่ shouldCreateUser: false → ส่ง OTP ให้ user ที่มีอยู่
    const { error } = await _sb.auth.signInWithOtp({
      email: _email,
      options: { shouldCreateUser: false }
    });
    if (error) throw error;

    document.getElementById('show-email').textContent = _email;
    goStep('reset');
    setTimeout(() => { const i=document.getElementById('otp-single'); if(i) i.focus(); }, 200);
    btn.disabled = false;
    btn.textContent = '📧 ส่งรหัสรีเซ็ต';
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '📧 ส่งรหัสรีเซ็ต';
    const msg = (e && (e.message || e.msg || e.error_description || e.error)) || '';
    if (msg.includes('signups not allowed') || msg.includes('not found')) {
      showErr('email', '❌ ไม่พบบัญชีนี้ — กรุณาสมัครก่อน');
    } else if (msg.includes('sending') || msg.includes('magic link') || msg.includes('email') || (e && e.status === 500) || (e && e.code === 500)) {
      showErr('email', '❌ ระบบส่งอีเมลขัดข้องชั่วคราว กรุณาลองใหม่ในอีกครู่ (ถ้ายังไม่ได้ ติดต่อผู้ดูแลระบบ)');
    } else if (msg.includes('rate') || msg.includes('limit') || msg.includes('too many')) {
      showErr('email', '❌ ขอรหัสบ่อยเกินไป กรุณารอสักครู่แล้วลองใหม่');
    } else {
      showErr('email', '❌ ' + (msg || 'ส่งไม่สำเร็จ กรุณาลองใหม่'));
    }
  }
}

function otpInput(el, idx){
  el.value = el.value.replace(/\D/g, '');
  if (el.value && idx < 6) document.getElementById('otp-' + (idx+1)).focus();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Backspace' && e.target.classList?.contains('otp-inp')) {
    if (!e.target.value) {
      const idx = parseInt(e.target.id.split('-')[1]);
      if (idx > 1) document.getElementById('otp-' + (idx-1)).focus();
    }
  }
});

async function doReset(){
  clearErr('reset');
  const inp = document.getElementById('otp-single');
  const otp = (inp ? inp.value : '').replace(/[^0-9]/g, '').trim();
  const pwd = document.getElementById('new-pwd').value;
  const pwd2 = document.getElementById('new-pwd2').value;

  if (otp.length !== 6 && otp.length !== 8) { showErr('reset', '⚠️ OTP 6 หรือ 8 หลัก'); return; }
  if (pwd.length < 8) { showErr('reset', '⚠️ รหัสต้อง ≥ 8 ตัว'); return; }
  if (pwd !== pwd2) { showErr('reset', '⚠️ รหัสไม่ตรงกัน'); return; }
  if (!/\d/.test(pwd) || !/[a-zA-Z]/.test(pwd)) { showErr('reset', '⚠️ ต้องมีตัวเลข+ตัวอักษร'); return; }

  const btn = document.getElementById('btn-reset');
  btn.disabled = true;
  btn.textContent = '⏳ กำลังรีเซ็ต...';

  try {
    // 1. Verify OTP เพื่อ login
    const { error: e1 } = await _sb.auth.verifyOtp({
      email: _email,
      token: otp,
      type: 'email'
    });
    if (e1) throw e1;

    // 2. ตอนนี้ login แล้ว — update password
    const { error: e2 } = await _sb.auth.updateUser({ password: pwd });
    if (e2) throw e2;

    // 3. Logout ให้ user login ใหม่
    await _sb.auth.signOut();

    goStep('done');
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '✓ รีเซ็ตรหัสผ่าน';
    showErr('reset', '❌ ' + (e.message.includes('expired') ? 'OTP หมดอายุ — ขอใหม่' : e.message.includes('Invalid') ? 'OTP ไม่ถูกต้อง' : e.message));
  }
}

function backToEmail(){ goStep('email'); }

document.getElementById('email')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') sendReset();
});
</script>
</body>
</html>
