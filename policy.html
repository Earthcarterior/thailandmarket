<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>นโยบาย — Thailand Market</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=DM+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--accent:#E63329;--g100:#F5F5F5;--g200:#E5E5E5;--g400:#A3A3A3;--g500:#737373;--g700:#404040;--mono:'DM Mono',monospace}
body{font-family:'IBM Plex Sans Thai','Inter',sans-serif;background:#FAFAFA;color:#0A0A0A;line-height:1.6}
.nav{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--g200);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;z-index:100;gap:12px;flex-wrap:wrap}
.logo{font-family:'Inter';font-weight:800;font-size:18px;text-decoration:none;color:#0A0A0A}.logo .dot{color:var(--accent)}
.back{padding:6px 12px;background:#fff;border:1px solid var(--g200);border-radius:4px;text-decoration:none;color:var(--g700);font-size:12px;cursor:pointer}
.back:hover{background:var(--g100)}

.layout{max-width:1100px;margin:0 auto;padding:24px 16px;display:grid;grid-template-columns:240px 1fr;gap:24px}
.sidebar{position:sticky;top:90px;align-self:start;background:#fff;border:1px solid var(--g200);border-radius:8px;padding:14px;height:fit-content}
.sb-title{font-size:11px;font-weight:600;color:var(--g500);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--g100)}
.sb-item{display:block;padding:9px 12px;color:var(--g700);text-decoration:none;font-size:13px;border-radius:6px;margin-bottom:2px;cursor:pointer;font-family:inherit;border:none;background:none;width:100%;text-align:left}
.sb-item:hover{background:var(--g100);color:#0A0A0A}
.sb-item.active{background:#FEF2F2;color:var(--accent);font-weight:600}

.content{background:#fff;border:1px solid var(--g200);border-radius:8px;padding:32px;min-height:60vh}
.content h1{font-size:26px;font-weight:700;margin-bottom:6px}
.meta{font-size:12px;color:var(--g500);margin-bottom:22px;display:flex;gap:14px;flex-wrap:wrap;padding-bottom:14px;border-bottom:1px solid var(--g100)}
.meta span{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono)}

.markdown{font-size:14px;color:var(--g700)}
.markdown h1{font-size:22px;margin:24px 0 10px;color:#0A0A0A;border-bottom:2px solid var(--g200);padding-bottom:6px}
.markdown h1:first-child{margin-top:0}
.markdown h2{font-size:17px;margin:20px 0 8px;color:#0A0A0A;font-weight:600}
.markdown h3{font-size:15px;margin:14px 0 6px;color:var(--g700);font-weight:600}
.markdown p{margin-bottom:12px}
.markdown ul,.markdown ol{margin-left:20px;margin-bottom:12px}
.markdown li{margin-bottom:4px}
.markdown strong{color:#0A0A0A;font-weight:600}
.markdown em{font-style:italic;color:var(--accent)}
.markdown hr{margin:20px 0;border:none;border-top:1px solid var(--g200)}
.markdown code{background:var(--g100);padding:1px 6px;border-radius:3px;font-family:var(--mono);font-size:12px}

.empty{text-align:center;padding:60px 20px;color:var(--g500)}
.empty-ico{font-size:50px;margin-bottom:14px;opacity:.6}
.loading{padding:40px;text-align:center;color:var(--g500)}
.spinner{display:inline-block;width:22px;height:22px;border:2px solid var(--g200);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:720px){
  .layout{grid-template-columns:1fr;padding:16px 12px}
  .sidebar{position:static;margin-bottom:14px}
  .content{padding:22px}
}
</style>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="back">← หน้าแรก</a>
  <a href="index.html" class="logo">Thailand<span class="dot">.</span>Market</a>
  <a href="profile.html" class="back">โปรไฟล์</a>
</nav>

<div class="layout">
  <aside class="sidebar">
    <div class="sb-title">📋 นโยบายและข้อกำหนด</div>
    <div id="sidebar-list">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </aside>
  
  <main class="content" id="content">
    <div class="loading"><div class="spinner"></div><div>กำลังโหลด...</div></div>
  </main>
</div>

<script>
const _sb = window.supabase.createClient(
  'https://qmgyimsptzewwyafvjzk.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtZ3lpbXNwdHpld3d5YWZ2anprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NjA4NDIsImV4cCI6MjA5MzAzNjg0Mn0.pcexjwmQndb_RhZHfKVZ6m2_21sn09iNAMyESjLOVJ0'
);

let _docs = [];

function esc(s){return(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function md2html(text){
  if (!text) return '';
  let h = esc(text);
  h = h.replace(/^### (.*$)/gm, '<h3>$1</h3>');
  h = h.replace(/^## (.*$)/gm, '<h2>$1</h2>');
  h = h.replace(/^# (.*$)/gm, '<h1>$1</h1>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
  h = h.replace(/`(.+?)`/g, '<code>$1</code>');
  h = h.replace(/^---$/gm, '<hr>');
  // Lists
  const lines = h.split('\n');
  let result = [];
  let inUl = false;
  for (let line of lines) {
    if (/^[\-\*] /.test(line)) {
      if (!inUl) { result.push('<ul>'); inUl = true; }
      result.push('<li>' + line.replace(/^[\-\*] /, '') + '</li>');
    } else {
      if (inUl) { result.push('</ul>'); inUl = false; }
      if (line.trim() && !line.startsWith('<h') && !line.startsWith('<hr')) {
        result.push('<p>' + line + '</p>');
      } else {
        result.push(line);
      }
    }
  }
  if (inUl) result.push('</ul>');
  return result.join('\n');
}

function fmtDate(d){
  if (!d) return '';
  return new Date(d).toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
}

async function loadDocs(){
  try {
    const { data, error } = await _sb.rpc('list_legal_documents');
    if (error) throw error;
    _docs = data || [];
    renderSidebar();
    
    // เปิดเอกสารตาม slug ใน URL
    const urlParams = new URLSearchParams(location.search);
    const slug = urlParams.get('doc') || (location.hash.replace('#', '')) || (_docs[0]?.slug);
    if (slug) openDoc(slug);
    else showEmpty();
  } catch(e) {
    document.getElementById('sidebar-list').innerHTML = '<div style="color:#E63329;font-size:12px;padding:10px">' + esc(e.message) + '</div>';
    showError(e.message);
  }
}

function renderSidebar(){
  const wrap = document.getElementById('sidebar-list');
  if (!_docs.length) {
    wrap.innerHTML = '<div style="color:#999;font-size:12px;padding:10px">ยังไม่มีเอกสาร</div>';
    return;
  }
  wrap.innerHTML = _docs.map(d => 
    `<button class="sb-item" data-slug="${esc(d.slug)}" onclick="openDoc('${esc(d.slug)}')">📄 ${esc(d.title)}</button>`
  ).join('');
}

async function openDoc(slug){
  // mark active in sidebar
  document.querySelectorAll('.sb-item').forEach(el => {
    el.classList.toggle('active', el.dataset.slug === slug);
  });
  
  // update URL
  history.replaceState(null, '', '?doc=' + encodeURIComponent(slug));
  
  const wrap = document.getElementById('content');
  wrap.innerHTML = '<div class="loading"><div class="spinner"></div><div>กำลังโหลด...</div></div>';
  
  try {
    const { data, error } = await _sb.rpc('get_legal_document', { p_slug: slug });
    if (error) throw error;
    if (!data || !data.length) { showEmpty(); return; }
    
    const doc = data[0];
    document.title = doc.title + ' — Thailand Market';
    
    wrap.innerHTML = `
      <h1>${esc(doc.title)}</h1>
      <div class="meta">
        <span>📅 ${esc(fmtDate(doc.effective_date))}</span>
        <span>🔖 v${esc(doc.version)}</span>
        <span>🕒 อัปเดต ${esc(fmtDate(doc.updated_at))}</span>
      </div>
      <div class="markdown">${md2html(doc.content)}</div>
    `;
    window.scrollTo(0, 0);
  } catch(e) {
    showError(e.message);
  }
}

function showEmpty(){
  document.getElementById('content').innerHTML = `
    <div class="empty">
      <div class="empty-ico">📋</div>
      <div style="font-size:15px;font-weight:600;margin-bottom:6px">ยังไม่มีเอกสารใน slug นี้</div>
      <div style="font-size:13px;color:var(--g400)">เลือกเอกสารจากเมนูด้านซ้าย</div>
    </div>
  `;
}

function showError(msg){
  document.getElementById('content').innerHTML = `
    <div class="empty"><div class="empty-ico">⚠️</div><div>${esc(msg)}</div></div>
  `;
}

loadDocs();
</script>
</body>
</html>
