<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>กำลังไปหน้าค้นหา... | Thailand Market</title>
<script>
// search.html เดิมเป็นหน้า mockup — ส่งต่อเข้าระบบค้นหาจริงที่ category.html
(function(){
  const p = new URLSearchParams(location.search);
  const q = p.get('q') || p.get('search') || '';
  location.replace('category.html' + (q ? '?q=' + encodeURIComponent(q) : '?cat=all'));
})();
</script>
</head>
<body style="font-family:sans-serif;padding:40px;text-align:center;color:#666">

</html>
