<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Brand Day — Thailand Market</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800;900&family=DM+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--accent:#E63329;--gold:#FCD34D;--g100:#F5F5F5;--g200:#E5E5E5;--g400:#A3A3A3;--g500:#737373;--g700:#404040;--mono:'DM Mono',monospace}
body{font-family:'IBM Plex Sans Thai','Inter',sans-serif;background:#FAFAFA;color:#0A0A0A;font-size:14px;min-height:100vh}

.nav{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--g200);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;z-index:100;flex-wrap:wrap;gap:8px}
.logo{font-family:'Inter';font-weight:800;font-size:18px;text-decoration:none;color:#0A0A0A}.logo .dot{color:var(--accent)}
.back{padding:6px 12px;background:#fff;border:1px solid var(--g200);border-radius:4px;text-decoration:none;color:var(--g700);font-size:12px;font-family:inherit;cursor:pointer}
.back:hover{background:var(--g100)}

.main{max-width:1200px;margin:0 auto;padding:24px 16px 40px}

/* HERO */
.hero{position:relative;background:linear-gradient(135deg,var(--brand-color,#1428A0) 0%,#0A0A0A 100%);color:#fff;padding:40px 24px;border-radius:12px;overflow:hidden;margin-bottom:24px}
.hero-bg{position:absolute;inset:0;font-size:240px;opacity:.08;display:flex;align-items:center;justify-content:center;pointer-events:none}
.hero-content{position:relative;z-index:1;max-width:680px;margin:0 auto;text-align:center}
.brand-logo-img{height:60px;margin:0 auto 12px;display:block}
.brand-logo-txt{font-family:'Inter';font-weight:900;font-size:32px;letter-spacing:.05em;margin-bottom:10px}
.hero-tag{display:inline-block;background:rgba(255,255,255,.15);padding:5px 14px;border-radius:99px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;backdrop-filter:blur(8px)}
.hero-title{font-size:30px;font-weight:800;line-height:1.25;margin-bottom:8px}
.hero-title .pct{color:var(--gold)}
.hero-sub{color:rgba(255,255,255,.85);font-size:14px;margin-bottom:18px}

/* COUNTDOWN */
.cd-row{display:flex;justify-content:center;gap:6px;align-items:center;margin-top:18px}
.cd-box{background:rgba(0,0,0,.4);padding:10px 14px;border-radius:8px;text-align:center;min-width:60px;backdrop-filter:blur(6px)}
.cd-num{font-family:var(--mono);font-size:28px;font-weight:800;line-height:1;letter-spacing:-.02em}
.cd-lbl{font-size:9px;color:rgba(255,255,255,.7);margin-top:4px;text-transform:uppercase;letter-spacing:.05em}
.cd-sep{font-size:22px;font-weight:700;opacity:.5}

/* STATS BAR */
.stats-bar{background:#fff;border:1px solid var(--g200);border-radius:8px;display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-bottom:24px;overflow:hidden}
.sb-item{padding:18px 12px;text-align:center;border-right:1px solid var(--g200)}
.sb-item:last-child{border-right:none}
.sb-val{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--accent)}
.sb-lbl{font-size:11px;color:var(--g500);margin-top:4px;text-transform:uppercase;letter-spacing:.04em}

/* SECTION */
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sec-title{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.sec-link{font-size:12px;color:var(--accent);cursor:pointer;font-weight:500}
.sec-link:hover{text-decoration:underline}

/* PRODUCT GRID */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.pcard{background:#fff;border:1px solid var(--g200);border-radius:8px;overflow:hidden;text-decoration:none;color:inherit;transition:.15s;cursor:pointer}
.pcard:hover{border-color:#0A0A0A;transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.08)}
.pc-img{aspect-ratio:1;background:var(--g100);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.pc-img img{width:100%;height:100%;object-fit:cover}
.pc-img .ph{font-size:50px}
.pc-disc{position:absolute;top:8px;left:8px;background:var(--accent);color:#fff;padding:3px 8px;border-radius:99px;font-size:11px;font-weight:700;font-family:var(--mono)}
.pc-body{padding:10px 12px}
.pc-name{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:36px}
.pc-price{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
.pc-now{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--accent)}
.pc-was{font-family:var(--mono);font-size:11px;color:var(--g400);text-decoration:line-through}
.pc-meta{font-size:10px;color:var(--g500);margin-top:6px;display:flex;gap:8px;font-family:var(--mono)}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;background:#fff;border-radius:8px;border:1px solid var(--g200)}
.empty-ico{font-size:60px;margin-bottom:14px;opacity:.6}
.empty-title{font-size:16px;font-weight:600;margin-bottom:6px}
.empty-desc{font-size:13px;color:var(--g500);margin-bottom:18px;line-height:1.6}
.empty .btn{display:inline-block;padding:11px 22px;background:var(--accent);color:#fff;border-radius:6px;text-decoration:none;font-weight:600;font-size:13px}

.loading{padding:40px;text-align:center;color:var(--g500)}
.spinner{display:inline-block;width:24px;height:24px;border:2px solid var(--g200);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* UPCOMING */
.upcoming-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.upcoming-card{background:#fff;border:1px solid var(--g200);border-radius:8px;padding:14px;display:flex;align-items:center;gap:12px}
.upcoming-logo{width:48px;height:48px;border-radius:8px;background:var(--g100);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;overflow:hidden}
.upcoming-logo img{width:100%;height:100%;object-fit:contain}
.upcoming-info{flex:1;min-width:0}
.upcoming-brand{font-size:13px;font-weight:600;margin-bottom:2px}
.upcoming-date{font-size:11px;color:var(--g500);font-family:var(--mono)}

@media(max-width:560px){
  .hero{padding:30px 18px}
  .hero-title{font-size:22px}
  .stats-bar{grid-template-columns:repeat(2,1fr)}
  .sb-item:nth-child(2){border-right:none}
  .sb-item:nth-child(1),.sb-item:nth-child(2){border-bottom:1px solid var(--g200)}
  .pgrid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="back">← หน้าแรก</a>
  <a href="index.html" class="logo">Thailand<span class="dot">.</span>Market</a>
  <a href="cart.html" class="back">🛒 ตะกร้า</a>
</nav>

<main class="main">

<div id="hero-wrap">
  <div class="loading">
    <div class="spinner"></div>
    <div>กำลังโหลด Brand Day...</div>
  </div>
</div>

<div id="content-wrap"></div>

</main>

<script>
const _sb = window.supabase.createClient(
  'https://qmgyimsptzewwyafvjzk.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtZ3lpbXNwdHpld3d5YWZ2anprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NjA4NDIsImV4cCI6MjA5MzAzNjg0Mn0.pcexjwmQndb_RhZHfKVZ6m2_21sn09iNAMyESjLOVJ0'
);
window._sb = _sb;

let _currentEvent = null;
let _countdownTimer = null;

function esc(s){return(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmt(n){return'฿'+Number(n||0).toLocaleString('th-TH')}

function fmtDate(d){
  if (!d) return '';
  const dt = new Date(d);
  return dt.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit', hour: '2-digit', minute: '2-digit' });
}

async function loadBrandDay(){
  try {
    // 1. ดึง brand day ปัจจุบัน
    const { data, error } = await _sb.rpc('get_current_brand_day');
    if (error) throw error;
    
    const event = data && data[0];
    
    if (!event) {
      // ไม่มี brand day ตอนนี้ → แสดง upcoming
      showNoActiveBrandDay();
      return;
    }
    
    _currentEvent = event;
    
    // 2. Render hero
    renderHero(event);
    
    // 3. โหลด products + render
    loadProducts(event.brand_id);
    
    // 4. เริ่ม countdown
    startCountdown(event.end_at);
    
    // 5. Increment view count
    _sb.rpc('increment_brand_day_view', { p_event_id: event.id }).catch(() => {});
    
  } catch(e) {
    console.error('loadBrandDay:', e);
    document.getElementById('hero-wrap').innerHTML = `
      <div class="empty">
        <div class="empty-ico">⚠️</div>
        <div class="empty-title">เกิดข้อผิดพลาด</div>
        <div class="empty-desc">${esc(e.message)}</div>
        <a href="index.html" class="btn">กลับหน้าแรก</a>
      </div>
    `;
  }
}

function renderHero(event){
  const brandColor = '#1428A0'; // default
  const heroBg = event.brand_name ? event.brand_name.charAt(0).toUpperCase() : '🏆';
  
  document.getElementById('hero-wrap').innerHTML = `
    <div class="hero" style="--brand-color:${brandColor}">
      <div class="hero-bg">${esc(heroBg)}</div>
      <div class="hero-content">
        ${event.brand_logo 
          ? `<img class="brand-logo-img" src="${esc(event.brand_logo)}" alt="${esc(event.brand_name)}">`
          : `<div class="brand-logo-txt">${esc((event.brand_name || '').toUpperCase())}</div>`
        }
        <div class="hero-tag">🏆 BRAND DAY — วันนี้วันเดียวเท่านั้น!</div>
        <div class="hero-title">
          ${esc(event.title)}<br>
          <span class="pct">ลดสูงสุด ${event.max_discount_percent || 50}%</span>
        </div>
        ${event.subtitle ? `<div class="hero-sub">${esc(event.subtitle)}</div>` : ''}
        
        <div class="cd-row">
          <div class="cd-box"><div class="cd-num" id="cd-h">--</div><div class="cd-lbl">ชม.</div></div>
          <div class="cd-sep">:</div>
          <div class="cd-box"><div class="cd-num" id="cd-m">--</div><div class="cd-lbl">นาที</div></div>
          <div class="cd-sep">:</div>
          <div class="cd-box"><div class="cd-num" id="cd-s">--</div><div class="cd-lbl">วินาที</div></div>
        </div>
      </div>
    </div>
    
    <div class="stats-bar">
      <div class="sb-item"><div class="sb-val">${(event.order_count || 0).toLocaleString('th-TH')}</div><div class="sb-lbl">ออเดอร์แล้ว</div></div>
      <div class="sb-item"><div class="sb-val">${fmt(event.total_revenue || 0)}</div><div class="sb-lbl">ยอดขาย</div></div>
      <div class="sb-item"><div class="sb-val">${(event.product_count || 0).toLocaleString('th-TH')}</div><div class="sb-lbl">สินค้าในงาน</div></div>
      <div class="sb-item"><div class="sb-val">${(event.view_count || 0).toLocaleString('th-TH')}</div><div class="sb-lbl">ผู้เข้าชม</div></div>
    </div>
  `;
}

async function loadProducts(brandId){
  const wrap = document.getElementById('content-wrap');
  wrap.innerHTML = '<div class="loading"><div class="spinner"></div><div>กำลังโหลดสินค้า...</div></div>';
  
  try {
    const { data, error } = await _sb.rpc('get_brand_day_products', { 
      p_brand_id: brandId, p_limit: 24 
    });
    
    // fallback ถ้า RPC ไม่ผ่าน
    let products = data;
    if (error || !products) {
      const r = await _sb.from('products')
        .select('id, name_th, thumbnail, price, compare_price, discount_percent')
        .eq('brand_id', brandId)
        .eq('status', 'active')
        .order('discount_percent', { ascending: false, nullsFirst: false })
        .limit(24);
      if (r.error) throw r.error;
      products = r.data || [];
    }
    
    if (!products.length) {
      wrap.innerHTML = `
        <div class="empty">
          <div class="empty-ico">📦</div>
          <div class="empty-title">ยังไม่มีสินค้าในงาน</div>
          <div class="empty-desc">สินค้าจะแสดงเมื่อทางผู้ขายเพิ่มเข้ามา</div>
          <a href="index.html" class="btn">ดูสินค้าอื่นๆ</a>
        </div>
      `;
      return;
    }
    
    const productsHtml = products.map(p => {
      const disc = p.discount_percent || 0;
      const orig = p.compare_price || (disc > 0 ? Math.round(p.price / (1 - disc/100)) : null);
      return `
        <a href="product.html?id=${esc(p.id)}" class="pcard">
          <div class="pc-img">
            ${p.thumbnail 
              ? `<img src="${esc(p.thumbnail)}" loading="lazy" alt="${esc(p.name_th)}">`
              : `<div class="ph">📦</div>`
            }
            ${disc > 0 ? `<div class="pc-disc">-${disc}%</div>` : ''}
          </div>
          <div class="pc-body">
            <div class="pc-name">${esc(p.name_th || '-')}</div>
            <div class="pc-price">
              <span class="pc-now">${fmt(p.price)}</span>
              ${orig && orig > p.price ? `<span class="pc-was">${fmt(orig)}</span>` : ''}
            </div>
            ${p.sold_count || p.review_count ? `
              <div class="pc-meta">
                ${p.sold_count ? `🛒 ${p.sold_count} ขาย` : ''}
                ${p.rating > 0 ? `⭐ ${Number(p.rating).toFixed(1)}` : ''}
              </div>
            ` : ''}
          </div>
        </a>
      `;
    }).join('');
    
    wrap.innerHTML = `
      <div class="sec-hdr">
        <div class="sec-title">⭐ สินค้าในงาน Brand Day (${products.length})</div>
        <a class="sec-link" href="category.html?brand=${esc(_currentEvent.brand_slug || '')}">ดูทั้งหมด →</a>
      </div>
      <div class="pgrid">${productsHtml}</div>
    `;
    
    // โหลด upcoming events ด้วย
    loadUpcoming();
    
  } catch(e) {
    console.error('loadProducts:', e);
    wrap.innerHTML = `
      <div class="empty">
        <div class="empty-ico">⚠️</div>
        <div class="empty-title">โหลดสินค้าไม่สำเร็จ</div>
        <div class="empty-desc">${esc(e.message)}</div>
      </div>
    `;
  }
}

async function loadUpcoming(){
  try {
    const { data, error } = await _sb.rpc('get_upcoming_brand_days', { p_limit: 6 });
    if (error || !data || !data.length) return;
    
    const html = data.map(e => `
      <div class="upcoming-card">
        <div class="upcoming-logo">
          ${e.brand_logo 
            ? `<img src="${esc(e.brand_logo)}">` 
            : esc((e.brand_name || '?').charAt(0).toUpperCase())
          }
        </div>
        <div class="upcoming-info">
          <div class="upcoming-brand">${esc(e.brand_name || 'Brand')} — ลดสูงสุด ${e.max_discount_percent || 0}%</div>
          <div class="upcoming-date">📅 ${esc(fmtDate(e.start_at))}</div>
        </div>
      </div>
    `).join('');
    
    document.getElementById('content-wrap').insertAdjacentHTML('beforeend', `
      <div style="margin-top:32px">
        <div class="sec-hdr">
          <div class="sec-title">📅 Brand Day ที่กำลังมา</div>
        </div>
        <div class="upcoming-list">${html}</div>
      </div>
    `);
  } catch(e) { console.warn('upcoming:', e); }
}

function startCountdown(endAt){
  if (_countdownTimer) clearInterval(_countdownTimer);
  
  function tick(){
    const remaining = new Date(endAt).getTime() - Date.now();
    if (remaining <= 0) {
      clearInterval(_countdownTimer);
      document.getElementById('cd-h').textContent = '00';
      document.getElementById('cd-m').textContent = '00';
      document.getElementById('cd-s').textContent = '00';
      setTimeout(loadBrandDay, 2000); // reload เพื่อหา event ใหม่
      return;
    }
    const h = Math.floor(remaining / 3600000);
    const m = Math.floor((remaining % 3600000) / 60000);
    const s = Math.floor((remaining % 60000) / 1000);
    const elH = document.getElementById('cd-h');
    const elM = document.getElementById('cd-m');
    const elS = document.getElementById('cd-s');
    if (elH) elH.textContent = String(h).padStart(2, '0');
    if (elM) elM.textContent = String(m).padStart(2, '0');
    if (elS) elS.textContent = String(s).padStart(2, '0');
  }
  tick();
  _countdownTimer = setInterval(tick, 1000);
}

async function showNoActiveBrandDay(){
  // ไม่มี brand day ตอนนี้ — โหลด upcoming
  let upcomingHtml = '';
  try {
    const { data } = await _sb.rpc('get_upcoming_brand_days', { p_limit: 8 });
    if (data && data.length) {
      const items = data.map(e => `
        <div class="upcoming-card">
          <div class="upcoming-logo">
            ${e.brand_logo 
              ? `<img src="${esc(e.brand_logo)}">` 
              : esc((e.brand_name || '?').charAt(0).toUpperCase())
            }
          </div>
          <div class="upcoming-info">
            <div class="upcoming-brand">${esc(e.brand_name || 'Brand')} — ลดสูงสุด ${e.max_discount_percent || 0}%</div>
            <div class="upcoming-date">📅 ${esc(fmtDate(e.start_at))}</div>
          </div>
        </div>
      `).join('');
      
      upcomingHtml = `
        <div style="margin-top:32px">
          <div class="sec-hdr">
            <div class="sec-title">📅 Brand Day ที่กำลังมา</div>
          </div>
          <div class="upcoming-list">${items}</div>
        </div>
      `;
    }
  } catch(e) {}
  
  document.getElementById('hero-wrap').innerHTML = `
    <div class="empty">
      <div class="empty-ico">🏆</div>
      <div class="empty-title">ยังไม่มี Brand Day ในขณะนี้</div>
      <div class="empty-desc">
        Brand Day จะกลับมาอีกครั้งเร็วๆ นี้<br>
        ลดราคาพิเศษจากแบรนด์ดังเฉพาะวันเดียว!
      </div>
      <a href="index.html" class="btn">กลับหน้าแรก</a>
    </div>
    ${upcomingHtml}
  `;
}

// ── Init ──
loadBrandDay();

// Auto-refresh stats ทุก 30 วินาที
setInterval(() => {
  if (_currentEvent) {
    _sb.rpc('get_current_brand_day').then(({ data }) => {
      if (data && data[0]) {
        const e = data[0];
        const updateEl = (id, val) => {
          const el = document.querySelector(`[data-stat="${id}"]`);
          if (el) el.textContent = val;
        };
      }
    }).catch(() => {});
  }
}, 30000);
</script>
</body>
</html>
