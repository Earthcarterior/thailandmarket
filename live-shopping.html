<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Live Shopping — Thailand Market</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--accent:#E63329;--bg:#0A0A0A;--card:#171717;--g100:#262626;--g200:#404040;--g400:#A3A3A3;--g500:#737373;--txt:#fafafa;--live:#E63329;--green:#10B981}
body{font-family:'IBM Plex Sans Thai','Inter',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:14px}

.nav{position:sticky;top:0;background:rgba(10,10,10,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--g100);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;z-index:100;flex-wrap:wrap;gap:8px}
.logo{font-family:'Inter';font-weight:800;font-size:18px;text-decoration:none;color:var(--txt)}.logo .dot{color:var(--accent)}
.back{padding:6px 12px;background:var(--g100);border:1px solid var(--g200);border-radius:4px;text-decoration:none;color:var(--txt);font-size:12px;cursor:pointer;font-family:inherit}
.back:hover{background:var(--g200)}

.hero{padding:24px 20px 14px;text-align:center;max-width:1200px;margin:0 auto}
.hero h1{font-size:28px;font-weight:800;margin-bottom:6px;background:linear-gradient(135deg,#fff 30%,#E63329 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--g400);font-size:14px}
.channel-link{display:inline-flex;align-items:center;gap:6px;background:#FF0000;color:#fff;padding:6px 14px;border-radius:99px;text-decoration:none;font-size:12px;font-weight:600;margin-top:10px}
.channel-link:hover{background:#CC0000}

.main{max-width:1200px;margin:0 auto;padding:0 16px 40px}

/* Live section */
.live-section{margin-bottom:32px}
.section-title{font-size:18px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.live-badge{display:inline-flex;align-items:center;gap:6px;background:var(--live);color:#fff;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.live-dot{width:7px;height:7px;background:#fff;border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

.video-wrap{position:relative;background:#000;border-radius:8px;overflow:hidden;aspect-ratio:16/9}
.video-wrap iframe{width:100%;height:100%;border:none;display:block}

.video-info{padding:16px;background:var(--card);border:1px solid var(--g100);border-top:none;border-radius:0 0 8px 8px}
.video-title{font-size:16px;font-weight:600;margin-bottom:6px;line-height:1.4}
.video-meta{font-size:12px;color:var(--g400);display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.video-meta span{display:inline-flex;align-items:center;gap:4px}

/* Video grid */
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.vcard{background:var(--card);border:1px solid var(--g100);border-radius:8px;overflow:hidden;cursor:pointer;transition:.2s;text-decoration:none;color:inherit;display:block}
.vcard:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(230,51,41,.15)}
.vcard-thumb{position:relative;aspect-ratio:16/9;background:#000;overflow:hidden}
.vcard-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.vcard-thumb::after{content:'▶';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);color:#fff;font-size:40px;opacity:0;transition:.2s}
.vcard:hover .vcard-thumb::after{opacity:1}
.vcard-duration{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.8);color:#fff;padding:2px 6px;border-radius:3px;font-size:11px;font-family:'DM Mono',monospace}
.vcard-info{padding:12px}
.vcard-title{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.vcard-date{font-size:11px;color:var(--g400)}

.empty{text-align:center;padding:60px 20px;color:var(--g400)}
.empty-ico{font-size:60px;margin-bottom:14px;opacity:.5}
.empty-title{font-size:16px;font-weight:600;margin-bottom:6px;color:var(--txt)}
.empty-desc{font-size:13px;line-height:1.6}
.btn{display:inline-block;padding:11px 22px;background:var(--accent);color:#fff;border-radius:6px;text-decoration:none;font-weight:600;margin-top:14px}
.btn:hover{background:#B5261F}
.btn-yt{background:#FF0000}

.loading{padding:40px;text-align:center;color:var(--g400)}
.spinner{display:inline-block;width:24px;height:24px;border:2px solid var(--g200);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:560px){
  .hero h1{font-size:22px}
  .video-grid{grid-template-columns:1fr 1fr;gap:10px}
  .vcard-info{padding:10px}
  .vcard-title{font-size:12px}
}
</style>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="back">← หน้าแรก</a>
  <a href="index.html" class="logo">Thailand<span class="dot">.</span>Market</a>
  <a href="profile.html" class="back">โปรไฟล์</a>
</nav>

<div class="hero">
  <h1>🔴 Live Shopping</h1>
  <p>ช้อปสนุก ไลฟ์สดทุกวัน — paylayout</p>
  <a href="https://www.youtube.com/@paylayout?sub_confirmation=1" target="_blank" class="channel-link">
    <span>▶</span> Subscribe ช่อง paylayout
  </a>
</div>

<main class="main">

  <!-- Live Stream Section (Auto-embed) -->
  <section class="live-section">
    <div class="section-title">
      <span id="live-status">📺 Live Stream</span>
    </div>
    <div class="video-wrap">
      <iframe 
        id="live-iframe"
        src="https://www.youtube.com/embed/live_stream?channel=UC_XpBf3vy5dgTR7gstpyCtA&autoplay=0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
    <div class="video-info">
      <div class="video-title" id="live-title">paylayout • Live Stream</div>
      <div class="video-meta">
        <span>📺 <span id="live-channel">paylayout</span></span>
        <span id="live-current-status">⏳ กำลังตรวจสอบ live...</span>
      </div>
    </div>
  </section>

  <!-- Videos List -->
  <section>
    <div class="section-title">
      <span>🎬 วิดีโอล่าสุด</span>
    </div>
    <div id="videos-container">
      <div class="loading">
        <div class="spinner"></div>
        <div>กำลังโหลดวิดีโอ...</div>
      </div>
    </div>
  </section>

</main>

<script>
const CHANNEL_ID = 'UC_XpBf3vy5dgTR7gstpyCtA';
const CHANNEL_HANDLE = 'paylayout';

function esc(s){return(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  const diff = (Date.now() - dt.getTime()) / 1000;
  if (diff < 60) return 'เมื่อสักครู่';
  if (diff < 3600) return 'เมื่อ ' + Math.floor(diff/60) + ' นาทีที่แล้ว';
  if (diff < 86400) return 'เมื่อ ' + Math.floor(diff/3600) + ' ชั่วโมงที่แล้ว';
  if (diff < 604800) return 'เมื่อ ' + Math.floor(diff/86400) + ' วันที่แล้ว';
  return dt.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
}

// ── ดึง videos จาก YouTube RSS feed ──
async function loadVideos() {
  const container = document.getElementById('videos-container');
  
  try {
    // ใช้ public RSS feed (ไม่ต้อง API key) ผ่าน CORS proxy
    const rssUrl = 'https://www.youtube.com/feeds/videos.xml?channel_id=' + CHANNEL_ID;
    
    // ลอง public CORS proxies หลายตัว
    const proxies = [
      'https://api.allorigins.win/raw?url=' + encodeURIComponent(rssUrl),
      'https://corsproxy.io/?' + encodeURIComponent(rssUrl),
      'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(rssUrl)
    ];
    
    let xml = null;
    for (const proxy of proxies) {
      try {
        const resp = await fetch(proxy, { signal: AbortSignal.timeout(8000) });
        if (resp.ok) {
          xml = await resp.text();
          if (xml && xml.includes('<entry')) break;
          xml = null;
        }
      } catch(e) { 
        console.warn('Proxy failed:', proxy, e.message); 
      }
    }
    
    if (!xml || !xml.includes('<entry')) {
      // ไม่มี videos
      container.innerHTML = '<div class="empty">' +
        '<div class="empty-ico">📹</div>' +
        '<div class="empty-title">ยังไม่มีวิดีโอในช่อง</div>' +
        '<div class="empty-desc">paylayout ยังไม่ได้อัปโหลดวิดีโอ<br>กด Subscribe เพื่อรับการแจ้งเตือนเมื่อมีวิดีโอใหม่</div>' +
        '<a href="https://www.youtube.com/@' + CHANNEL_HANDLE + '?sub_confirmation=1" target="_blank" class="btn btn-yt">▶ Subscribe</a>' +
      '</div>';
      return;
    }
    
    // Parse XML
    const parser = new DOMParser();
    const doc = parser.parseFromString(xml, 'text/xml');
    const entries = doc.querySelectorAll('entry');
    
    if (!entries.length) {
      container.innerHTML = '<div class="empty">' +
        '<div class="empty-ico">📹</div>' +
        '<div class="empty-title">ยังไม่มีวิดีโอ</div>' +
        '<div class="empty-desc">paylayout ยังไม่ได้อัปโหลดวิดีโอ</div>' +
        '<a href="https://www.youtube.com/@' + CHANNEL_HANDLE + '" target="_blank" class="btn btn-yt">▶ เปิดดูช่อง</a>' +
      '</div>';
      return;
    }
    
    // Build video cards
    const videos = [];
    entries.forEach(entry => {
      const videoId = entry.querySelector('videoId')?.textContent || 
                      entry.querySelector('yt\\:videoId')?.textContent || '';
      const title = entry.querySelector('title')?.textContent || '';
      const published = entry.querySelector('published')?.textContent || '';
      const thumbnail = entry.querySelector('thumbnail')?.getAttribute('url') || 
                        entry.querySelector('media\\:thumbnail')?.getAttribute('url') ||
                        'https://i.ytimg.com/vi/' + videoId + '/hqdefault.jpg';
      
      if (videoId) videos.push({ videoId, title, published, thumbnail });
    });
    
    container.innerHTML = '<div class="video-grid">' + 
      videos.map(v => 
        '<a href="https://www.youtube.com/watch?v=' + esc(v.videoId) + '" target="_blank" class="vcard">' +
          '<div class="vcard-thumb">' +
            '<img src="' + esc(v.thumbnail) + '" loading="lazy" alt="' + esc(v.title) + '">' +
          '</div>' +
          '<div class="vcard-info">' +
            '<div class="vcard-title">' + esc(v.title) + '</div>' +
            '<div class="vcard-date">📅 ' + esc(fmtDate(v.published)) + '</div>' +
          '</div>' +
        '</a>'
      ).join('') + '</div>';
    
  } catch(e) {
    console.error('loadVideos:', e);
    container.innerHTML = '<div class="empty">' +
      '<div class="empty-ico">⚠️</div>' +
      '<div class="empty-title">ไม่สามารถโหลดวิดีโอได้</div>' +
      '<div class="empty-desc">' + esc(e.message) + '</div>' +
      '<a href="https://www.youtube.com/@' + CHANNEL_HANDLE + '" target="_blank" class="btn btn-yt">▶ ดูช่องบน YouTube</a>' +
    '</div>';
  }
}

// ── ตรวจสถานะ live (โดยลองโหลด live page) ──
async function checkLiveStatus() {
  const statusEl = document.getElementById('live-current-status');
  const statusBadge = document.getElementById('live-status');
  
  try {
    // ลองดู live URL — ถ้ามี live จริง iframe จะแสดง
    // ตอนนี้แสดง embed live_stream เลย ถ้าไม่มีจะขึ้น "channel is currently offline"
    statusEl.innerHTML = '<span style="color:#A3A3A3">หากกำลังไลฟ์ จะแสดงด้านบน — หากไม่ได้ไลฟ์ จะแสดง "ช่องไม่ได้ออนไลน์ในขณะนี้"</span>';
    statusBadge.innerHTML = '📺 Live Stream <small style="color:#A3A3A3;font-weight:400">(แสดงเมื่อไลฟ์เท่านั้น)</small>';
  } catch(e) {
    statusEl.textContent = '⏸️ ไม่ได้ออนไลน์';
  }
}

// Init
loadVideos();
checkLiveStatus();

// Auto-refresh ทุก 5 นาที (เผื่อมี video ใหม่)
setInterval(loadVideos, 5 * 60 * 1000);
</script>
</body>
</html>
