<!DOCTYPE html>
<html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ออเดอร์ทั้งหมด — Thailand Market</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--accent:#E63329;--g100:#F5F5F5;--g200:#E5E5E5;--g500:#737373;--g700:#404040}
body{font-family:'IBM Plex Sans Thai','Inter',sans-serif;background:#FAFAFA;color:#0A0A0A;font-size:13px}
.nav{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--g200);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;z-index:100}
.back{padding:6px 12px;background:#fff;border:1px solid var(--g200);border-radius:4px;text-decoration:none;color:var(--g700);font-size:12px}
.logo{font-family:'Inter';font-weight:800;font-size:16px;text-decoration:none;color:#0A0A0A}.logo .dot{color:var(--accent)}
.main{padding:24px;max-width:1280px;margin:0 auto}
h1{font-size:22px;font-weight:700;margin-bottom:6px}
.sub{font-size:13px;color:var(--g500);margin-bottom:20px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:18px}
.stat{background:#fff;border:1px solid var(--g200);border-radius:6px;padding:14px}
.stat-lbl{font-size:10px;color:#A3A3A3;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;font-weight:600}
.stat-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:700}
.card{background:#fff;border:1px solid var(--g200);border-radius:6px;overflow:hidden}
.card-head{padding:14px 18px;border-bottom:1px solid var(--g200);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.tabs{display:flex;gap:4px;flex-wrap:wrap}
.tab{padding:6px 12px;background:#fff;border:1px solid var(--g200);border-radius:99px;cursor:pointer;font-size:11px;color:var(--g700);font-family:inherit}
.tab.on{background:#0A0A0A;color:#fff;border-color:#0A0A0A}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--g100);padding:10px 12px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;color:var(--g700)}
td{padding:10px 12px;border-bottom:1px solid #F0F0F0}
.btn{padding:6px 12px;border-radius:4px;font-size:11px;cursor:pointer;border:1px solid var(--g200);background:#fff;color:var(--g700);font-family:inherit}
.btn-ok{border-color:#10B981;color:#10B981}
.btn-danger{border-color:#EF4444;color:#EF4444}
.btn-primary{background:#E63329;color:#fff;border-color:#E63329}
.empty{padding:60px;text-align:center;color:#A3A3A3}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0A0A0A;color:#fff;padding:12px 24px;border-radius:6px;z-index:9999;font-size:13px;display:none}
.toast.on{display:block}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:500}
</style></head>
<body>
<nav class="nav">
<a href="admin-cms.html" class="back">← กลับ Admin</a>
<a href="index.html" class="logo">Thailand<span class="dot">.</span>Market</a>
<a href="profile.html" class="back">โปรไฟล์</a>
</nav>
<main class="main">
<h1>📦 ออเดอร์ทั้งหมด</h1>
<div class="sub">ดูและจัดการออเดอร์ในระบบ</div>

<div class="stats">
<div class="stat"><div class="stat-lbl">ทั้งหมด</div><div class="stat-val" id="st-total">—</div></div>
<div class="stat"><div class="stat-lbl">รอชำระ</div><div class="stat-val" id="st-pending" style="color:#F59E0B">—</div></div>
<div class="stat"><div class="stat-lbl">กำลังจัดส่ง</div><div class="stat-val" id="st-shipping" style="color:#3B82F6">—</div></div>
<div class="stat"><div class="stat-lbl">เสร็จ</div><div class="stat-val" id="st-done" style="color:#10B981">—</div></div>
<div class="stat"><div class="stat-lbl">รายได้รวม</div><div class="stat-val" id="st-revenue" style="color:#E63329">—</div></div>
</div>
<div class="card">
<div class="card-head">
<div style="font-size:13px;font-weight:600">📋 ออเดอร์ทั้งหมด</div>
<div class="tabs">
<button class="tab on" onclick="fSt(this,null)">ทั้งหมด</button>
<button class="tab" onclick="fSt(this,'pending')">รอชำระ</button>
<button class="tab" onclick="fSt(this,'paid')">ชำระแล้ว</button>
<button class="tab" onclick="fSt(this,'shipped')">จัดส่งแล้ว</button>
<button class="tab" onclick="fSt(this,'completed')">เสร็จ</button>
<button class="tab" onclick="fSt(this,'cancelled')">ยกเลิก</button>
</div>
</div>
<div id="list"><div class="empty">⏳</div></div>
</div>

</main>
<div class="toast" id="toast"></div>
<script>
const _sb = window.supabase.createClient('https://qmgyimsptzewwyafvjzk.supabase.co', 'PLACEHOLDER_ANON_KEY');
function esc(s){return(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmt(n){return'฿'+Number(n||0).toLocaleString('th-TH');}
function toast(m,k){const t=document.getElementById('toast');t.textContent=m;t.style.background=k==='ok'?'#10B981':k==='err'?'#E63329':'#0A0A0A';t.classList.add('on');setTimeout(()=>t.classList.remove('on'),3500);}
function time(d){if(!d)return'';const n=(Date.now()-new Date(d).getTime())/1000;if(n<3600)return Math.floor(n/60)+'น.';if(n<86400)return Math.floor(n/3600)+'ชม.';return new Date(d).toLocaleDateString('th-TH');}
function statBadge(s){const M={pending:['#FEF3C7','#92400E','⏳'],active:['#D1FAE5','#065F46','✓'],approved:['#D1FAE5','#065F46','✓'],paid:['#DBEAFE','#1E40AF','💰'],preparing:['#FED7AA','#C2410C','📦'],shipped:['#A7F3D0','#065F46','✈️'],completed:['#D1FAE5','#065F46','✅'],cancelled:['#FEE2E2','#991B1B','✕'],rejected:['#FEE2E2','#991B1B','✕']};const x=M[s]||['#E5E5E5','#525252',s||'—'];return`<span class="badge" style="background:${x[0]};color:${x[1]}">${x[2]}</span>`;}
async function checkAdmin(){const{data:{user}}=await _sb.auth.getUser();if(!user){location.href='login.html?next='+encodeURIComponent(location.pathname);return null;}const{data:u}=await _sb.from('users').select('*').eq('email',user.email).maybeSingle();if(!u||!['admin','super_admin'].includes(u.role)){toast('❌ ต้องเป็น Admin','err');setTimeout(()=>location.href='index.html',1500);return null;}return u;}

let _st=null;
async function loadStats(){
  try{
    const[t,p,sh,c,rev]=await Promise.all([
      _sb.from('orders').select('id',{count:'exact',head:true}),
      _sb.from('orders').select('id',{count:'exact',head:true}).eq('status','pending'),
      _sb.from('orders').select('id',{count:'exact',head:true}).in('status',['paid','preparing','shipped']),
      _sb.from('orders').select('id',{count:'exact',head:true}).eq('status','completed'),
      _sb.from('orders').select('total_amount').eq('status','completed')
    ]);
    document.getElementById('st-total').textContent=t.count??0;
    document.getElementById('st-pending').textContent=p.count??0;
    document.getElementById('st-shipping').textContent=sh.count??0;
    document.getElementById('st-done').textContent=c.count??0;
    const total=(rev.data||[]).reduce((s,o)=>s+Number(o.total_amount||0),0);
    document.getElementById('st-revenue').textContent=fmt(total);
  }catch(e){console.warn(e);}
}
async function load(){
  const wrap=document.getElementById('list');
  wrap.innerHTML='<div class="empty">⏳</div>';
  try{
    let q=_sb.from('orders').select('*, users(name, email), order_items(product_name, quantity)').order('created_at',{ascending:false}).limit(50);
    if(_st)q=q.eq('status',_st);
    const{data,error}=await q;
    if(error)throw error;
    if(!data||!data.length){wrap.innerHTML='<div class="empty">ไม่มีออเดอร์</div>';return;}
    wrap.innerHTML='<table><thead><tr><th>Order</th><th>ลูกค้า</th><th>รายการ</th><th>ยอด</th><th>สถานะ</th><th>เวลา</th><th></th></tr></thead><tbody>'+
    data.map(o=>`<tr>
      <td style="font-family:'DM Mono',monospace;font-size:11px;color:#E63329;font-weight:600">${esc(o.order_code||o.id.substring(0,8))}</td>
      <td style="font-size:12px">${esc(o.users?.name||o.users?.email||'-')}</td>
      <td style="font-size:11px"><div style="font-weight:500">${esc((o.order_items?.[0]?.product_name||'').substring(0,30))}</div><div style="color:#888">${o.order_items?.length||0} รายการ</div></td>
      <td style="font-family:'DM Mono',monospace;font-weight:600">${fmt(o.total_amount)}</td>
      <td>${statBadge(o.status)}</td>
      <td style="font-size:11px;color:#888">${time(o.created_at)}</td>
      <td style="text-align:right"><a href="order-detail.html?id=${o.id}" target="_blank" class="btn">ดู</a></td>
    </tr>`).join('')+'</tbody></table>';
  }catch(e){wrap.innerHTML='<div class="empty" style="color:#E63329">❌ '+esc(e.message)+'</div>';}
}
function fSt(btn,s){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');_st=s;load();}
(async()=>{if(await checkAdmin()){loadStats();load();}})();

</script>
</body>
</html>
