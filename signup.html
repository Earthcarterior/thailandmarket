<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>สมัครสมาชิก — Thailand Market</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--accent:#E63329;--g100:#F5F5F5;--g200:#E5E5E5;--g400:#A3A3A3;--g500:#737373;--g700:#404040}
body{font-family:'IBM Plex Sans Thai','Inter',sans-serif;background:#FAFAFA;color:#0A0A0A;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border:1px solid var(--g200);border-radius:8px;padding:40px;max-width:440px;width:100%;box-shadow:0 4px 20px rgba(0,0,0,.04)}
.logo{font-family:'Inter';font-weight:800;font-size:24px;text-align:center;margin-bottom:8px}
.logo .dot{color:var(--accent)}
.subtitle{text-align:center;font-size:13px;color:var(--g500);margin-bottom:28px}
.fg{margin-bottom:14px}
.lbl{font-size:11px;color:var(--g700);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.inp{width:100%;padding:11px 14px;border:1px solid var(--g200);border-radius:4px;font-family:inherit;font-size:14px;background:#fff}
.inp:focus{outline:none;border-color:#0A0A0A}
.btn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:4px;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px}
.btn:hover{background:#B5261F}
.btn:disabled{opacity:.5}
.foot{text-align:center;margin-top:20px;font-size:13px;color:var(--g500)}
.foot a{color:var(--accent);text-decoration:none;font-weight:500}
.err{font-size:11px;color:var(--accent);margin-top:4px;display:none}
.err.on{display:block}
</style>
</head>
<body>
<div class="card">
<div class="logo">Thailand<span class="dot">.</span>Market</div>
<div class="subtitle">สร้างบัญชีใหม่</div>

<div class="fg"><label class="lbl">ชื่อ-นามสกุล *</label>
<input class="inp" id="name" placeholder="กรอกชื่อ-นามสกุล" autocomplete="name">
<div class="err" id="err-name"></div></div>

<div class="fg"><label class="lbl">อีเมล *</label>
<input class="inp" id="email" type="email" placeholder="your@email.com" autocomplete="email">
<div class="err" id="err-email"></div></div>

<div class="fg"><label class="lbl">เบอร์โทรศัพท์</label>
<input class="inp" id="phone" type="tel" placeholder="0X-XXXX-XXXX">
<div class="err" id="err-phone"></div></div>

<div class="fg"><label class="lbl">รหัสผ่าน * (≥ 6 ตัว)</label>
<input class="inp" id="pwd" type="password" placeholder="••••••••" autocomplete="new-password">
<div class="err" id="err-pwd"></div></div>

<div class="fg"><label class="lbl">ยืนยันรหัสผ่าน *</label>
<input class="inp" id="pwd2" type="password" placeholder="••••••••" autocomplete="new-password">
<div class="err" id="err-pwd2"></div></div>

<button class="btn" id="btn-signup" onclick="doSignup()">สมัครสมาชิก</button>

<div class="foot">มีบัญชีอยู่แล้ว? <a href="login.html">เข้าสู่ระบบ</a></div>
</div>

<script>
const _sb = window.supabase.createClient('https://qmgyimsptzewwyafvjzk.supabase.co', 'PLACEHOLDER_ANON_KEY');

function showErr(f, m){const el=document.getElementById('err-'+f);if(el){el.textContent=m;el.classList.add('on');}}
function clearErr(f){document.getElementById('err-'+f)?.classList.remove('on');}
function toast(m){let t=document.createElement('div');t.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#0A0A0A;color:#fff;padding:12px 24px;border-radius:6px;z-index:9999;font-size:13px';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}

async function doSignup(){
  ['name','email','phone','pwd','pwd2'].forEach(clearErr);
  const name=document.getElementById('name').value.trim();
  const email=document.getElementById('email').value.trim().toLowerCase();
  const phone=document.getElementById('phone').value.trim();
  const pwd=document.getElementById('pwd').value;
  const pwd2=document.getElementById('pwd2').value;

  let ok=true;
  if(!name){showErr('name','กรุณากรอกชื่อ');ok=false;}
  if(!email.match(/^\S+@\S+\.\S+$/)){showErr('email','อีเมลไม่ถูกต้อง');ok=false;}
  if(pwd.length<6){showErr('pwd','รหัสผ่านต้อง ≥ 6 ตัว');ok=false;}
  if(pwd!==pwd2){showErr('pwd2','รหัสผ่านไม่ตรงกัน');ok=false;}
  if(!ok)return;

  const btn=document.getElementById('btn-signup');
  btn.disabled=true;btn.textContent='⏳ กำลังสมัคร...';

  try{
    const{data:auth,error:e1}=await _sb.auth.signUp({email,password:pwd,options:{data:{name,phone}}});
    if(e1)throw e1;
    const{error:e2}=await _sb.from('users').insert({email,name,phone:phone||null,role:'customer',is_verified:false});
    if(e2&&!e2.message.includes('duplicate'))console.warn('users:',e2.message);
    toast('✅ สมัครสำเร็จ! กำลังเข้าสู่ระบบ...');
    const next=new URLSearchParams(location.search).get('next');
    setTimeout(()=>location.href=next||'index.html',1500);
  }catch(e){
    btn.disabled=false;btn.textContent='สมัครสมาชิก';
    if(e.message.includes('already')){showErr('email','อีเมลนี้ถูกใช้แล้ว');}
    else{toast('❌ '+(e.message||'สมัครไม่สำเร็จ'));}
  }
}
['name','email','phone','pwd','pwd2'].forEach(id=>{
  document.getElementById(id)?.addEventListener('keydown',e=>{if(e.key==='Enter')doSignup();});
});
(async()=>{const{data:{user}}=await _sb.auth.getUser();if(user)location.href='index.html';})();
</script>
</body>
</html>
