<!DOCTYPE html>
<html lang="th">
<head>
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests; object-src 'none'; base-uri 'self'">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คำสั่งซื้อของฉัน — Thailand.Market</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&family=Sarabun:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --black:#0A0A0A;--white:#FFFFFF;--red:#E63329;
  --g50:#FAFAFA;--g100:#F2F2F2;--g200:#E5E5E5;--g300:#D4D4D4;--g400:#A3A3A3;--g500:#737373;--g600:#525252;--g700:#404040;--g800:#262626;
  --gn:#16A34A;--gn-bg:#DCFCE7;--am:#D97706;--am-bg:#FEF3C7;--bl:#2563EB;--bl-bg:#DBEAFE;
  --font:'DM Sans',system-ui,sans-serif;
  --th:'Sarabun',sans-serif;
  --mono:'DM Mono',monospace;
  --border:1px solid #E5E5E5;
  --border-dark:1px solid #0A0A0A;
}
body{font-family:var(--th);background:var(--g50);color:var(--black);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}

.tn{height:54px;background:var(--white);border-bottom:var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 22px;position:sticky;top:0;z-index:50}
.tn-logo{font-family:var(--mono);font-size:14px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--black);text-decoration:none}
.tn-logo .dot{color:var(--red)}
.tn-r{display:flex;gap:14px;align-items:center}
.tn-link{font-size:12px;color:var(--g500);text-decoration:none}
.tn-link:hover{color:var(--black)}
.tn-link.active{color:var(--black);font-weight:500}

.pg{max-width:1100px;margin:0 auto;padding:32px 22px 80px}
.pg-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.pg-t{font-family:var(--font);font-size:24px;font-weight:700;letter-spacing:-.02em}
.pg-s{font-size:12px;color:var(--g500);margin-top:4px}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--g200);margin-bottom:20px;overflow-x:auto}
.tab{padding:11px 16px;font-size:12px;font-family:var(--font);font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--g500);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;background:none;border-left:none;border-right:none;border-top:none}
.tab:hover{color:var(--black)}
.tab.active{color:var(--black);border-bottom-color:var(--red)}
.tab-c{display:inline-block;background:var(--g200);padding:1px 7px;font-size:10px;font-family:var(--mono);margin-left:5px;border-radius:8px;font-weight:400}
.tab.active .tab-c{background:var(--black);color:var(--white)}

/* ORDER CARD */
.ord{background:var(--white);border:var(--border);margin-bottom:14px;transition:all .15s}
.ord:hover{border-color:var(--g400)}
.ord-h{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--g100);flex-wrap:wrap;gap:10px}
.ord-h-l{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.ord-num{font-family:var(--mono);font-size:13px;font-weight:500}
.ord-date{font-size:11px;color:var(--g500)}
.bdg{font-size:10px;letter-spacing:.05em;text-transform:uppercase;padding:4px 8px;font-weight:500;font-family:var(--font);border:1px solid;display:inline-block}
.bdg-pending{background:var(--am-bg);color:var(--am);border-color:var(--am)}
.bdg-review{background:var(--bl-bg);color:var(--bl);border-color:var(--bl)}
.bdg-paid{background:var(--gn-bg);color:var(--gn);border-color:var(--gn)}
.bdg-preparing{background:#F3E8FF;color:#7E22CE;border-color:#7E22CE}
.bdg-shipping{background:#E0F2FE;color:#0369A1;border-color:#0369A1}
.bdg-delivered{background:var(--gn-bg);color:var(--gn);border-color:var(--gn)}
.bdg-cancelled{background:#FEE2E2;color:var(--red);border-color:var(--red)}
.bdg-refunded{background:var(--g100);color:var(--g600);border-color:var(--g500)}

.ord-b{padding:14px 18px;display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center}
.ord-items{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.ord-thumb{width:48px;height:48px;background:var(--g100);border:1px solid var(--g200);object-fit:cover;flex-shrink:0}
.ord-thumb-more{width:48px;height:48px;background:var(--g100);border:1px solid var(--g200);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--g600);font-family:var(--mono);flex-shrink:0}
.ord-itxt{font-size:13px;color:var(--g700);min-width:0}
.ord-itxt-1{font-weight:500;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:380px}
.ord-itxt-2{font-size:11px;color:var(--g500)}
.ord-r{text-align:right}
.ord-amt{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--red);margin-bottom:2px}
.ord-amt-l{font-size:10px;color:var(--g500);letter-spacing:.05em;text-transform:uppercase}

.ord-payinfo{padding:14px 18px;background:var(--g50);border-top:1px solid var(--g100);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.ord-payl{font-size:12px;color:var(--g600);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ord-payl strong{color:var(--black);font-weight:500}
.ord-method-ico{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;background:var(--white);border:1px solid var(--g200);font-size:11px;font-family:var(--mono);font-weight:600}

.ord-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:8px 14px;border:none;font-family:var(--font);font-size:11px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:all .15s;text-decoration:none;white-space:nowrap}
.btn-k{background:var(--black);color:var(--white)}.btn-k:hover{background:var(--g800)}
.btn-r{background:var(--red);color:var(--white)}.btn-r:hover{opacity:.9}
.btn-o{background:var(--white);color:var(--black);border:var(--border-dark)}.btn-o:hover{background:var(--black);color:var(--white)}
.btn-g{background:transparent;color:var(--g600);border:var(--border)}.btn-g:hover{border-color:var(--black);color:var(--black)}
.btn-blink{background:var(--am);color:var(--white);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.75}}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--g500)}
.empty-i{font-size:48px;margin-bottom:14px;color:var(--g300)}
.empty-t{font-size:15px;font-weight:500;color:var(--black);margin-bottom:6px}
.empty-s{font-size:13px;margin-bottom:18px}

/* SUMMARY STRIP */
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:24px}
.st{background:var(--white);border:var(--border);padding:14px 16px;cursor:pointer;transition:all .15s}
.st:hover{border-color:var(--black)}
.st.active{border:2px solid var(--black);padding:13px 15px}
.st-l{font-size:10px;color:var(--g500);letter-spacing:.05em;text-transform:uppercase;font-family:var(--font);font-weight:500;margin-bottom:6px}
.st-v{font-family:var(--mono);font-size:18px;font-weight:500}
.st-v.am{color:var(--am)}
.st-v.bl{color:var(--bl)}
.st-v.gn{color:var(--gn)}
.st-v.r{color:var(--red)}

/* MOBILE */
@media (max-width:768px){
  .ord-b{grid-template-columns:1fr}
  .ord-r{text-align:left;display:flex;align-items:center;justify-content:space-between}
  .ord-payinfo{flex-direction:column;align-items:stretch}
  .ord-actions{justify-content:flex-end}
  .pg-t{font-size:20px}
}

.hide{display:none!important}
</style>
</head>
<body>

<nav class="tn">
  <a href="index.html" class="tn-logo">Thailand<span class="dot">.</span>Market</a>
  <div class="tn-r">
    <a href="profile.html" class="tn-link">บัญชี</a>
    <a href="profile-orders.html" class="tn-link active">คำสั่งซื้อ</a>
    <a href="address-book.html" class="tn-link">ที่อยู่</a>
    <a href="notification-center.html" class="tn-link">แจ้งเตือน</a>
  </div>
</nav>

<div class="pg">
  <div class="pg-h">
    <div>
      <div class="pg-t">คำสั่งซื้อของฉัน</div>
      <div class="pg-s">ดูสถานะการชำระเงินและการจัดส่ง</div>
    </div>
    <a href="index.html" class="btn btn-o">+ ช้อปต่อ</a>
  </div>

  <!-- SUMMARY STRIP -->
  <div class="summary" id="summary"></div>

  <!-- TABS -->
  <div class="tabs" id="tabs"></div>

  <!-- LIST -->
  <div id="list">
    <div style="text-align:center;padding:60px;color:var(--g500)">กำลังโหลด...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SB_URL = 'https://qmgyimsptzewwyafvjzk.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtZ3lpbXNwdHpld3d5YWZ2anprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE5MDg2NDIsImV4cCI6MjA3NzQ4NDY0Mn0.XbMqBimjVfwoZcm-Bp8kIo2Tt2bC75QMDGmMmaH4_nE';
const sb = window.supabase.createClient(SB_URL, SB_KEY);

let allOrders=[], allRequests=[], allSlips=[], currentTab='all';

const TABS = [
  {key:'all',     label:'ทั้งหมด'},
  {key:'pay',     label:'รอชำระ'},
  {key:'review',  label:'รอตรวจสลิป'},
  {key:'paid',    label:'จ่ายแล้ว'},
  {key:'shipping',label:'กำลังจัดส่ง'},
  {key:'delivered',label:'ส่งถึงแล้ว'},
  {key:'cancelled',label:'ยกเลิก/คืนเงิน'}
];

async function loadAll() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) { location.href = 'login.html?redirect=profile-orders.html'; return; }

  const [ordsRes, reqsRes, slipsRes] = await Promise.all([
    sb.from('orders').select('*').eq('user_id', user.id).order('created_at', { ascending: false }),
    sb.from('payment_requests').select('*').eq('order_id', user.id).order('created_at', { ascending: false }),
    sb.from('payment_slips').select('*').eq('user_id', user.id).order('created_at', { ascending: false })
  ]);

  allOrders = ordsRes.data || [];
  // Refetch requests by order_ids
  const orderIds = allOrders.map(o=>o.id);
  if (orderIds.length) {
    const { data: prs } = await sb.from('payment_requests').select('*').in('order_id', orderIds);
    allRequests = prs || [];
    const { data: sls } = await sb.from('payment_slips').select('*').in('order_id', orderIds);
    allSlips = sls || [];
  } else {
    allRequests = []; allSlips = [];
  }

  renderSummary();
  renderTabs();
  renderList();
}

function renderSummary() {
  const total = allOrders.length;
  const pay = allOrders.filter(o => o.status === 'pending' && !hasReviewSlip(o.id)).length;
  const review = allOrders.filter(o => hasReviewSlip(o.id)).length;
  const ship = allOrders.filter(o => o.status === 'shipping').length;
  const totalSpent = allOrders.filter(o => ['paid','preparing','shipping','delivered'].includes(o.status))
    .reduce((s,o)=>s+Number(o.total_amount||0), 0);

  document.getElementById('summary').innerHTML = `
    <div class="st" onclick="setTab('all')"><div class="st-l">ทั้งหมด</div><div class="st-v">${total}</div></div>
    <div class="st" onclick="setTab('pay')"><div class="st-l">รอชำระ</div><div class="st-v am">${pay}</div></div>
    <div class="st" onclick="setTab('review')"><div class="st-l">รอตรวจสลิป</div><div class="st-v bl">${review}</div></div>
    <div class="st" onclick="setTab('shipping')"><div class="st-l">กำลังจัดส่ง</div><div class="st-v bl">${ship}</div></div>
    <div class="st"><div class="st-l">ใช้จ่ายรวม</div><div class="st-v r">฿${totalSpent.toLocaleString('th-TH',{maximumFractionDigits:0})}</div></div>
  `;
}

function hasReviewSlip(orderId) {
  return allSlips.some(s => s.order_id === orderId && s.status === 'pending_review');
}

function renderTabs() {
  document.getElementById('tabs').innerHTML = TABS.map(t => {
    const c = countByTab(t.key);
    return `<button class="tab ${currentTab===t.key?'active':''}" onclick="setTab('${t.key}')">${t.label}<span class="tab-c">${c}</span></button>`;
  }).join('');
}

function countByTab(tab) {
  return filterOrders(tab).length;
}

function filterOrders(tab) {
  return allOrders.filter(o => {
    if (tab === 'all') return true;
    if (tab === 'pay') return o.status === 'pending' && !hasReviewSlip(o.id);
    if (tab === 'review') return hasReviewSlip(o.id);
    if (tab === 'paid') return o.status === 'paid' || o.status === 'preparing';
    if (tab === 'shipping') return o.status === 'shipping';
    if (tab === 'delivered') return o.status === 'delivered';
    if (tab === 'cancelled') return o.status === 'cancelled' || o.status === 'refunded';
    return true;
  });
}

function setTab(tab) {
  currentTab = tab;
  renderTabs();
  renderList();
  scrollTo({top: document.querySelector('.tabs').offsetTop - 60, behavior:'smooth'});
}

function renderList() {
  const orders = filterOrders(currentTab);
  const list = document.getElementById('list');

  if (!orders.length) {
    list.innerHTML = `<div class="empty">
      <div class="empty-i">📦</div>
      <div class="empty-t">ยังไม่มีคำสั่งซื้อในหมวดนี้</div>
      <div class="empty-s">เริ่มช้อปและสะสมประวัติการซื้อได้เลย</div>
      <a href="index.html" class="btn btn-k">เริ่มช้อปเลย</a>
    </div>`;
    return;
  }

  list.innerHTML = orders.map(o => renderOrderCard(o)).join('');
}

function renderOrderCard(o) {
  const items = o.items || [];
  const reviewSlip = allSlips.find(s => s.order_id === o.id && s.status === 'pending_review');
  const lastSlip = allSlips.filter(s => s.order_id === o.id).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))[0];
  const lastReq = allRequests.filter(r => r.order_id === o.id).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))[0];

  // Status badge
  let bdg = '';
  if (o.status === 'pending' && reviewSlip) bdg = `<span class="bdg bdg-review">รอตรวจสลิป</span>`;
  else if (o.status === 'pending' && lastSlip?.status === 'rejected') bdg = `<span class="bdg bdg-pending">สลิปถูกปฏิเสธ</span>`;
  else if (o.status === 'pending') bdg = `<span class="bdg bdg-pending">รอชำระเงิน</span>`;
  else if (o.status === 'paid') bdg = `<span class="bdg bdg-paid">จ่ายแล้ว</span>`;
  else if (o.status === 'preparing') bdg = `<span class="bdg bdg-preparing">กำลังเตรียมส่ง</span>`;
  else if (o.status === 'shipping') bdg = `<span class="bdg bdg-shipping">กำลังจัดส่ง</span>`;
  else if (o.status === 'delivered') bdg = `<span class="bdg bdg-delivered">ส่งถึงแล้ว</span>`;
  else if (o.status === 'cancelled') bdg = `<span class="bdg bdg-cancelled">ยกเลิก</span>`;
  else if (o.status === 'refunded') bdg = `<span class="bdg bdg-refunded">คืนเงินแล้ว</span>`;

  // Items preview
  const visibleItems = items.slice(0, 3);
  const itemsHtml = visibleItems.map(it => it.image
    ? `<img src="${it.image}" class="ord-thumb" alt="">`
    : `<div class="ord-thumb-more">${(it.name||'?').charAt(0)}</div>`).join('');
  const moreCount = items.length - 3;
  const itemsMore = moreCount > 0 ? `<div class="ord-thumb-more">+${moreCount}</div>` : '';
  const firstName = items[0]?.name || 'รายการสินค้า';

  // Payment info
  const payInfo = renderPayInfo(o, lastReq, lastSlip, reviewSlip);

  // Actions
  const actions = renderActions(o, lastReq, lastSlip, reviewSlip);

  return `<div class="ord">
    <div class="ord-h">
      <div class="ord-h-l">
        <div class="ord-num">${o.order_number}</div>
        <div class="ord-date">${new Date(o.created_at).toLocaleString('th-TH',{dateStyle:'medium',timeStyle:'short'})}</div>
      </div>
      ${bdg}
    </div>
    <div class="ord-b">
      <div style="display:flex;gap:14px;align-items:center;min-width:0">
        <div class="ord-items">${itemsHtml}${itemsMore}</div>
        <div class="ord-itxt">
          <div class="ord-itxt-1">${firstName}</div>
          <div class="ord-itxt-2">${items.length} รายการ</div>
        </div>
      </div>
      <div class="ord-r">
        <div class="ord-amt">฿${Number(o.total_amount).toLocaleString('th-TH',{minimumFractionDigits:2})}</div>
        <div class="ord-amt-l">รวม</div>
      </div>
    </div>
    ${payInfo ? `<div class="ord-payinfo">${payInfo}<div class="ord-actions">${actions}</div></div>` : ''}
  </div>`;
}

function renderPayInfo(o, req, lastSlip, reviewSlip) {
  const methodIcon = (type, bank) => {
    if (type === 'promptpay') return '<span class="ord-method-ico" style="background:#003D6B;color:#fff;font-size:8px">PP</span>';
    if (type === 'truemoney') return '<span class="ord-method-ico" style="background:#FF7900;color:#fff;font-size:8px">TM</span>';
    if (type === 'credit_card_manual') return '<span class="ord-method-ico" style="background:#262626;color:#fff">💳</span>';
    if (type === 'bank') {
      const b = (bank||'').toLowerCase();
      const colors = {kbank:'#138F2D',scb:'#4D2E83',bbl:'#1E4598',ktb:'#00A4E4'};
      return `<span class="ord-method-ico" style="background:${colors[b]||'#525252'};color:#fff;font-size:8px">${(b||'BK').toUpperCase().slice(0,4)}</span>`;
    }
    return '<span class="ord-method-ico">💰</span>';
  };

  if (o.status === 'pending') {
    if (reviewSlip) {
      return `<div class="ord-payl">
        ${methodIcon(req?.channel_type, req?.channel_snapshot?.bank_code)}
        <span>ส่งสลิปแล้ว <strong>฿${Number(reviewSlip.amount_paid).toLocaleString('th-TH',{minimumFractionDigits:2})}</strong></span>
        <span style="color:var(--g400)">•</span>
        <span>ref: <strong>${reviewSlip.reference_no || '—'}</strong></span>
        <span style="color:var(--g400)">•</span>
        <span>รอตรวจสอบประมาณ 1-3 ชม.</span>
      </div>`;
    }
    if (lastSlip?.status === 'rejected') {
      return `<div class="ord-payl" style="color:var(--red)">
        ⚠ <strong>สลิปถูกปฏิเสธ:</strong>
        <span>${lastSlip.reject_note || rejectReasonLabel(lastSlip.reject_reason) || 'กรุณาส่งสลิปใหม่'}</span>
      </div>`;
    }
    if (req) {
      return `<div class="ord-payl">
        ${methodIcon(req.channel_type, req.channel_snapshot?.bank_code)}
        <span>${req.channel_snapshot?.display_name || req.channel_type}</span>
        <span style="color:var(--g400)">•</span>
        <span>รอชำระ <strong>฿${Number(req.amount).toLocaleString('th-TH',{minimumFractionDigits:2})}</strong></span>
      </div>`;
    }
    return `<div class="ord-payl"><span style="color:var(--am)">⏳ ยังไม่ได้เลือกวิธีชำระ</span></div>`;
  }
  if (o.status === 'shipping' && o.tracking_no) {
    return `<div class="ord-payl">
      🚚 <strong>${o.tracking_carrier || 'ขนส่ง'}</strong>
      <span>•</span>
      <span class="mono" style="font-family:var(--mono)">${o.tracking_no}</span>
    </div>`;
  }
  if (o.status === 'delivered' && o.delivered_at) {
    return `<div class="ord-payl">✓ ส่งถึงเมื่อ ${new Date(o.delivered_at).toLocaleDateString('th-TH',{dateStyle:'medium'})}</div>`;
  }
  if (o.status === 'paid' || o.status === 'preparing') {
    return `<div class="ord-payl">
      ✓ ${methodIcon(req?.channel_type, req?.channel_snapshot?.bank_code)}
      <span>ชำระแล้ว — ผู้ขายกำลังเตรียมพัสดุ</span>
    </div>`;
  }
  return '';
}

function renderActions(o, req, lastSlip, reviewSlip) {
  const actions = [];
  if (o.status === 'pending') {
    if (reviewSlip) {
      actions.push(`<a href="payment-pending.html?order=${o.order_number}" class="btn btn-o">ดูสถานะ</a>`);
    } else if (lastSlip?.status === 'rejected') {
      actions.push(`<a href="payment-pending.html?order=${o.order_number}" class="btn btn-blink">ส่งสลิปใหม่</a>`);
    } else {
      actions.push(`<a href="payment-pending.html?order=${o.order_number}" class="btn btn-blink">ชำระเงิน</a>`);
    }
  } else if (o.status === 'shipping' && o.tracking_no) {
    actions.push(`<a href="tracking.html?order=${o.order_number}" class="btn btn-k">ติดตามพัสดุ</a>`);
  } else if (o.status === 'delivered') {
    actions.push(`<a href="order-detail.html?order=${o.order_number}" class="btn btn-o">รายละเอียด</a>`);
  } else {
    actions.push(`<a href="order-detail.html?order=${o.order_number}" class="btn btn-g">รายละเอียด</a>`);
  }
  return actions.join('');
}

function rejectReasonLabel(r) {
  return ({
    amount_mismatch: 'ยอดเงินไม่ตรง',
    invalid_slip: 'สลิปไม่ชัดเจน',
    wrong_account: 'โอนผิดบัญชี',
    duplicate: 'สลิปซ้ำ',
    other: 'อื่นๆ'
  })[r] || r;
}

loadAll();
</script>
