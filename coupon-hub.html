<style>
:root{
  --black:#0A0A0A; --white:#fff; --red:#E63329;
  --g50:#FAFAFA; --g100:#F2F2F2; --g200:#E5E5E5; --g400:#A3A3A3; --g500:#737373; --g600:#525252; --g800:#262626;
  --green:#16A34A; --gold:#FBBF24; --purple:#7C3AED;
  --font:"DM Sans",system-ui,sans-serif; --mono:"DM Mono",monospace;
  --border:1px solid #E5E5E5; --border-dark:1px solid #0A0A0A;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--g50);color:var(--black);min-height:100vh}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ── HEADER ── */
.hdr{background:var(--black);color:var(--white);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.hdr-logo{font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase}
.hdr-logo .dot{color:var(--red)}
.hdr-back{font-size:13px;display:flex;align-items:center;gap:8px}

/* ── HERO with coin balance + check-in ── */
.hero{background:linear-gradient(135deg,#0A0A0A 0%,#1a1a2e 100%);color:#fff;padding:32px 20px}
.hero-inner{max-width:900px;margin:0 auto}
.hero-title{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase;font-family:var(--mono)}
.hero-h1{font-size:28px;font-weight:700;margin-bottom:24px;display:flex;align-items:center;gap:10px}
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.hero-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);padding:18px}
.hero-card-lbl{font-size:11px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;font-family:var(--mono)}
.hero-card-val{font-size:28px;font-weight:700;display:flex;align-items:baseline;gap:6px}
.hero-card-val .unit{font-size:14px;font-weight:400;color:rgba(255,255,255,.6)}
.hero-card-sub{font-size:12px;color:rgba(255,255,255,.5);margin-top:6px}
.btn-checkin{margin-top:10px;padding:8px 16px;background:var(--red);color:#fff;font-size:12px;letter-spacing:.06em;text-transform:uppercase;width:100%;transition:background .15s}
.btn-checkin:hover{background:#c41f25}
.btn-checkin:disabled{background:#525252;cursor:not-allowed;opacity:.6}
@media(max-width:560px){.hero-grid{grid-template-columns:1fr}.hero-h1{font-size:22px}}

/* ── SPIN WHEEL ── */
.spin-section{background:#fff;padding:24px 20px;border-bottom:var(--border)}
.spin-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:24px}
.spin-info h2{font-size:18px;margin-bottom:4px}
.spin-info p{font-size:12px;color:var(--g500);margin-bottom:14px}
.btn-spin{padding:14px 28px;background:linear-gradient(135deg,#E63329,#FF6B35);color:#fff;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border-radius:0;box-shadow:0 4px 12px rgba(230,51,41,.3)}
.btn-spin:disabled{background:var(--g400);box-shadow:none;cursor:not-allowed}
.spin-wheel-vis{width:140px;height:140px;border-radius:50%;background:conic-gradient(#FBBF24 0 30%,#16A34A 30% 50%,#E63329 50% 60%,#7C3AED 60% 70%,#0A0A0A 70% 100%);position:relative;flex-shrink:0;border:6px solid #0A0A0A;animation:spin 8s linear infinite paused;transition:filter .3s}
.spin-wheel-vis.spinning{animation-play-state:running;animation-duration:0.6s}
.spin-wheel-vis::after{content:'🎁';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:36px;background:#fff;border-radius:50%;width:50px;height:50px;margin:auto}
@keyframes spin{to{transform:rotate(1080deg)}}
@media(max-width:560px){.spin-inner{flex-direction:column;text-align:center}}

/* ── TABS ── */
.tabs-wrap{background:#fff;border-bottom:var(--border);position:sticky;top:0;z-index:10}
.tabs{max-width:900px;margin:0 auto;display:flex;overflow-x:auto;padding:0 20px}
.tab{padding:14px 20px;font-size:13px;font-weight:500;border-bottom:2px solid transparent;white-space:nowrap;color:var(--g500);transition:all .15s}
.tab.on{color:var(--black);border-bottom-color:var(--red)}
.tab .badge{display:inline-block;background:var(--red);color:#fff;font-size:10px;padding:1px 6px;margin-left:4px;border-radius:8px;font-family:var(--mono);font-weight:500}

/* ── COUPON GRID ── */
.main{max-width:900px;margin:0 auto;padding:20px;min-height:50vh}
.section-hd{display:flex;align-items:baseline;justify-content:space-between;margin:20px 0 14px}
.section-title{font-size:14px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;font-family:var(--mono)}
.section-sub{font-size:11px;color:var(--g500)}

.coupon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.coupon-card{background:#fff;border:var(--border);position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s;display:flex;min-height:120px}
.coupon-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.08)}
.coupon-card.expired{opacity:.5}
.coupon-card.used{opacity:.4}
.cc-left{width:90px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;padding:14px 6px;text-align:center;position:relative}
.cc-left::after{content:'';position:absolute;top:0;right:-1px;bottom:0;width:2px;background:repeating-linear-gradient(0deg,var(--g100) 0 4px,transparent 4px 8px)}
.cc-icon{font-size:28px;margin-bottom:6px}
.cc-value{font-size:22px;font-weight:700;line-height:1;font-family:var(--mono)}
.cc-value-unit{font-size:11px;font-weight:500;margin-top:2px;opacity:.85}
.cc-right{flex:1;padding:14px 16px;display:flex;flex-direction:column;justify-content:space-between}
.cc-name{font-size:13px;font-weight:600;margin-bottom:3px;line-height:1.3}
.cc-desc{font-size:11px;color:var(--g500);margin-bottom:8px;line-height:1.4}
.cc-meta{font-size:10px;color:var(--g500);font-family:var(--mono);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.cc-meta .urgent{color:var(--red)}
.cc-actions{display:flex;gap:6px}
.cc-btn{flex:1;padding:8px 12px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;border:1px solid var(--black);background:#fff;color:var(--black);transition:all .15s}
.cc-btn:hover{background:var(--black);color:#fff}
.cc-btn.primary{background:var(--black);color:#fff}
.cc-btn.primary:hover{background:var(--red);border-color:var(--red)}
.cc-btn:disabled{background:var(--g100);color:var(--g400);border-color:var(--g200);cursor:not-allowed}
.cc-code{display:inline-flex;align-items:center;gap:6px;background:var(--g100);padding:5px 10px;font-family:var(--mono);font-size:11px;font-weight:500;border:1px dashed var(--g400);cursor:pointer}
.cc-code:hover{border-color:var(--black);background:#fff}

/* coin badge */
.cc-coin-badge{position:absolute;top:8px;right:8px;background:var(--gold);color:#000;font-size:10px;font-weight:600;padding:2px 7px;font-family:var(--mono);letter-spacing:.04em}

.empty{padding:60px 20px;text-align:center;color:var(--g500)}
.empty-ico{font-size:48px;margin-bottom:12px;opacity:.4}
.empty-title{font-size:15px;font-weight:600;margin-bottom:6px;color:var(--black)}
.empty-sub{font-size:13px}

.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#fafafa 50%,#f0f0f0 75%);background-size:200% 100%;animation:sk 1.4s infinite}
@keyframes sk{to{background-position:-200% 0}}

/* TOAST */
.toast-wrap{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--black);color:#fff;padding:12px 18px;font-size:13px;animation:slideDown .3s ease-out;max-width:90vw;box-shadow:0 8px 20px rgba(0,0,0,.2)}
.toast.ok{background:var(--green)}
.toast.err{background:var(--red)}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}

/* SPIN MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal.on{display:flex}
.modal-card{background:#fff;max-width:380px;width:100%;padding:32px 24px;text-align:center;animation:popIn .4s cubic-bezier(.25,1.5,.5,1)}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.modal-prize-icon{font-size:64px;margin-bottom:12px}
.modal-prize-label{font-size:24px;font-weight:700;margin-bottom:6px}
.modal-prize-sub{font-size:13px;color:var(--g500);margin-bottom:24px}
.modal-btn{padding:14px 32px;background:var(--black);color:#fff;font-size:13px;letter-spacing:.06em;text-transform:uppercase;width:100%}
.modal-btn:hover{background:var(--red)}
</style>
</head>
<body>
<div class="toast-wrap" id="toast-wrap"></div>

<!-- HEADER -->
<div class="hdr">
  <a href="index.html" class="hdr-back">← กลับ</a>
  <a href="index.html" class="hdr-logo">Thailand<span class="dot">.</span>Market</a>
  <a href="profile.html" class="hdr-back" style="font-size:18px">👤</a>
</div>

<!-- HERO with coin + check-in -->
<div class="hero">
  <div class="hero-inner">
    <div class="hero-title">Coupon Hub</div>
    <h1 class="hero-h1">🎟️ ศูนย์รวมคูปอง</h1>
    <div class="hero-grid">
      <div class="hero-card">
        <div class="hero-card-lbl">Coin คงเหลือ</div>
        <div class="hero-card-val"><span id="coin-balance">—</span><span class="unit">🪙</span></div>
        <div class="hero-card-sub" id="coin-tier">รับ coin ฟรีจาก check-in รายวัน</div>
      </div>
      <div class="hero-card">
        <div class="hero-card-lbl">เช็คอินรายวัน</div>
        <div class="hero-card-val"><span id="streak">0</span><span class="unit">วันต่อเนื่อง</span></div>
        <button class="btn-checkin" id="btn-checkin" onclick="doCheckin()">📅 เช็คอินวันนี้</button>
      </div>
    </div>
  </div>
</div>

<!-- SPIN WHEEL -->
<div class="spin-section">
  <div class="spin-inner">
    <div class="spin-wheel-vis" id="spin-wheel"></div>
    <div class="spin-info" style="flex:1">
      <h2>🎰 หมุนวงล้อรับรางวัล</h2>
      <p>ฟรี 1 ครั้งต่อวัน · มีโอกาสได้คูปองสูงสุด ฿100 หรือ Coin ฟรี</p>
      <button class="btn-spin" id="btn-spin" onclick="doSpin()">🎲 หมุนวงล้อเลย!</button>
    </div>
  </div>
</div>

<!-- TABS -->
<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab on" data-tab="available" onclick="switchTab('available')">เก็บได้ <span class="badge" id="b-available">—</span></button>
    <button class="tab" data-tab="mine" onclick="switchTab('mine')">ของฉัน <span class="badge" id="b-mine">—</span></button>
    <button class="tab" data-tab="expiring" onclick="switchTab('expiring')">ใกล้หมดอายุ</button>
    <button class="tab" data-tab="used" onclick="switchTab('used')">ใช้ไปแล้ว</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div id="content">
    <div class="coupon-grid" id="grid">
      <div class="coupon-card skeleton" style="height:120px"></div>
      <div class="coupon-card skeleton" style="height:120px"></div>
      <div class="coupon-card skeleton" style="height:120px"></div>
    </div>
  </div>
</div>

<!-- SPIN RESULT MODAL -->
<div class="modal" id="spin-modal">
  <div class="modal-card">
    <div class="modal-prize-icon" id="prize-icon">🎁</div>
    <div class="modal-prize-label" id="prize-label">ยินดีด้วย!</div>
    <div class="modal-prize-sub" id="prize-sub">คุณได้รางวัลพิเศษ</div>
    <button class="modal-btn" onclick="closeSpinModal()">เยี่ยม! 🎉</button>
  </div>
</div>

<script>
const sb = window._sb;
let currentTab = 'available';
let allCoupons = [];

// ── Toast ─────────────────────────────────────────
function toast(msg, type='') {
  const w = document.getElementById('toast-wrap');
  const t = document.createElement('div');
  t.className = 'toast' + (type ? ' '+type : '');
  t.textContent = msg;
  w.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ── Auth check ────────────────────────────────────
async function ensureAuth() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) {
    location.href = 'login.html?from=' + encodeURIComponent(location.pathname);
    return null;
  }
  return user;
}

// ── โหลด coin balance + check-in status ──────────
async function loadHero() {
  try {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) {
      document.getElementById('coin-balance').textContent = '—';
      document.getElementById('streak').textContent = '0';
      document.getElementById('btn-checkin').disabled = true;
      document.getElementById('btn-checkin').textContent = '🔒 เข้าสู่ระบบก่อน';
      document.getElementById('btn-spin').disabled = true;
      return;
    }

    // coin
    const { data: coins } = await sb.from('user_coins')
      .select('balance,tier,total_earned').eq('user_id', user.id).maybeSingle();
    document.getElementById('coin-balance').textContent = (coins?.balance || 0).toLocaleString();
    const tier = coins?.tier || 'bronze';
    const tierMap = {bronze:'🥉 Bronze',silver:'🥈 Silver',gold:'🥇 Gold',platinum:'💎 Platinum'};
    document.getElementById('coin-tier').textContent = `Tier: ${tierMap[tier]} · ทั้งหมดที่เคยได้: ${(coins?.total_earned||0).toLocaleString()}`;

    // streak (เช็คอินล่าสุดวันไหน)
    const { data: lastCheckin } = await sb.from('daily_checkins')
      .select('streak_day,checkin_date').eq('user_id', user.id)
      .order('checkin_date', { ascending: false }).limit(1).maybeSingle();

    const today = new Date().toISOString().slice(0,10);
    const checkedToday = lastCheckin?.checkin_date === today;

    document.getElementById('streak').textContent = lastCheckin?.streak_day || 0;
    const btn = document.getElementById('btn-checkin');
    if (checkedToday) {
      btn.disabled = true;
      btn.textContent = '✅ เช็คอินแล้ว · กลับมาพรุ่งนี้';
    }

    // เช็คว่าหมุน spin วันนี้แล้วยัง
    const { count: spinToday } = await sb.from('spin_history')
      .select('id', { count:'exact', head:true })
      .eq('user_id', user.id)
      .gte('spin_at', today + 'T00:00:00');
    if (spinToday > 0) {
      const sb2 = document.getElementById('btn-spin');
      sb2.disabled = true;
      sb2.textContent = '🔒 พรุ่งนี้ค่อยมาใหม่';
    }

  } catch(e) { console.error('loadHero:', e); }
}

// ── Daily Check-in ────────────────────────────────
async function doCheckin() {
  const user = await ensureAuth(); if (!user) return;
  const btn = document.getElementById('btn-checkin');
  btn.disabled = true; btn.textContent = '⏳ กำลังเช็คอิน...';
  try {
    const { data, error } = await sb.rpc('daily_checkin');
    if (error) throw error;
    if (!data.success) {
      toast(data.reason || 'เช็คอินไม่สำเร็จ', 'err');
      return;
    }
    toast(`✅ +${data.coins_earned} Coin · streak ${data.streak} วัน`, 'ok');
    await loadHero();
  } catch(e) {
    toast('เกิดข้อผิดพลาด: ' + e.message, 'err');
  } finally {
    if (!btn.disabled) { btn.disabled = false; btn.textContent = '📅 เช็คอินวันนี้'; }
  }
}

// ── Spin Wheel ────────────────────────────────────
async function doSpin() {
  const user = await ensureAuth(); if (!user) return;
  const btn = document.getElementById('btn-spin');
  const wheel = document.getElementById('spin-wheel');
  btn.disabled = true; btn.textContent = '⏳ กำลังหมุน...';
  wheel.classList.add('spinning');

  try {
    const { data, error } = await sb.rpc('spin_wheel');
    // รอ animation ขั้นต่ำ 2 วินาที
    await new Promise(r => setTimeout(r, 2000));
    wheel.classList.remove('spinning');

    if (error) throw error;
    if (!data.success) {
      toast(data.reason || 'หมุนไม่สำเร็จ', 'err');
      return;
    }

    // แสดงผลรางวัล
    document.getElementById('prize-icon').textContent = data.icon || '🎁';
    document.getElementById('prize-label').textContent = data.label;
    document.getElementById('prize-sub').textContent =
      data.type === 'coupon' ? '✓ คูปองถูกเก็บเข้าคลังของคุณแล้ว' :
      data.type === 'coin'   ? `✓ +${data.coin_amount} Coin ถูกเพิ่มเข้าบัญชี` :
      'โอกาสหน้าค่อยลองใหม่นะ!';
    document.getElementById('spin-modal').classList.add('on');

    await loadHero();
  } catch(e) {
    wheel.classList.remove('spinning');
    toast('เกิดข้อผิดพลาด: ' + e.message, 'err');
  }
}
function closeSpinModal() {
  document.getElementById('spin-modal').classList.remove('on');
  loadCoupons(currentTab);
}

// ── Switch Tab ────────────────────────────────────
function switchTab(name) {
  currentTab = name;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('on', t.dataset.tab === name);
  });
  loadCoupons(name);
}

// ── Load Coupons ──────────────────────────────────
async function loadCoupons(tab) {
  const grid = document.getElementById('grid');
  grid.innerHTML = `<div class="coupon-card skeleton" style="height:120px"></div>
    <div class="coupon-card skeleton" style="height:120px"></div>
    <div class="coupon-card skeleton" style="height:120px"></div>`;

  try {
    let coupons = [];
    const { data: { user } } = await sb.auth.getUser();

    if (tab === 'available') {
      // คูปองที่ยังไม่ได้เก็บ + เก็บได้
      const { data, error } = await sb.rpc('get_available_coupons', { p_cart_total: 0 });
      if (error) throw error;
      coupons = (data || []).filter(c => !c.claimed);
      document.getElementById('b-available').textContent = coupons.length;
    } else if (tab === 'mine') {
      if (!user) { renderEmpty(grid, '🔒', 'ต้องเข้าสู่ระบบก่อน', 'เข้าสู่ระบบเพื่อดูคูปองของคุณ', 'login.html'); return; }
      const { data, error } = await sb.rpc('get_my_coupons', { p_filter: 'unused' });
      if (error) throw error;
      coupons = data || [];
      document.getElementById('b-mine').textContent = coupons.length;
    } else if (tab === 'expiring') {
      if (!user) { renderEmpty(grid, '🔒', 'ต้องเข้าสู่ระบบก่อน', 'เข้าสู่ระบบเพื่อดูคูปองของคุณ', 'login.html'); return; }
      const { data, error } = await sb.rpc('get_my_coupons', { p_filter: 'unused' });
      if (error) throw error;
      coupons = (data || []).filter(c => c.days_left !== null && c.days_left <= 3);
    } else if (tab === 'used') {
      if (!user) { renderEmpty(grid, '🔒', 'ต้องเข้าสู่ระบบก่อน', 'เข้าสู่ระบบเพื่อดูประวัติ', 'login.html'); return; }
      const { data, error } = await sb.rpc('get_my_coupons', { p_filter: 'used' });
      if (error) throw error;
      coupons = data || [];
    }

    allCoupons = coupons;
    renderCoupons(coupons, tab);

  } catch(e) {
    console.error('loadCoupons:', e);
    grid.innerHTML = `<div class="empty"><div class="empty-ico">⚠️</div>
      <div class="empty-title">โหลดข้อมูลไม่สำเร็จ</div>
      <div class="empty-sub">${e.message}</div></div>`;
  }
}

function renderEmpty(grid, ico, title, sub, link) {
  grid.innerHTML = `<div style="grid-column:1/-1" class="empty">
    <div class="empty-ico">${ico}</div>
    <div class="empty-title">${title}</div>
    <div class="empty-sub">${sub}</div>
    ${link ? `<a href="${link}" style="display:inline-block;margin-top:14px;padding:10px 20px;background:var(--black);color:#fff;font-size:12px;letter-spacing:.06em;text-transform:uppercase">เข้าสู่ระบบ →</a>` : ''}
  </div>`;
}

function renderCoupons(coupons, tab) {
  const grid = document.getElementById('grid');
  if (!coupons.length) {
    const messages = {
      available: ['🎟️','ยังไม่มีคูปองให้เก็บ','รอรอบใหม่ที่จะปล่อยเร็วๆ นี้'],
      mine: ['📭','ยังไม่มีคูปองในคลัง','ไปเก็บคูปองในแท็บ "เก็บได้" กันก่อน!'],
      expiring: ['⏰','ไม่มีคูปองใกล้หมดอายุ','คูปองทั้งหมดยังใช้ได้ปกติ'],
      used: ['📜','ยังไม่เคยใช้คูปอง','คูปองที่ใช้ไปแล้วจะแสดงที่นี่']
    };
    const [ico,title,sub] = messages[tab] || messages.available;
    renderEmpty(grid, ico, title, sub);
    return;
  }

  grid.innerHTML = coupons.map(c => {
    const valStr = c.type === 'percent'  ? `${c.value}%` :
                   c.type === 'shipping' ? 'ส่งฟรี'      :
                   c.type === 'cashback' ? `+${c.value}%` :
                   `฿${Number(c.value).toLocaleString()}`;
    const valUnit = c.type === 'percent' ? 'OFF' :
                    c.type === 'cashback' ? 'CASHBACK' :
                    c.type === 'shipping' ? '' : 'OFF';
    const minOrderTxt = c.min_order > 0 ? `ขั้นต่ำ ฿${c.min_order}` : 'ไม่มีขั้นต่ำ';
    const dl = c.days_left;
    const dlTxt = dl === null ? '' : (dl <= 0 ? 'หมดวันนี้' : dl <= 3 ? `เหลือ ${dl} วัน` : `${dl} วัน`);
    const dlClass = (dl !== null && dl <= 3) ? 'urgent' : '';

    let actions = '';
    if (tab === 'available') {
      const coinCost = c.coin_cost || 0;
      const claimLabel = coinCost > 0 ? `🪙 แลก ${coinCost}` : '+ เก็บ';
      actions = `<button class="cc-btn primary" onclick="claimCoupon('${c.id}','${c.name.replace(/'/g,"\\'")}')">${claimLabel}</button>
                 <button class="cc-btn" onclick="copyCode('${c.code}')">📋 ${c.code}</button>`;
    } else if (tab === 'mine' || tab === 'expiring') {
      actions = `<button class="cc-btn primary" onclick="useCoupon('${c.code}')">🛒 ไปใช้</button>
                 <button class="cc-btn" onclick="copyCode('${c.code}')">📋 Copy</button>`;
    } else if (tab === 'used') {
      actions = `<button class="cc-btn" disabled>✓ ใช้ไปแล้ว</button>`;
    }

    return `<div class="coupon-card ${tab==='used'?'used':''} ${dl !== null && dl < 0 ? 'expired' : ''}">
      <div class="cc-left" style="background:${c.banner_color||'#E63329'}">
        <div class="cc-icon">${c.icon || '🎟️'}</div>
        <div class="cc-value">${valStr}</div>
        ${valUnit ? `<div class="cc-value-unit">${valUnit}</div>` : ''}
      </div>
      <div class="cc-right">
        <div>
          <div class="cc-name">${c.name}</div>
          ${c.description ? `<div class="cc-desc">${c.description}</div>` : ''}
          <div class="cc-meta">${minOrderTxt} ${dlTxt ? '· <span class="'+dlClass+'">'+dlTxt+'</span>' : ''}</div>
        </div>
        <div class="cc-actions">${actions}</div>
      </div>
    </div>`;
  }).join('');
}

// ── Claim coupon ──────────────────────────────────
async function claimCoupon(couponId, name) {
  const user = await ensureAuth(); if (!user) return;
  try {
    const { data, error } = await sb.rpc('claim_coupon', { p_coupon_id: couponId });
    if (error) throw error;
    if (!data.success) {
      toast(data.reason || 'เก็บไม่สำเร็จ', 'err');
      return;
    }
    toast(`✅ เก็บคูปอง "${name}" สำเร็จ`, 'ok');
    await loadHero();
    await loadCoupons(currentTab);
  } catch(e) {
    toast('เกิดข้อผิดพลาด: ' + e.message, 'err');
  }
}

function copyCode(code) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(code).then(() => toast('📋 คัดลอก ' + code, 'ok'));
  } else {
    const ta = document.createElement('textarea'); ta.value = code; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); ta.remove();
    toast('📋 คัดลอก ' + code, 'ok');
  }
}

function useCoupon(code) {
  // ไป checkout พร้อม pre-fill code
  location.href = `checkout.html?coupon=${encodeURIComponent(code)}`;
}

// ── INIT ──────────────────────────────────────────
(async function init() {
  await loadHero();
  await loadCoupons('available');
})();
</script>
</body>
</html>
