<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — การชำระเงิน · Thailand Market</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{--black:#0A0A0A;--red:#E63329;--g50:#FAFAFA;--g100:#F5F5F5;--g200:#E5E5E5;--g500:#737373;--g700:#404040;--g900:#171717;--green:#16A34A;--orange:#F97316;--blue:#2563EB}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--g50);color:var(--g900);font-size:14px;display:flex;min-height:100vh}
a{text-decoration:none;color:inherit}
.sidebar{width:240px;background:var(--black);color:#fff;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.sb-logo{padding:22px;font-weight:800;font-size:18px;border-bottom:1px solid rgba(255,255,255,0.08)}
.sb-logo .dot{color:var(--red)}
.sb-sub{display:block;font-size:10px;color:rgba(255,255,255,0.4);font-weight:500;letter-spacing:1px;margin-top:2px}
.sb-section{padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
.sb-label{padding:0 18px 8px;font-size:10px;font-weight:600;color:rgba(255,255,255,0.3);letter-spacing:1.2px;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:11px;padding:11px 18px;font-size:13px;color:rgba(255,255,255,0.65);cursor:pointer;border-left:3px solid transparent}
.sb-item:hover{background:rgba(255,255,255,0.05);color:#fff}
.sb-item.active{background:rgba(255,255,255,0.08);color:#fff;border-left-color:var(--red)}
.main{flex:1;display:flex;flex-direction:column;overflow-x:hidden}
.topbar{background:#fff;border-bottom:1px solid var(--g200);padding:14px 24px}
.topbar h1{font-size:18px;font-weight:700}
.topbar .crumb{font-size:12px;color:var(--g500)}
.content{padding:20px 24px;flex:1}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:#fff;padding:16px;border:1px solid var(--g200);border-radius:6px;cursor:pointer}
.stat-card.active{border-color:var(--black);background:var(--g100)}
.stat-label{font-size:11px;color:var(--g500);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;font-weight:600}
.stat-val{font-size:24px;font-weight:700;font-family:'DM Mono',monospace}
.table-wrap{background:#fff;border:1px solid var(--g200);border-radius:6px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 14px;font-size:11px;color:var(--g500);text-transform:uppercase;background:var(--g50);border-bottom:1px solid var(--g200)}
td{padding:14px;border-bottom:1px solid var(--g100)}
tr.row{cursor:pointer}
tr.row:hover{background:var(--g50)}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 10px;border-radius:3px;font-weight:600;font-family:'DM Mono',monospace}
.b-pending{background:#FEF3C7;color:#92400E}
.b-paid{background:#DCFCE7;color:#166534}
.b-failed{background:#FEE2E2;color:#991B1B}
.empty,.loading{text-align:center;padding:60px 20px;color:var(--g500)}
.btn{padding:6px 12px;border:1px solid var(--g200);background:#fff;font-size:11px;border-radius:4px;cursor:pointer;font-weight:600}
.btn-success{background:var(--green);color:#fff;border-color:var(--green)}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sb-logo">Thailand<span class="dot">.</span>Market<span class="sb-sub">ADMIN PANEL</span></div>
  <div class="sb-section">
    <div class="sb-label">หลัก</div>
    <a href="admin-cms.html"><div class="sb-item"><span>📊</span>Dashboard</div></a>
    <a href="admin-cms.html"><div class="sb-item"><span>📦</span>สินค้า</div></a>
    <a href="admin-orders.html"><div class="sb-item"><span>🛒</span>ออเดอร์</div></a>
    <a href="admin-payments.html"><div class="sb-item active"><span>💳</span>การชำระเงิน</div></a>
    <a href="admin-shipping.html"><div class="sb-item"><span>🚚</span>จัดส่ง</div></a>
  </div>
  <div class="sb-section">
    <div class="sb-label">ตั้งค่า</div>
    <a href="admin-providers.html"><div class="sb-item"><span>⚙️</span>Payment & Shipping</div></a>
    <a href="index.html"><div class="sb-item"><span>🏠</span>กลับสู่เว็บไซต์</div></a>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="crumb">Admin · Payments</div>
    <h1>💳 การชำระเงิน</h1>
  </div>
  <div class="content">
    <div class="stats">
      <div class="stat-card active" data-status="all"><div class="stat-label">ทั้งหมด</div><div class="stat-val" id="cnt-all">0</div></div>
      <div class="stat-card" data-status="pending"><div class="stat-label" style="color:#92400E">⏳ รอตรวจสอบ</div><div class="stat-val" id="cnt-pending">0</div></div>
      <div class="stat-card" data-status="paid"><div class="stat-label" style="color:#166534">✓ สำเร็จ</div><div class="stat-val" id="cnt-paid">0</div></div>
      <div class="stat-card" data-status="failed"><div class="stat-label" style="color:#991B1B">✕ ล้มเหลว</div><div class="stat-val" id="cnt-failed">0</div></div>
    </div>
    <div class="table-wrap">
      <div id="payments-body"><div class="loading">⏳ กำลังโหลด...</div></div>
    </div>
  </div>
</div>

<script>
const sb = supabase.createClient('https://qmgyimsptzewwyafvjzk.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtZ3lpbXNwdHpld3d5YWZ2anprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NjA4NDIsImV4cCI6MjA5MzAzNjg0Mn0.pcexjwmQndb_RhZHfKVZ6m2_21sn09iNAMyESjLOVJ0');
window._sb = sb;
let _payments = []; let _filter = 'all';

const PAY_ICON = {credit:'💳',qr:'📱',install:'🏦',counter:'🏪'};
const PAY_LABEL = {credit:'บัตรเครดิต',qr:'QR PromptPay',install:'ผ่อน 0%',counter:'Counter Service'};

async function load(){
  const { data:{ session } } = await sb.auth.getSession();
  if (!session){ location.href='login.html?from=admin-payments.html'; return; }
  
  const { data, error } = await sb.from('payments')
    .select('*, orders(order_number, total, shipping_address)')
    .order('created_at', {ascending:false}).limit(500);
  if (error){ document.getElementById('payments-body').innerHTML = `<div class="empty">⚠️ ${error.message}</div>`; return; }
  
  _payments = data || [];
  updateStats();
  render();
}

function updateStats(){
  const c = {all:_payments.length, pending:0, paid:0, failed:0};
  _payments.forEach(p => { if(c[p.status]!==undefined) c[p.status]++; });
  document.getElementById('cnt-all').textContent = c.all;
  document.getElementById('cnt-pending').textContent = c.pending;
  document.getElementById('cnt-paid').textContent = c.paid;
  document.getElementById('cnt-failed').textContent = c.failed;
}

function render(){
  let list = [..._payments];
  if (_filter !== 'all') list = list.filter(p => p.status === _filter);
  
  const body = document.getElementById('payments-body');
  if (!list.length){ body.innerHTML = `<div class="empty">📭 ไม่มีรายการ</div>`; return; }
  
  body.innerHTML = `<table>
    <thead><tr>
      <th>วันที่</th><th>ออเดอร์</th><th>ลูกค้า</th><th>วิธีชำระ</th><th>บัตร/Ref</th>
      <th style="text-align:right">ยอด</th><th>สถานะ</th><th></th>
    </tr></thead>
    <tbody>${list.map(p=>{
      const o = p.orders || {};
      const a = o.shipping_address || {};
      const card = p.card_brand ? `${p.card_brand} ····${p.card_last4||''}` : (p.qr_ref || p.counter_ref || '-');
      const dateStr = new Date(p.created_at).toLocaleDateString('th-TH',{day:'numeric',month:'short'}) + ' · ' + new Date(p.created_at).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
      const stClass = p.status==='paid'?'b-paid':(p.status==='failed'?'b-failed':'b-pending');
      const stLabel = p.status==='paid'?'✓ ชำระแล้ว':(p.status==='failed'?'✕ ล้มเหลว':'⏳ รอ');
      return `<tr class="row" onclick="goToOrder('${o.order_number||''}')">
        <td style="font-size:11px;color:var(--g500)">${dateStr}</td>
        <td style="font-family:'DM Mono',monospace;font-size:12px;font-weight:600">${o.order_number||'-'}</td>
        <td>${a.name||'-'}</td>
        <td>${PAY_ICON[p.method]||''} ${PAY_LABEL[p.method]||p.method}</td>
        <td style="font-family:'DM Mono',monospace;font-size:11px">${card}</td>
        <td style="text-align:right;font-family:'DM Mono',monospace;font-weight:700">฿${Number(p.amount).toLocaleString()}</td>
        <td><span class="badge ${stClass}">${stLabel}</span></td>
        <td>${p.status==='pending'?`<button class="btn btn-success" onclick="event.stopPropagation();confirmPay('${p.id}','${o.order_number||''}','${p.user_id}')">ยืนยัน</button>`:''}</td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

function goToOrder(num){ if(num) location.href = 'admin-order-detail.html?order=' + num; }

async function confirmPay(payId, orderNum, userId){
  if (!confirm('ยืนยันการรับชำระสำหรับ ' + orderNum + '?')) return;
  try {
    const { data:{ user } } = await sb.auth.getUser();
    await sb.from('payments').update({status:'paid', confirmed_at: new Date().toISOString()}).eq('id', payId);
    
    // get order id
    const { data:o } = await sb.from('orders').select('id').eq('order_number', orderNum).maybeSingle();
    if (o){
      await sb.from('orders').update({
        status:'paid',
        payment_confirmed_at: new Date().toISOString(),
        payment_confirmed_by: user?.id || null
      }).eq('id', o.id);
      await sb.from('order_tracking').insert({
        order_id: o.id, status:'paid',
        description:'ยืนยันการชำระเงินโดย admin'
      });
      await sb.from('notifications').insert({
        user_id: userId, type:'order',
        title: 'ชำระเงินยืนยันแล้ว ✅',
        message: `ออเดอร์ ${orderNum} ของคุณยืนยันแล้ว`,
        link:'order-history.html', icon:'✅', is_read:false
      });
    }
    load();
  } catch(e){ alert(e.message); }
}

document.querySelectorAll('.stat-card').forEach(card => {
  card.addEventListener('click', ()=>{
    document.querySelectorAll('.stat-card').forEach(c=>c.classList.remove('active'));
    card.classList.add('active');
    _filter = card.dataset.status;
    render();
  });
});

load();
</script>
</body>
</html>
