<!DOCTYPE html>
<html lang="th">
<head>
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests; object-src 'none'; base-uri 'self'">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<!-- ── CACHE BUSTING ─────────────────────────────────────── -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="version" content="2026-05-06-v3">
<title>บทความ · Thailand Market</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" data-cfasync="false"></script>
<style>
:root{--black:#0A0A0A;--white:#FAFAFA;--red:#E63329;
  --g50:#F5F5F5;--g100:#EEEEEE;--g200:#E5E5E5;--g300:#D4D4D4;--g400:#A3A3A3;--g500:#737373;--g600:#525252;--g700:#262626;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;--border:1px solid #E5E5E5;}
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:var(--sans);color:var(--black);background:var(--white);font-size:14px;line-height:1.5}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}

.tnav{height:60px;border-bottom:var(--border);background:var(--white);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50}
.tnav-l{display:flex;align-items:center;gap:24px}
.tnav-logo{font-weight:700;font-size:15px;letter-spacing:-.01em}
.tnav-logo span{color:var(--red)}

.hero{padding:48px 24px 32px;text-align:center;border-bottom:var(--border);background:#fff}
.hero-eyebrow{font-family:var(--mono);font-size:11px;color:var(--red);letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px}
.hero-title{font-size:42px;font-weight:700;letter-spacing:-.02em;margin-bottom:10px}
.hero-sub{font-size:15px;color:var(--g600);max-width:560px;margin:0 auto}
@media(max-width:780px){.hero-title{font-size:28px}}

.cats-bar{position:sticky;top:60px;background:#fff;z-index:40;border-bottom:var(--border);padding:12px 24px;overflow-x:auto;white-space:nowrap}
.cats-inner{display:inline-flex;gap:6px;max-width:100%}
.cat-btn{padding:8px 16px;font-size:12px;font-family:var(--mono);letter-spacing:.04em;text-transform:uppercase;background:#fff;border:var(--border);cursor:pointer;color:var(--g600);transition:all .15s;white-space:nowrap}
.cat-btn:hover{border-color:var(--black);color:var(--black)}
.cat-btn.on{background:var(--black);color:#fff;border-color:var(--black);font-weight:600}

.wrap{max-width:1280px;margin:0 auto;padding:32px 24px 64px}

.featured{margin-bottom:48px}
.fa-card{display:grid;grid-template-columns:1fr 1fr;gap:32px;padding:32px;background:#fff;border:var(--border);text-decoration:none;color:inherit;transition:all .15s;cursor:pointer}
.fa-card:hover{border-color:var(--black);transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,.06)}
@media(max-width:780px){.fa-card{grid-template-columns:1fr;padding:18px;gap:18px}}
.fa-cover{aspect-ratio:16/10;background:var(--g100);display:flex;align-items:center;justify-content:center;font-size:64px;overflow:hidden}
.fa-cover img{width:100%;height:100%;object-fit:cover}
.fa-info{display:flex;flex-direction:column;justify-content:center}
.fa-eyebrow{font-family:var(--mono);font-size:10px;color:var(--red);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.fa-eyebrow .dot{width:5px;height:5px;background:var(--red);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fa-title{font-size:30px;font-weight:700;letter-spacing:-.01em;line-height:1.15;margin-bottom:12px}
@media(max-width:780px){.fa-title{font-size:22px}}
.fa-excerpt{font-size:14px;color:var(--g600);line-height:1.6;margin-bottom:18px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.fa-meta{display:flex;align-items:center;gap:14px;font-family:var(--mono);font-size:11px;color:var(--g500);letter-spacing:.04em}

.section-hd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:20px}
.section-title{font-size:18px;font-weight:700}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
@media(max-width:980px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:580px){.grid{grid-template-columns:1fr}}

.card{background:#fff;border:var(--border);display:flex;flex-direction:column;cursor:pointer;text-decoration:none;color:inherit;transition:all .15s}
.card:hover{border-color:var(--black);transform:translateY(-3px);box-shadow:0 10px 24px rgba(0,0,0,.08)}
.card-cover{aspect-ratio:16/10;background:var(--g100);display:flex;align-items:center;justify-content:center;font-size:42px;overflow:hidden;position:relative}
.card-cover img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.card:hover .card-cover img{transform:scale(1.04)}
.card-cat{position:absolute;top:10px;left:10px;background:rgba(255,255,255,.95);padding:3px 8px;font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--g700)}
.card-info{padding:16px 18px;flex:1;display:flex;flex-direction:column;gap:8px}
.card-title{font-size:15px;font-weight:600;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-excerpt{font-size:12px;color:var(--g600);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-top:auto}
.card-meta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--g500);letter-spacing:.04em;padding-top:10px;border-top:1px solid #F5F5F5;margin-top:auto}

.empty{text-align:center;padding:80px 24px;color:var(--g500)}
.empty-ico{font-size:48px;opacity:.3;margin-bottom:14px}

.skel{height:300px;background:linear-gradient(90deg,#f5f5f5 25%,#fafafa 50%,#f5f5f5 75%);background-size:200% 100%;animation:sk 1.4s infinite;border:var(--border)}
@keyframes sk{to{background-position:-200% 0}}
</style>
</head>
<body>

<nav class="tnav">
  <div class="tnav-l">
    <a href="index.html" class="tnav-logo">Thailand <span>Market</span></a>
    <a href="index.html" style="font-size:13px;color:var(--g600)">← กลับหน้าหลัก</a>
  </div>
  <div style="display:flex;align-items:center;gap:14px">
    <a href="cart.html" title="ตะกร้า" style="position:relative;text-decoration:none;color:var(--g600);font-size:18px">🛒<span id="cart-badge" style="display:none;position:absolute;top:-6px;right:-8px;background:#E63329;color:#fff;font-size:9px;padding:1px 5px;border-radius:8px;font-family:'DM Mono',monospace;font-weight:600;min-width:16px;text-align:center;line-height:1.4">0</span></a>
    <a href="profile.html" title="บัญชี" style="text-decoration:none;color:var(--g600);font-size:18px">👤</a>
    <div style="font-family:var(--mono);font-size:11px;color:var(--g500);letter-spacing:.06em;text-transform:uppercase">📰 บทความ</div>
  </div>
</nav>

<div class="hero">
  <div class="hero-eyebrow">Editorial · Insights</div>
  <div class="hero-title">บทความ & เคล็ดลับช้อปปิ้ง</div>
  <div class="hero-sub">รวมบทความน่าสนใจ คู่มือ และเทรนด์ใหม่ — อัปเดตทุกสัปดาห์</div>
</div>

<div class="cats-bar">
  <div class="cats-inner" id="cats-inner">
    <button class="cat-btn on" data-slug="" onclick="setCategory('')">📋 ทั้งหมด</button>
  </div>
</div>

<div class="wrap">
  <!-- Featured (only on default view) -->
  <div class="featured" id="featured-wrap" style="display:none">
    <a class="fa-card" id="featured-card"></a>
  </div>

  <div class="section-hd">
    <div class="section-title" id="list-title">📰 บทความล่าสุด</div>
  </div>
  <div class="grid" id="grid">
    <div class="skel"></div><div class="skel"></div><div class="skel"></div>
    <div class="skel"></div><div class="skel"></div><div class="skel"></div>
  </div>
</div>

<script>
const sb = supabase.createClient(
  'https://qmgyimsptzewwyafvjzk.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtZ3lpbXNwdHpld3d5YWZ2anprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NjA4NDIsImV4cCI6MjA5MzAzNjg0Mn0.pcexjwmQndb_RhZHfKVZ6m2_21sn09iNAMyESjLOVJ0'
);

const params = new URLSearchParams(location.search);
let _currentCat = params.get('cat') || '';
let _allCats = [];

function escapeHtml(s){return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diffDay = Math.floor((now - d) / 86400000);
  if (diffDay === 0) return 'วันนี้';
  if (diffDay === 1) return 'เมื่อวาน';
  if (diffDay < 7) return diffDay + ' วันก่อน';
  return d.toLocaleDateString('th-TH', { day:'numeric', month:'short', year:'2-digit' });
}

async function loadCategories() {
  try {
    const { data } = await sb.from('article_categories').select('*')
      .eq('is_active', true).order('sort_order');
    _allCats = data || [];
    const wrap = document.getElementById('cats-inner');
    wrap.innerHTML = '<button class="cat-btn ' + (_currentCat===''?'on':'') + '" data-slug="" onclick="setCategory(\'\')">📋 ทั้งหมด</button>'
      + _allCats.map(c => `<button class="cat-btn ${_currentCat===c.slug?'on':''}" data-slug="${c.slug}" onclick="setCategory('${c.slug}')">${c.icon||'📰'} ${escapeHtml(c.name)}</button>`).join('');
  } catch(e) {}
}

function setCategory(slug) {
  _currentCat = slug;
  // update URL without reload
  const url = new URL(location.href);
  if (slug) url.searchParams.set('cat', slug); else url.searchParams.delete('cat');
  history.replaceState({}, '', url);
  // update buttons
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('on', b.dataset.slug === slug));
  loadArticles();
}

async function loadArticles() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '<div class="skel"></div>'.repeat(6);

  try {
    // Featured (only when no category filter)
    if (!_currentCat) {
      const { data: feat } = await sb.rpc('get_articles', { p_category_slug:null, p_featured:true, p_limit:1 });
      if (feat?.length) renderFeatured(feat[0]);
      else document.getElementById('featured-wrap').style.display = 'none';
    } else {
      document.getElementById('featured-wrap').style.display = 'none';
    }

    // List
    const { data, error } = await sb.rpc('get_articles', {
      p_category_slug: _currentCat || null,
      p_featured: null,
      p_limit: 24
    });
    if (error) throw error;

    const cat = _allCats.find(c => c.slug === _currentCat);
    document.getElementById('list-title').textContent = cat
      ? `${cat.icon||''} ${cat.name} (${data?.length||0})`
      : `📰 บทความล่าสุด (${data?.length||0})`;

    if (!data?.length) {
      grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
        <div class="empty-ico">📭</div>
        <div style="font-size:16px;font-weight:600;color:var(--g700);margin-bottom:6px">ยังไม่มีบทความ${cat?'ในหมวดนี้':''}</div>
        <div>ลองเลือกหมวดอื่น หรือกลับมาดูใหม่</div></div>`;
      return;
    }

    grid.innerHTML = data.map(a => `<a class="card" href="article.html?slug=${a.slug}">
      <div class="card-cover">
        ${a.cover_image ? `<img src="${a.cover_image}" alt="" loading="lazy">` : '📰'}
        ${a.category_name ? `<div class="card-cat">${a.category_icon||''} ${escapeHtml(a.category_name)}</div>` : ''}
      </div>
      <div class="card-info">
        <div class="card-title">${escapeHtml(a.title)}</div>
        ${a.excerpt ? `<div class="card-excerpt">${escapeHtml(a.excerpt)}</div>` : ''}
        <div class="card-meta">
          <span>${formatDate(a.published_at)}</span>
          <span>⏱ ${a.read_minutes||3}min · ❤️ ${a.like_count||0}</span>
        </div>
      </div>
    </a>`).join('');
  } catch(e) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <div class="empty-ico">⚠️</div>
      <div style="color:var(--red);margin-bottom:6px">${e.message}</div>
      <div style="font-size:11px">รัน ARTICLES-AND-REVIEWS-SETUP.sql ใน Supabase</div></div>`;
  }
}

function renderFeatured(a) {
  const wrap = document.getElementById('featured-wrap');
  const card = document.getElementById('featured-card');
  wrap.style.display = 'block';
  card.href = `article.html?slug=${a.slug}`;
  card.innerHTML = `
    <div class="fa-cover">${a.cover_image ? `<img src="${a.cover_image}" alt="">` : '📰'}</div>
    <div class="fa-info">
      <div class="fa-eyebrow"><div class="dot"></div>Featured · ${escapeHtml(a.category_name||'บทความเด่น')}</div>
      <div class="fa-title">${escapeHtml(a.title)}</div>
      ${a.excerpt ? `<div class="fa-excerpt">${escapeHtml(a.excerpt)}</div>` : ''}
      <div class="fa-meta">
        <span>📅 ${formatDate(a.published_at)}</span>
        <span>⏱ ${a.read_minutes||3} min</span>
        <span>❤️ ${a.like_count||0}</span>
        <span>👁 ${(a.view_count||0).toLocaleString()}</span>
      </div>
    </div>`;
}

(async function init() {
  await loadCategories();
  await loadArticles();
})();
</script>

<!-- ── Shared Cart Badge Auto-Update (injected 2026-05-07) ── -->
<script>
(function(){
  function tmUpdateCartBadge(){
    try {
      const cart = JSON.parse(localStorage.getItem('tm_cart') || '[]');
      const count = cart.reduce((s, i) => s + (Number(i.qty) || 1), 0);
      const ids = ['cart-badge','cart-count','cart-float-count','dd-cart-count'];
      ids.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        if (id === 'cart-float-count') {
          el.textContent = count > 0 ? '(' + count + ' รายการ)' : '';
        } else {
          el.textContent = count > 99 ? '99+' : count;
          // hide badge if 0 (only badge-style elements, not labels)
          if (id === 'cart-badge' && el.classList.contains('nav-badge')) {
            el.style.display = count > 0 ? '' : 'none';
          }
        }
      });
      // ปุ่ม float (ถ้ามี)
      const cf = document.getElementById('cart-float');
      if (cf) cf.classList.toggle('show', count > 0);
    } catch(e) { /* ignore */ }
  }
  // Run on load + listen for changes
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', tmUpdateCartBadge);
  } else {
    tmUpdateCartBadge();
  }
  // ฟังการเปลี่ยน tm_cart จาก tab อื่น
  window.addEventListener('storage', e => {
    if (e.key === 'tm_cart') tmUpdateCartBadge();
  });
  // Re-check ทุก 3 วินาที (เผื่อ same-tab race)
  setInterval(tmUpdateCartBadge, 3000);
  // Expose ให้เรียกได้จาก inline scripts
  window.tmUpdateCartBadge = tmUpdateCartBadge;
})();
</script>
</body>
</html>
