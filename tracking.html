<html lang="th">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--accent:#E63329;--g100:#F5F5F5;--g200:#E5E5E5;--g300:#D4D4D4;--g400:#A3A3A3;--g500:#737373;--g700:#404040;--g900:#171717;--gn:#10B981;--mono:'DM Mono',monospace}
body{font-family:'IBM Plex Sans Thai','Inter',sans-serif;background:#FAFAFA;color:#0A0A0A;font-size:14px;min-height:100vh}
.nav{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--g200);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;z-index:100}
.logo{font-family:'Inter';font-weight:800;font-size:18px;text-decoration:none;color:#0A0A0A}.logo .dot{color:var(--accent)}
.back{padding:6px 12px;background:#fff;border:1px solid var(--g200);border-radius:4px;text-decoration:none;color:var(--g700);font-size:12px;cursor:pointer;font-family:inherit}
.back:hover{background:var(--g100)}
.main{padding:24px 16px;max-width:780px;margin:0 auto}
h1{font-size:24px;font-weight:700;margin-bottom:6px}
.sub{font-size:13px;color:var(--g500);margin-bottom:20px}

.search-card{background:#fff;border:1px solid var(--g200);border-radius:8px;padding:20px;margin-bottom:18px}
.search-row{display:flex;gap:8px}
.search-inp{flex:1;padding:11px 14px;border:1px solid var(--g200);border-radius:6px;font-family:inherit;font-size:14px}
.search-inp:focus{outline:none;border-color:#0A0A0A}
.btn{padding:11px 20px;background:#0A0A0A;color:#fff;border:none;border-radius:6px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
.btn:hover{background:#262626}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-out{background:#fff;color:var(--g700);border:1px solid var(--g200)}

.empty{padding:50px 20px;text-align:center;color:var(--g500)}
.empty-icon{font-size:48px;margin-bottom:12px}

.order-card{background:#fff;border:1px solid var(--g200);border-radius:8px;overflow:hidden;margin-bottom:14px}
.order-head{padding:18px 20px;background:linear-gradient(135deg,#E63329 0%,#B5261F 100%);color:#fff}
.order-head-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
.order-num{font-family:var(--mono);font-size:13px;font-weight:600;opacity:.85;margin-bottom:4px}
.order-status-big{font-size:22px;font-weight:700;margin-bottom:4px}
.order-status-desc{font-size:12px;opacity:.85}
.order-amount{text-align:right}
.order-amount-val{font-family:var(--mono);font-size:24px;font-weight:700}
.order-amount-lbl{font-size:11px;opacity:.85}

.steps-wrap{padding:24px 20px;background:#fff}
.steps{display:flex;justify-content:space-between;position:relative;margin-bottom:8px}
.steps::before{content:'';position:absolute;top:18px;left:18px;right:18px;height:2px;background:var(--g200);z-index:0}
.steps-progress{position:absolute;top:18px;left:18px;height:2px;background:var(--accent);z-index:1;transition:width .5s}
.step{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;flex:1}
.step-ico{width:38px;height:38px;border-radius:50%;background:#fff;border:2px solid var(--g200);display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:8px;transition:.3s}
.step.done .step-ico{background:var(--accent);border-color:var(--accent);color:#fff}
.step.active .step-ico{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 0 4px rgba(230,51,41,.2);animation:pulse 1.5s infinite}
.step-label{font-size:10px;text-align:center;color:var(--g500);font-weight:500;line-height:1.3;max-width:70px}
.step.done .step-label,.step.active .step-label{color:#0A0A0A;font-weight:600}
@keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(230,51,41,.2)}50%{box-shadow:0 0 0 8px rgba(230,51,41,.1)}}

.detail-section{padding:20px;background:#fff;border-top:1px solid var(--g200)}
.section-title{font-size:11px;color:var(--g500);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}

.tracking-box{background:#FEF3C7;border:1px solid #FCD34D;border-radius:6px;padding:14px;margin-bottom:14px}
.tracking-box.shipped{background:#DBEAFE;border-color:#93C5FD}
.tracking-box.delivered{background:#D1FAE5;border-color:#6EE7B7}
.tracking-lbl{font-size:11px;color:var(--g700);margin-bottom:4px}
.tracking-num{font-family:var(--mono);font-size:16px;font-weight:700;color:#0A0A0A;margin-bottom:4px;cursor:pointer}
.tracking-num:hover{text-decoration:underline}
.tracking-carrier{font-size:12px;color:var(--g700)}

.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:var(--g200)}
.tl-item{position:relative;padding-bottom:16px}
.tl-item:last-child{padding-bottom:0}
.tl-dot{position:absolute;left:-22px;top:4px;width:14px;height:14px;border-radius:50%;background:#fff;border:2px solid var(--g300);z-index:1}
.tl-item.done .tl-dot{background:var(--accent);border-color:var(--accent)}
.tl-item.active .tl-dot{background:var(--accent);border-color:var(--accent);box-shadow:0 0 0 3px rgba(230,51,41,.2)}
.tl-title{font-size:13px;font-weight:600;margin-bottom:2px;color:#0A0A0A}
.tl-desc{font-size:12px;color:var(--g500);line-height:1.5}
.tl-time{font-size:11px;color:var(--g400);margin-top:2px;font-family:var(--mono)}

.item-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #F0F0F0}
.item-row:last-child{border-bottom:none}
.item-img{width:48px;height:48px;background:var(--g100);border-radius:4px;flex-shrink:0;object-fit:cover;border:1px solid var(--g200);display:flex;align-items:center;justify-content:center;font-size:22px}
.item-name{font-size:13px;font-weight:500;flex:1;line-height:1.4}
.item-qty{font-size:12px;color:var(--g500);font-family:var(--mono);white-space:nowrap}
.item-price{font-size:13px;font-weight:600;font-family:var(--mono);white-space:nowrap}

.actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.actions .btn{flex:1;min-width:140px}

.address-box{background:var(--g100);padding:14px;border-radius:6px;font-size:13px;line-height:1.6}
.address-name{font-weight:600;color:#0A0A0A;margin-bottom:2px}
.address-phone{font-family:var(--mono);font-size:12px;color:var(--g700)}
.address-text{color:var(--g700);font-size:12px;margin-top:4px}

.recent-orders-list{margin-top:24px}
.recent-card{background:#fff;border:1px solid var(--g200);border-radius:6px;padding:14px;margin-bottom:8px;cursor:pointer;transition:.15s}
.recent-card:hover{border-color:#0A0A0A;box-shadow:0 2px 6px rgba(0,0,0,.05)}
.recent-row{display:flex;justify-content:space-between;align-items:center;gap:12px}
.recent-info{flex:1;min-width:0}
.recent-num{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--accent);margin-bottom:2px}
.recent-status{font-size:13px;color:#0A0A0A}
.recent-meta{font-size:11px;color:var(--g500);margin-top:2px}
.recent-amount{font-family:var(--mono);font-weight:600;font-size:14px;white-space:nowrap}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0A0A0A;color:#fff;padding:12px 24px;border-radius:6px;z-index:9999;font-size:13px;display:none}
.toast.on{display:block}

@media(max-width:560px){
  h1{font-size:20px}
  .order-status-big{font-size:18px}
  .order-amount-val{font-size:18px}
  .steps-wrap{padding:20px 12px}
  .step-label{font-size:9px;max-width:55px}
  .step-ico{width:32px;height:32px;font-size:14px}
  .steps::before{top:15px}
  .steps-progress{top:15px}
}
</style>

<script>
const _sb = window.supabase.createClient('https://qmgyimsptzewwyafvjzk.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtZ3lpbXNwdHpld3d5YWZ2anprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NjA4NDIsImV4cCI6MjA5MzAzNjg0Mn0.pcexjwmQndb_RhZHfKVZ6m2_21sn09iNAMyESjLOVJ0');
let _currentUser = null;

function esc(s){return(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmt(n){return'฿'+Number(n||0).toLocaleString('th-TH')}
function toast(m,k){const t=document.getElementById('toast');t.textContent=m;t.style.background=k==='ok'?'#10B981':k==='err'?'#E63329':'#0A0A0A';t.classList.add('on');setTimeout(()=>t.classList.remove('on'),3000);}
function fmtDate(d){if(!d)return'-';const dt=new Date(d);return dt.toLocaleDateString('th-TH',{day:'2-digit',month:'short',year:'2-digit',hour:'2-digit',minute:'2-digit'});}
function copy(t){navigator.clipboard.writeText(t).then(()=>toast('คัดลอกแล้ว','ok'));}

// Status mapping ตรงกับ DB จริง
const STATUS_MAP = {
  pending: { label: 'รอชำระเงิน', desc: 'กรุณาชำระเงินภายในเวลาที่กำหนด', step: 0, color: '#F59E0B' },
  paid: { label: 'ชำระเงินแล้ว', desc: 'ร้านค้าจะเตรียมพัสดุให้คุณ', step: 1, color: '#3B82F6' },
  confirmed: { label: 'ยืนยันออเดอร์', desc: 'ร้านค้ารับออเดอร์แล้ว', step: 1, color: '#3B82F6' },
  preparing: { label: 'กำลังเตรียมพัสดุ', desc: 'ร้านค้ากำลังแพ็คสินค้า', step: 2, color: '#F59E0B' },
  processing: { label: 'กำลังเตรียมพัสดุ', desc: 'ร้านค้ากำลังแพ็คสินค้า', step: 2, color: '#F59E0B' },
  shipped: { label: 'จัดส่งแล้ว', desc: 'พัสดุอยู่ระหว่างจัดส่ง', step: 3, color: '#3B82F6' },
  delivered: { label: 'ส่งถึงปลายทาง', desc: 'พัสดุถูกส่งถึงปลายทางแล้ว', step: 4, color: '#10B981' },
  completed: { label: 'เสร็จสมบูรณ์', desc: 'ขอบคุณที่ใช้บริการ', step: 4, color: '#10B981' },
  cancelled: { label: 'ยกเลิก', desc: 'ออเดอร์ถูกยกเลิก', step: -1, color: '#EF4444' },
  rejected: { label: 'ปฏิเสธ', desc: 'ออเดอร์ถูกปฏิเสธโดยร้านค้า', step: -1, color: '#EF4444' },
  returned: { label: 'คืนสินค้า', desc: 'ลูกค้าขอคืนสินค้า', step: -1, color: '#EF4444' },
  refunded: { label: 'คืนเงินแล้ว', desc: 'การคืนเงินเสร็จสมบูรณ์', step: -1, color: '#737373' }
};

const STEPS = [
  { icon: '📝', label: 'สั่งซื้อ' },
  { icon: '💰', label: 'ชำระเงิน' },
  { icon: '📦', label: 'เตรียมพัสดุ' },
  { icon: '🚚', label: 'จัดส่ง' },
  { icon: '🏠', label: 'ส่งถึง' }
];

// ── โหลด user ──
async function loadUser(){
  const { data: { user } } = await _sb.auth.getUser();
  if (!user) return null;
  const { data: u } = await _sb.from('users').select('*').eq('email', user.email).maybeSingle();
  _currentUser = u || { email: user.email, id: user.id };
  return _currentUser;
}

// ── หา order จาก order_number หรือ id ──
async function findOrder(query){
  query = query.trim();
  if (!query) return null;

  let order = null;

  // 1. หาด้วย order_number
  let { data, error } = await _sb.from('orders')
    .select('*, order_items(id,product_id,name_th,thumbnail,qty,price,seller_id)')
    .eq('order_number', query)
    .maybeSingle();
  
  if (!error && data) order = data;

  // 2. หาด้วย id (UUID)
  if (!order && /^[0-9a-f-]{36}$/i.test(query)) {
    const r = await _sb.from('orders')
      .select('*, order_items(id,product_id,name_th,thumbnail,qty,price,seller_id)')
      .eq('id', query)
      .maybeSingle();
    if (r.data) order = r.data;
  }

  // 3. ลอง prefix match (TM-2026-XXX)
  if (!order && query.startsWith('TM')) {
    const r = await _sb.from('orders')
      .select('*, order_items(id,product_id,name_th,thumbnail,qty,price,seller_id)')
      .ilike('order_number', query + '%')
      .limit(1)
      .maybeSingle();
    if (r.data) order = r.data;
  }

  // 4. โหลด sub-orders (แต่ละร้านส่งแยกกล่อง เลขพัสดุคนละตัว)
  if (order) {
    try {
      const { data: subs } = await _sb.from('sub_orders')
        .select('id,sub_number,seller_id,status,tracking_number,tracking_carrier,shipped_at,delivered_at,shipping_fee,items_subtotal')
        .eq('order_id', order.id)
        .order('shop_index', { ascending: true });
      order._subs = subs || [];
      // ดึงชื่อร้านแยก (ไม่พึ่ง FK embed)
      const sids = [...new Set(order._subs.map(s => s.seller_id).filter(Boolean))];
      let nameMap = {};
      if (sids.length) {
        const { data: shops } = await _sb.from('sellers').select('id,shop_name').in('id', sids);
        (shops || []).forEach(x => { nameMap[x.id] = x.shop_name; });
      }
      // ผูก items เข้ากับ sub ผ่าน seller_id
      const bySeller = {};
      (order.order_items || []).forEach(it => {
        (bySeller[it.seller_id] = bySeller[it.seller_id] || []).push(it);
      });
      order._subs.forEach(s => {
        s._items = bySeller[s.seller_id] || [];
        s._shop_name = nameMap[s.seller_id] || '';
      });
    } catch(e) { console.warn('sub_orders:', e); order._subs = []; }
  }

  return order;
}

// ── สร้าง timeline จากข้อมูลจริงใน orders ──
function buildTimeline(order){
  const events = [];

  if (order.created_at) {
    events.push({
      icon: '📝',
      title: 'สั่งซื้อสำเร็จ',
      desc: 'ออเดอร์ ' + esc(order.order_number || order.id.substring(0,8)) + ' ถูกสร้าง',
      time: order.created_at,
      done: true
    });
  }

  if (order.paid_at) {
    events.push({
      icon: '💰',
      title: 'ชำระเงินสำเร็จ',
      desc: order.payment_method === 'bank_transfer' ? 'ลูกค้าโอนเงินและ admin ยืนยันแล้ว' : 'การชำระเงินสำเร็จ',
      time: order.paid_at,
      done: true
    });
  }

  if (order.confirmed_at) {
    events.push({
      icon: '✅',
      title: 'ร้านค้ายืนยันออเดอร์',
      desc: 'ร้านค้ารับออเดอร์เรียบร้อย',
      time: order.confirmed_at,
      done: true
    });
  }

  if (order.preparing_at) {
    events.push({
      icon: '📦',
      title: 'กำลังเตรียมพัสดุ',
      desc: 'ร้านค้ากำลังแพ็คสินค้า',
      time: order.preparing_at,
      done: true
    });
  }

  if (order.shipped_at) {
    const carrier = order.tracking_carrier ? ` (${order.tracking_carrier})` : '';
    const trk = order.tracking_number ? ` · เลขพัสดุ: ${order.tracking_number}` : '';
    events.push({
      icon: '🚚',
      title: 'จัดส่งแล้ว' + carrier,
      desc: 'พัสดุอยู่ระหว่างจัดส่ง' + trk,
      time: order.shipped_at,
      done: true
    });
  }

  if (order.delivered_at) {
    events.push({
      icon: '🏠',
      title: 'ส่งถึงปลายทาง',
      desc: 'พัสดุถูกส่งถึงมือผู้รับเรียบร้อย',
      time: order.delivered_at,
      done: true
    });
  }

  if (order.cancelled_at) {
    events.push({
      icon: '❌',
      title: 'ออเดอร์ถูกยกเลิก',
      desc: 'ออเดอร์นี้ถูกยกเลิกแล้ว',
      time: order.cancelled_at,
      done: true,
      cancel: true
    });
  }

  // เรียงจากใหม่ → เก่า
  events.reverse();

  // mark ตัวล่าสุดเป็น active
  if (events.length > 0 && !order.delivered_at && !order.cancelled_at) {
    events[0].active = true;
    events[0].done = false;
  }

  return events;
}

// ── Render order detail ──
function renderOrder(order){
  const result = document.getElementById('result');
  const st = STATUS_MAP[order.status] || { label: order.status, desc: '', step: 0, color: '#737373' };
  const items = order.order_items || [];
  const events = buildTimeline(order);

  // Steps progress
  let progressWidth = '0%';
  if (st.step === 4) progressWidth = '100%';
  else if (st.step === 3) progressWidth = '75%';
  else if (st.step === 2) progressWidth = '50%';
  else if (st.step === 1) progressWidth = '25%';
  else if (st.step === -1) progressWidth = '0%';

  const addr = order.shipping_address || {};

  let stepsHtml = '';
  if (st.step >= 0) {
    stepsHtml = `<div class="steps-wrap">
      <div class="steps">
        <div class="steps-progress" style="width:${progressWidth}"></div>
        ${STEPS.map((s, i) => {
          const cls = i < st.step ? 'done' : i === st.step ? 'active' : '';
          return `<div class="step ${cls}">
            <div class="step-ico">${i < st.step ? '✓' : s.icon}</div>
            <div class="step-label">${s.label}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  // Tracking box — แยกพัสดุรายร้าน (multi-shop: แต่ละร้านส่งแยกกล่อง)
  let trackingHtml = '';
  const subs = order._subs || [];
  if (subs.length > 0) {
    const SUB_ST = {
      pending:   { label:'รอชำระเงิน',      color:'#D97706', icon:'⏳' },
      paid:      { label:'ร้านรับออเดอร์แล้ว', color:'#16A34A', icon:'✅' },
      confirmed: { label:'ยืนยันแล้ว',       color:'#2563EB', icon:'✅' },
      preparing: { label:'กำลังเตรียมพัสดุ',  color:'#7C3AED', icon:'📦' },
      processing:{ label:'กำลังเตรียมพัสดุ',  color:'#7C3AED', icon:'📦' },
      shipped:   { label:'จัดส่งแล้ว',        color:'#0891B2', icon:'🚚' },
      delivered: { label:'ส่งถึงแล้ว',        color:'#16A34A', icon:'🏠' },
      cancelled: { label:'ยกเลิก',            color:'#737373', icon:'✖' }
    };
    trackingHtml = `<div style="padding:16px 20px 4px">
      <div style="font-size:13px;font-weight:700;margin-bottom:10px">🚚 พัสดุแยกตามร้าน (${subs.length} กล่อง)</div>
      ${subs.map(s => {
        const ss = SUB_ST[s.status] || { label: s.status, color:'#737373', icon:'📦' };
        const shopName = s._shop_name || 'ร้านค้า';
        const itemNames = (s._items || []).map(it => esc(it.name_th)).slice(0,3).join(', ')
          + ((s._items||[]).length > 3 ? ` +อีก ${(s._items.length-3)} ชิ้น` : '');
        const trk = s.tracking_number
          ? `<div class="tracking-num" style="font-size:15px" onclick="copy('${esc(s.tracking_number)}')">${esc(s.tracking_number)} 📋</div>
             <div style="font-size:11px;color:#737373">${s.tracking_carrier ? esc(s.tracking_carrier) + ' · ' : ''}กดเพื่อคัดลอก</div>`
          : `<div style="font-size:12px;color:#999">ยังไม่มีเลขพัสดุ — ร้านกำลังเตรียมจัดส่ง</div>`;
        return `<div style="border:1px solid #EFEFEF;border-left:4px solid ${ss.color};border-radius:8px;padding:12px 14px;margin-bottom:10px;background:#FDFDFD">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
            <div style="min-width:0">
              <div style="font-weight:700;font-size:13px">🏪 ${esc(shopName)}
                <span style="font-family:monospace;font-size:10px;color:#999">· ${esc(s.sub_number||'')}</span></div>
              ${itemNames ? `<div style="font-size:11px;color:#737373;margin-top:2px">${itemNames}</div>` : ''}
            </div>
            <span style="background:${ss.color}1A;color:${ss.color};font-size:11px;font-weight:700;padding:4px 10px;border-radius:12px;white-space:nowrap">${ss.icon} ${ss.label}</span>
          </div>
          <div style="margin-top:8px">${trk}</div>
        </div>`;
      }).join('')}
    </div>`;
  } else if (order.tracking_number) {
    const cls = order.delivered_at ? 'delivered' : 'shipped';
    trackingHtml = `<div class="tracking-box ${cls}">
      <div class="tracking-lbl">เลขพัสดุ${order.tracking_carrier ? ' (' + esc(order.tracking_carrier) + ')' : ''}</div>
      <div class="tracking-num" onclick="copy('${esc(order.tracking_number)}')">${esc(order.tracking_number)} 📋</div>
      <div class="tracking-carrier">กดเลขพัสดุเพื่อคัดลอก · ติดตามสถานะที่เว็บไซต์ขนส่ง</div>
    </div>`;
  }

  result.innerHTML = `
    <div class="order-card">
      <div class="order-head" style="background:linear-gradient(135deg,${st.color} 0%,${st.color}DD 100%)">
        <div class="order-head-row">
          <div>
            <div class="order-num">📦 ${esc(order.order_number || order.id.substring(0,8))}</div>
            <div class="order-status-big">${esc(st.label)}</div>
            <div class="order-status-desc">${esc(st.desc)}</div>
          </div>
          <div class="order-amount">
            <div class="order-amount-lbl">ยอดรวม</div>
            <div class="order-amount-val">${fmt(order.total_amount)}</div>
          </div>
        </div>
      </div>

      ${stepsHtml}

      ${trackingHtml ? `<div class="detail-section">${trackingHtml}</div>` : ''}

      ${items.length ? `<div class="detail-section">
        <div class="section-title">📋 รายการสินค้า (${items.length})</div>
        ${items.map(it => `<div class="item-row">
          ${it.thumbnail ? `<img class="item-img" src="${esc(it.thumbnail)}" onerror="this.style.display='none';this.insertAdjacentHTML('afterend','<div class=&quot;item-img&quot;>📦</div>')">` : '<div class="item-img">📦</div>'}
          <div class="item-name">${esc(it.name_th || '-')}</div>
          <div class="item-qty">×${it.qty || 1}</div>
          <div class="item-price">${fmt((it.price || 0) * (it.qty || 1))}</div>
        </div>`).join('')}
      </div>` : ''}

      ${addr.name || order.shipping_name ? `<div class="detail-section">
        <div class="section-title">📍 ที่อยู่จัดส่ง</div>
        <div class="address-box">
          <div class="address-name">${esc(addr.name || order.shipping_name || '-')}</div>
          ${addr.phone ? `<div class="address-phone">📞 ${esc(addr.phone)}</div>` : ''}
          <div class="address-text">${esc([addr.address, addr.detail, addr.district, addr.province, addr.postcode].filter(Boolean).join(' '))}</div>
        </div>
      </div>` : ''}

      ${events.length ? `<div class="detail-section">
        <div class="section-title">⏱ ประวัติการจัดส่ง</div>
        <div class="timeline">
          ${events.map(e => `<div class="tl-item ${e.active ? 'active' : 'done'}${e.cancel ? ' cancel' : ''}">
            <div class="tl-dot"></div>
            <div class="tl-title">${e.icon} ${esc(e.title)}</div>
            <div class="tl-desc">${esc(e.desc)}</div>
            <div class="tl-time">${fmtDate(e.time)}</div>
          </div>`).join('')}
        </div>
      </div>` : ''}

      <div class="detail-section" style="background:var(--g100)">
        <div class="actions">
          ${order.status === 'pending' ? `<a href="payment-pending.html?order=${order.id}" class="btn">💰 ชำระเงินทันที</a>` : ''}
          ${order.status === 'delivered' ? `<a href="review-write.html?order=${order.id}" class="btn">⭐ เขียนรีวิว</a>` : ''}
          ${order.status === 'delivered' || order.status === 'completed' ? `<a href="returns.html?order=${order.id}" class="btn btn-out">↩️ ขอคืนสินค้า</a>` : ''}
          <a href="profile.html#orders" class="btn btn-out">📦 ดูออเดอร์ทั้งหมด</a>
        </div>
      </div>
    </div>
  `;

  result.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── ค้นหา order ──
async function doSearch(){
  const inp = document.getElementById('search-input');
  const q = inp.value.trim();
  if (!q) { toast('กรอกหมายเลขออเดอร์', 'err'); return; }

  const result = document.getElementById('result');
  result.innerHTML = '<div class="empty"><div class="empty-icon">⏳</div>กำลังค้นหา...</div>';

  try {
    const order = await findOrder(q);
    if (!order) {
      result.innerHTML = `<div class="empty">
        <div class="empty-icon">🔍</div>
        <div style="font-size:15px;font-weight:600;margin-bottom:6px">ไม่พบออเดอร์ "${esc(q)}"</div>
        <div style="font-size:13px;color:#A3A3A3">กรุณาตรวจสอบหมายเลขออเดอร์อีกครั้ง</div>
      </div>`;
      return;
    }
    renderOrder(order);
  } catch(e) {
    result.innerHTML = `<div class="empty" style="color:#E63329">❌ ${esc(e.message)}</div>`;
  }
}

// ── โหลด orders ล่าสุดของ user (ถ้า login) ──
async function loadRecentOrders(){
  const result = document.getElementById('result');
  if (!_currentUser) {
    result.innerHTML = `<div class="empty">
      <div class="empty-icon">🔒</div>
      <div style="font-size:15px;font-weight:600;margin-bottom:6px">ยังไม่ได้เข้าสู่ระบบ</div>
      <div style="font-size:13px;color:#A3A3A3;margin-bottom:18px">เข้าสู่ระบบเพื่อดูออเดอร์ของคุณอัตโนมัติ<br>หรือใส่หมายเลขออเดอร์ด้านบนเพื่อค้นหา</div>
      <a href="login.html?next=${encodeURIComponent('tracking.html')}" class="btn" style="display:inline-block;text-decoration:none">เข้าสู่ระบบ</a>
    </div>`;
    return;
  }

  result.innerHTML = '<div class="empty"><div class="empty-icon">⏳</div>กำลังโหลดออเดอร์...</div>';

  try {
    const { data, error } = await _sb.from('orders')
      .select('id, order_number, status, total_amount, created_at, tracking_number, tracking_carrier, paid_at, shipped_at, delivered_at')
      .eq('user_id', _currentUser.id)
      .order('created_at', { ascending: false })
      .limit(10);

    if (error) throw error;
    if (!data || !data.length) {
      result.innerHTML = `<div class="empty">
        <div class="empty-icon">📦</div>
        <div style="font-size:15px;font-weight:600;margin-bottom:6px">ยังไม่มีออเดอร์</div>
        <div style="font-size:13px;color:#A3A3A3;margin-bottom:18px">เริ่มช้อปปิ้งที่หน้าแรก</div>
        <a href="index.html" class="btn" style="display:inline-block;text-decoration:none">🛍️ ไปช้อปปิ้ง</a>
      </div>`;
      return;
    }

    result.innerHTML = `<div style="font-size:13px;color:#737373;margin-bottom:10px;font-weight:600">📦 ออเดอร์ล่าสุด ${data.length} รายการ</div>` +
      `<div class="recent-orders-list">${data.map(o => {
        const st = STATUS_MAP[o.status] || { label: o.status, color: '#737373' };
        return `<div class="recent-card" onclick="document.getElementById('search-input').value='${esc(o.order_number)}';doSearch()">
          <div class="recent-row">
            <div class="recent-info">
              <div class="recent-num">${esc(o.order_number)}</div>
              <div class="recent-status" style="color:${st.color}">● ${esc(st.label)}</div>
              <div class="recent-meta">${fmtDate(o.created_at)}${o.tracking_number ? ' · ' + esc(o.tracking_number) : ''}</div>
            </div>
            <div class="recent-amount">${fmt(o.total_amount)}</div>
          </div>
        </div>`;
      }).join('')}</div>`;
  } catch(e) {
    result.innerHTML = `<div class="empty" style="color:#E63329">❌ ${esc(e.message)}</div>`;
  }
}

// ── Init ──
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

(async () => {
  await loadUser();

  // ถ้ามี query string ?order=... → ค้นหา
  const params = new URLSearchParams(location.search);
  const orderQuery = params.get('order') || params.get('id') || params.get('number') || '';
  if (orderQuery) {
    document.getElementById('search-input').value = orderQuery;
    doSearch();
  } else {
    // โหลด orders ล่าสุดของ user
    loadRecentOrders();
  }
})();
</script>
