<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ร้านค้า · Thailand Market</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{--black:#0A0A0A;--white:#FFF;--red:#E63329;--g50:#FAFAFA;--g100:#F5F5F5;--g200:#E5E5E5;--g300:#D4D4D4;--g400:#A3A3A3;--g500:#737373;--g600:#525252;--g700:#404040;--g900:#171717;--green:#16A34A;--blue:#2563EB;--mono:'DM Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--g50);color:var(--g900);font-size:14px;line-height:1.5}
a{text-decoration:none;color:inherit}

/* Top bar */
.tm-bar{background:var(--black);color:#fff;padding:8px 0;font-size:11px}
.tm-bar-inner{max-width:1280px;margin:0 auto;padding:0 16px;display:flex;gap:24px;justify-content:center}
.tm-bar-inner span{color:rgba(255,255,255,0.7)}

/* Header */
.tm-header{background:#fff;border-bottom:1px solid var(--g200);padding:14px 0;position:sticky;top:0;z-index:50}
.tm-header-inner{max-width:1280px;margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:18px}
.tm-logo{font-weight:800;font-size:18px;flex-shrink:0}
.tm-logo .dot{color:var(--red)}
.tm-search{flex:1;max-width:600px;position:relative}
.tm-search input{width:100%;padding:9px 16px;border:1px solid var(--g200);border-radius:4px;font-size:13px}
.tm-actions{display:flex;align-items:center;gap:14px;font-size:12px;color:var(--g700);flex-shrink:0}
.tm-actions a{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:var(--g600)}
.tm-actions a .ico{font-size:16px}

/* Hero shop banner */
.shop-hero{background:linear-gradient(135deg,#0A0A0A 0%,#262626 100%);color:#fff;padding:36px 16px}
.shop-hero-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.shop-avatar{width:96px;height:96px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:800;color:var(--black);flex-shrink:0;border:3px solid rgba(255,255,255,0.1)}
.shop-info{flex:1;min-width:200px}
.shop-name{font-size:28px;font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.shop-verified{font-size:11px;background:#10B981;color:#fff;padding:3px 10px;border-radius:3px;font-weight:700;letter-spacing:0.4px;font-family:var(--mono)}
.shop-tagline{font-size:13px;color:rgba(255,255,255,0.7);margin-bottom:12px;line-height:1.5;max-width:600px}
.shop-stats{display:flex;gap:24px;flex-wrap:wrap;margin-top:8px}
.shop-stat{font-size:11px;color:rgba(255,255,255,0.5)}
.shop-stat strong{display:block;font-size:18px;color:#fff;font-family:var(--mono);margin-bottom:1px;font-weight:700}
.shop-actions{display:flex;gap:8px;flex-shrink:0}
.shop-btn{padding:10px 18px;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px}
.shop-btn-primary{background:var(--red);color:#fff}
.shop-btn-secondary{background:rgba(255,255,255,0.12);color:#fff;border:1px solid rgba(255,255,255,0.2)}

/* Tabs */
.shop-tabs{background:#fff;border-bottom:1px solid var(--g200);padding:0 16px;position:sticky;top:62px;z-index:40}
.shop-tabs-inner{max-width:1280px;margin:0 auto;display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.shop-tabs-inner::-webkit-scrollbar{display:none}
.tab{padding:14px 16px;font-size:13px;font-weight:600;color:var(--g500);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0}
.tab.active{color:var(--black);border-bottom-color:var(--red)}
.tab-count{display:inline-block;font-size:10px;color:var(--g500);margin-left:4px;font-family:var(--mono)}

/* Product grid */
.shop-content{max-width:1280px;margin:0 auto;padding:24px 16px}
.filter-bar{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.filter-bar select,.filter-bar input{padding:7px 12px;border:1px solid var(--g200);border-radius:4px;font-size:12px;background:#fff}
.result-count{font-size:12px;color:var(--g500);margin-left:auto}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.p-card{background:#fff;border:1px solid var(--g200);border-radius:6px;overflow:hidden;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s}
.p-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.08)}
.p-img{aspect-ratio:1;background:var(--g100);display:flex;align-items:center;justify-content:center;font-size:48px;position:relative;overflow:hidden}
.p-img img{width:100%;height:100%;object-fit:cover}
.p-badge{position:absolute;top:8px;left:8px;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:3px 7px;border-radius:3px}
.p-body{padding:11px}
.p-name{font-size:13px;line-height:1.3;font-weight:500;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px;min-height:34px}
.p-price{display:flex;align-items:baseline;gap:5px;flex-wrap:wrap;margin-bottom:4px}
.p-price-now{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--red)}
.p-price-old{font-family:var(--mono);font-size:11px;color:var(--g400);text-decoration:line-through}
.p-meta{font-size:10px;color:var(--g500);display:flex;gap:8px;flex-wrap:wrap}

/* About section */
.about-section{background:#fff;border:1px solid var(--g200);border-radius:6px;padding:20px}
.about-section h3{font-size:15px;font-weight:700;margin-bottom:12px}
.about-row{display:flex;gap:16px;padding:8px 0;font-size:13px;border-bottom:1px solid var(--g100)}
.about-row:last-child{border-bottom:0}
.about-row .lbl{color:var(--g500);width:140px;flex-shrink:0}

/* Empty/loading */
.loading,.empty{text-align:center;padding:80px 20px;color:var(--g500)}
.empty .ico{font-size:64px;margin-bottom:12px}

@media(max-width:768px){
  .product-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .shop-tabs{top:56px}
}
</style>
</head>
<body>

<div class="tm-bar"><div class="tm-bar-inner">
  <span>· ส่งฟรีทุกออเดอร์เมื่อซื้อครบ ฿500</span>
  <span>· FLASH SALE ทุกวัน 10:00 / 14:00 / 20:00</span>
  <span>· รับคูปองใหม่ทุกวัน</span>
</div></div>

<header class="tm-header"><div class="tm-header-inner">
  <a href="index.html" class="tm-logo">THAILAND<span class="dot">.</span>MARKET</a>
  <div class="tm-search"><input type="text" placeholder="ค้นหาสินค้าในร้านนี้..." id="shop-search"></div>
  <div class="tm-actions">
    <a href="wishlist.html"><span class="ico">♡</span><span>SAVED</span></a>
    <a href="cart.html"><span class="ico">🛒</span><span>CART</span></a>
    <a href="profile.html"><span class="ico">👤</span><span>ACCOUNT</span></a>
  </div>
</div></header>

<div id="shop-content"><div class="loading">⏳ กำลังโหลดข้อมูลร้าน...</div></div>

<script>
const sb = supabase.createClient('https://qmgyimsptzewwyafvjzk.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtZ3lpbXNwdHpld3d5YWZ2anprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NjA4NDIsImV4cCI6MjA5MzAzNjg0Mn0.pcexjwmQndb_RhZHfKVZ6m2_21sn09iNAMyESjLOVJ0');
window._sb = sb;

let _seller = null;
let _products = [];
let _activeTab = 'all';
let _searchText = '';
let _sortBy = 'newest';

async function load(){
  const params = new URLSearchParams(location.search);
  const sellerId = params.get('id') || params.get('shop');
  const sellerSlug = params.get('slug');

  // ดึง seller — รองรับทั้ง id และ slug
  let q = sb.from('sellers').select('*').limit(1);
  if (sellerId) q = q.eq('id', sellerId);
  else if (sellerSlug) q = q.eq('slug', sellerSlug);
  else {
    // fallback: pick first seller
    q = sb.from('sellers').select('*').limit(1);
  }
  const { data: sellers, error: sErr } = await q;
  if (sErr || !sellers?.length){
    document.getElementById('shop-content').innerHTML = `<div class="empty"><div class="ico">🏪</div><div style="font-size:18px;font-weight:600;margin-bottom:8px">ไม่พบร้านค้านี้</div><div>ตรวจสอบลิงก์อีกครั้ง หรือ<a href="index.html" style="color:#E63329"> กลับหน้าแรก</a></div></div>`;
    return;
  }
  _seller = sellers[0];

  // ดึง products ของ seller นี้
  const { data: prods } = await sb.from('products')
    .select('id, name_th, name_en, price, compare_price, thumbnail, images, category_id, sold_count, rating_avg, review_count, stock_quantity, status, created_at')
    .eq('seller_id', _seller.id)
    .order('created_at', {ascending: false})
    .limit(200);
  _products = prods || [];

  render();
  refreshFollowState();
}

function render(){
  const s = _seller;
  const totalProducts = _products.length;
  const verified = s.is_verified !== false;
  const initial = (s.shop_name || 'S').charAt(0).toUpperCase();

  const dateJoined = s.created_at ? new Date(s.created_at).toLocaleDateString('th-TH', {year:'numeric', month:'long'}) : '-';
  const totalSales = _products.reduce((sum, p) => sum + (p.sold_count||0), 0);
  const avgRating = _products.length > 0
    ? (_products.reduce((sum, p) => sum + (Number(p.rating_avg)||0), 0) / Math.max(1, _products.filter(p=>p.rating_avg).length))
    : 0;

  document.getElementById('shop-content').innerHTML = `
    <!-- HERO -->
    <section class="shop-hero"${s.cover_url ? ` style="background:linear-gradient(135deg,rgba(10,10,10,0.82),rgba(38,38,38,0.82)),url('${s.cover_url}') center/cover no-repeat"` : ''}>
      <div class="shop-hero-inner">
        <div class="shop-avatar">${s.logo_url ? `<img src="${s.logo_url}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">` : initial}</div>
        <div class="shop-info">
          <div class="shop-name">${s.shop_name||'ร้านค้า'} ${verified?`<span class="shop-verified">✓ ยืนยันแล้ว</span>`:''}</div>
          <div class="shop-tagline">${s.description || s.tagline || 'ขายดี ส่งเร็ว ของแท้ คุณภาพดี · ขายใน Thailand Market'}</div>
          <div class="shop-stats">
            <div class="shop-stat"><strong>${totalProducts.toLocaleString()}</strong>สินค้า</div>
            <div class="shop-stat"><strong>${totalSales.toLocaleString()}</strong>ขายแล้ว</div>
            <div class="shop-stat"><strong>${avgRating>0?avgRating.toFixed(1):'-'} ⭐</strong>คะแนนเฉลี่ย</div>
            <div class="shop-stat"><strong>${dateJoined}</strong>เปิดร้าน</div>
          </div>
        </div>
        <div class="shop-actions">
          <button id="follow-btn" class="shop-btn shop-btn-primary" onclick="followShop()">+ ติดตาม</button>
          <button class="shop-btn shop-btn-secondary" onclick="chatShop()">💬 แชท</button>
        </div>
      </div>
    </section>

    <!-- TABS -->
    <div class="shop-tabs"><div class="shop-tabs-inner">
      <div class="tab ${_activeTab==='all'?'active':''}" data-tab="all">สินค้าทั้งหมด<span class="tab-count">(${totalProducts})</span></div>
      <div class="tab ${_activeTab==='hot'?'active':''}" data-tab="hot">🔥 ขายดี</div>
      <div class="tab ${_activeTab==='new'?'active':''}" data-tab="new">🆕 มาใหม่</div>
      <div class="tab ${_activeTab==='sale'?'active':''}" data-tab="sale">⚡ ลดราคา</div>
      <div class="tab ${_activeTab==='about'?'active':''}" data-tab="about">ℹ️ เกี่ยวกับร้าน</div>
    </div></div>

    <!-- CONTENT -->
    <main class="shop-content" id="tab-content"></main>
  `;

  // attach tab events
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      _activeTab = t.dataset.tab;
      render();
    });
  });

  // attach search
  const searchInp = document.getElementById('shop-search');
  if (searchInp){
    searchInp.value = _searchText;
    searchInp.addEventListener('input', e => {
      _searchText = e.target.value.trim().toLowerCase();
      renderTab();
    });
  }

  renderTab();
}

function renderTab(){
  const c = document.getElementById('tab-content');
  if (!c) return;

  if (_activeTab === 'about'){
    const s = _seller;
    c.innerHTML = `
      <div class="about-section">
        <h3>ℹ️ ข้อมูลร้าน</h3>
        <div class="about-row"><div class="lbl">ชื่อร้าน</div><div>${s.shop_name||'-'}</div></div>
        <div class="about-row"><div class="lbl">รายละเอียด</div><div>${s.description || s.tagline || '-'}</div></div>
        <div class="about-row"><div class="lbl">ที่ตั้ง</div><div>${s.location || s.address || 'ประเทศไทย'}</div></div>
        ${s.phone ? `<div class="about-row"><div class="lbl">โทร</div><div>${s.phone}</div></div>` : ''}
        ${s.email ? `<div class="about-row"><div class="lbl">อีเมล</div><div>${s.email}</div></div>` : ''}
        <div class="about-row"><div class="lbl">เวลาตอบ</div><div>เฉลี่ย ${s.response_time || '< 1 ชม.'}</div></div>
        <div class="about-row"><div class="lbl">เปิดร้านเมื่อ</div><div>${s.created_at ? new Date(s.created_at).toLocaleDateString('th-TH', {year:'numeric',month:'long',day:'numeric'}) : '-'}</div></div>
        <div class="about-row"><div class="lbl">สถานะ</div><div>${s.is_verified !== false ? '<span style="color:#16A34A;font-weight:600">✓ ผู้ขายที่ยืนยันแล้ว</span>' : 'ทั่วไป'}</div></div>
      </div>
    `;
    return;
  }

  // Filter products by tab
  let list = [..._products];
  if (_activeTab === 'hot'){
    list = list.filter(p => (p.sold_count||0) > 100).sort((a,b)=>(b.sold_count||0)-(a.sold_count||0));
  } else if (_activeTab === 'new'){
    list = list.slice().sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, 50);
  } else if (_activeTab === 'sale'){
    list = list.filter(p => p.compare_price && Number(p.compare_price) > Number(p.price));
  }

  // Search
  if (_searchText){
    list = list.filter(p => (p.name_th||'').toLowerCase().includes(_searchText) || (p.name_en||'').toLowerCase().includes(_searchText));
  }

  // Sort
  if (_sortBy === 'price-asc') list.sort((a,b)=>Number(a.price)-Number(b.price));
  else if (_sortBy === 'price-desc') list.sort((a,b)=>Number(b.price)-Number(a.price));
  else if (_sortBy === 'sales') list.sort((a,b)=>(b.sold_count||0)-(a.sold_count||0));

  c.innerHTML = `
    <div class="filter-bar">
      <select id="sort-select">
        <option value="newest" ${_sortBy==='newest'?'selected':''}>ล่าสุดก่อน</option>
        <option value="sales" ${_sortBy==='sales'?'selected':''}>ขายดี</option>
        <option value="price-asc" ${_sortBy==='price-asc'?'selected':''}>ราคาต่ำ - สูง</option>
        <option value="price-desc" ${_sortBy==='price-desc'?'selected':''}>ราคาสูง - ต่ำ</option>
      </select>
      <span class="result-count">${list.length} รายการ</span>
    </div>
    ${list.length === 0 ? `
      <div class="empty"><div class="ico">📦</div><div style="font-size:16px;font-weight:600;margin-bottom:6px">ไม่พบสินค้า</div><div>ลองหมวดหมู่อื่น หรือล้างคำค้นหา</div></div>
    ` : `
      <div class="product-grid">
        ${list.map(p => renderProductCard(p)).join('')}
      </div>
    `}
  `;

  const sortEl = document.getElementById('sort-select');
  if (sortEl) sortEl.addEventListener('change', e => { _sortBy = e.target.value; renderTab(); });
}

function renderProductCard(p){
  const img = (Array.isArray(p.images) && p.images[0]) || p.thumbnail || '';
  const isOnSale = p.compare_price && Number(p.compare_price) > Number(p.price);
  const discPct = isOnSale ? Math.round((1 - Number(p.price)/Number(p.compare_price))*100) : 0;
  const isNew = p.created_at && (Date.now() - new Date(p.created_at).getTime()) < 7*24*3600*1000;
  const isHot = (p.sold_count||0) > 200;
  const badge = isOnSale ? `-${discPct}%` : (isHot ? '🔥 HOT' : (isNew ? 'NEW' : ''));

  return `<div class="p-card" onclick="location.href='product.html?id=${p.id}'">
    <div class="p-img">
      ${img ? `<img src="${img}" alt="${p.name_th}" onerror="this.style.display='none';this.parentElement.textContent='📦'">` : '📦'}
      ${badge ? `<span class="p-badge">${badge}</span>` : ''}
    </div>
    <div class="p-body">
      <div class="p-name">${p.name_th || p.name_en || '-'}</div>
      <div class="p-price">
        <span class="p-price-now">฿${Number(p.price).toLocaleString()}</span>
        ${isOnSale ? `<span class="p-price-old">฿${Number(p.compare_price).toLocaleString()}</span>` : ''}
      </div>
      <div class="p-meta">
        ${p.rating_avg ? `<span>⭐ ${Number(p.rating_avg).toFixed(1)}</span>` : ''}
        ${p.sold_count ? `<span>· ขาย ${Number(p.sold_count).toLocaleString()}</span>` : ''}
      </div>
    </div>
  </div>`;
}

let _isFollowing = false;
let _followBusy = false;

function paintFollowBtn(){
  const b = document.getElementById('follow-btn');
  if(!b) return;
  if(_isFollowing){
    b.textContent = '✓ ติดตามแล้ว';
    b.classList.remove('shop-btn-primary');
    b.classList.add('shop-btn-secondary');
  } else {
    b.textContent = '+ ติดตาม';
    b.classList.add('shop-btn-primary');
    b.classList.remove('shop-btn-secondary');
  }
}

async function refreshFollowState(){
  if(!_seller) return;
  try{
    const { data, error } = await sb.rpc('is_following_shop', { p_seller_id: _seller.id });
    if(!error && data) _isFollowing = (data.following === true || data === true);
  }catch(e){ console.warn('[shop] is_following check failed:', e); }
  paintFollowBtn();
}

async function followShop(){
  if(_followBusy || !_seller) return;
  // ต้อง login ก่อน
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){
    if(confirm('ต้องเข้าสู่ระบบก่อนติดตามร้าน\nไปหน้าเข้าสู่ระบบ?')){
      location.href = 'login.html?redirect=' + encodeURIComponent(location.pathname + location.search);
    }
    return;
  }
  _followBusy = true;
  const b = document.getElementById('follow-btn');
  const prev = _isFollowing;
  // optimistic
  _isFollowing = !_isFollowing;
  paintFollowBtn();
  if(b) b.disabled = true;
  try{
    const { data, error } = await sb.rpc('toggle_follow_shop', { p_seller_id: _seller.id });
    if(error) throw error;
    if(data && data.error) throw new Error(data.message || data.error);
    // RPC คืน {following: true/false} หรือ boolean
    if(data && typeof data.following === 'boolean') _isFollowing = data.following;
    else if(typeof data === 'boolean') _isFollowing = data;
    paintFollowBtn();
  }catch(e){
    console.error('[shop] toggle follow failed:', e);
    _isFollowing = prev; // rollback
    paintFollowBtn();
    alert('❌ ' + (e.message || 'ติดตามไม่สำเร็จ ลองใหม่อีกครั้ง'));
  }finally{
    _followBusy = false;
    if(b) b.disabled = false;
  }
}
function chatShop(){ alert('💬 เปิดแชทกับร้าน — ฟีเจอร์นี้กำลังพัฒนา'); }

load();
</script>
</body>
</html>
