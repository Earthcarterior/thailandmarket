<!DOCTYPE html>
<html lang="th">
<head>
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests; object-src 'none'; base-uri 'self'">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — จัดส่ง · Thailand Market</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{--black:#0A0A0A;--red:#E63329;--g50:#FAFAFA;--g100:#F5F5F5;--g200:#E5E5E5;--g500:#737373;--g700:#404040;--g900:#171717;--green:#16A34A;--blue:#2563EB;--purple:#7C3AED}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--g50);color:var(--g900);font-size:14px;display:flex;min-height:100vh}
a{text-decoration:none;color:inherit}
.sidebar{width:240px;background:var(--black);color:#fff;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.sb-logo{padding:22px;font-weight:800;font-size:18px;border-bottom:1px solid rgba(255,255,255,0.08)}
.sb-logo .dot{color:var(--red)}
.sb-sub{display:block;font-size:10px;color:rgba(255,255,255,0.4);font-weight:500;letter-spacing:1px;margin-top:2px}
.sb-section{padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
.sb-label{padding:0 18px 8px;font-size:10px;font-weight:600;color:rgba(255,255,255,0.3);letter-spacing:1.2px;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:11px;padding:11px 18px;font-size:13px;color:rgba(255,255,255,0.65);cursor:pointer;border-left:3px solid transparent}
.sb-item:hover{background:rgba(255,255,255,0.05);color:#fff}
.sb-item.active{background:rgba(255,255,255,0.08);color:#fff;border-left-color:var(--red)}
.main{flex:1;display:flex;flex-direction:column;overflow-x:hidden}
.topbar{background:#fff;border-bottom:1px solid var(--g200);padding:14px 24px}
.topbar h1{font-size:18px;font-weight:700}
.topbar .crumb{font-size:12px;color:var(--g500)}
.content{padding:20px 24px;flex:1}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:#fff;padding:16px;border:1px solid var(--g200);border-radius:6px;cursor:pointer}
.stat-card.active{border-color:var(--black);background:var(--g100)}
.stat-label{font-size:11px;color:var(--g500);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;font-weight:600}
.stat-val{font-size:24px;font-weight:700;font-family:'DM Mono',monospace}
.table-wrap{background:#fff;border:1px solid var(--g200);border-radius:6px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 14px;font-size:11px;color:var(--g500);text-transform:uppercase;background:var(--g50);border-bottom:1px solid var(--g200)}
td{padding:14px;border-bottom:1px solid var(--g100)}
tr.row{cursor:pointer}
tr.row:hover{background:var(--g50)}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 10px;border-radius:3px;font-weight:600;font-family:'DM Mono',monospace}
.b-paid{background:#DBEAFE;color:#1E40AF}
.b-preparing{background:#EDE9FE;color:#5B21B6}
.b-shipping{background:#CCFBF1;color:#0F766E}
.b-delivered{background:#DCFCE7;color:#166534}
.empty,.loading{text-align:center;padding:60px 20px;color:var(--g500)}
.btn{padding:6px 12px;border:1px solid var(--g200);background:#fff;font-size:11px;border-radius:4px;cursor:pointer;font-weight:600}
.btn-primary{background:var(--black);color:#fff;border-color:var(--black)}
.tracking-link{color:var(--blue);font-size:11px;text-decoration:underline}
</style>
  <script src="admin-guard.js"></script>
</head>
<body>

<aside class="sidebar">
  <div class="sb-logo">Thailand<span class="dot">.</span>Market<span class="sb-sub">ADMIN PANEL</span></div>
  <div class="sb-section">
    <div class="sb-label">หลัก</div>
    <a href="admin-cms.html"><div class="sb-item"><span>📊</span>Dashboard</div></a>
    <a href="admin-cms.html"><div class="sb-item"><span>📦</span>สินค้า</div></a>
    <a href="admin-orders.html"><div class="sb-item"><span>🛒</span>ออเดอร์</div></a>
    <a href="admin-payments.html"><div class="sb-item"><span>💳</span>การชำระเงิน</div></a>
    <a href="admin-shipping.html"><div class="sb-item active"><span>🚚</span>จัดส่ง</div></a>
  </div>
  <div class="sb-section">
    <div class="sb-label">ตั้งค่า</div>
    <a href="admin-providers.html"><div class="sb-item"><span>⚙️</span>Payment & Shipping</div></a>
    <a href="index.html"><div class="sb-item"><span>🏠</span>กลับสู่เว็บไซต์</div></a>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="crumb">Admin · Shipping</div>
    <h1>🚚 จัดการการขนส่ง</h1>
  </div>
  <div class="content">
    <div class="stats">
      <div class="stat-card active" data-status="all"><div class="stat-label">ทั้งหมด</div><div class="stat-val" id="cnt-all">0</div></div>
      <div class="stat-card" data-status="paid"><div class="stat-label" style="color:#1E40AF">📦 รอแพ็ค</div><div class="stat-val" id="cnt-paid">0</div></div>
      <div class="stat-card" data-status="preparing"><div class="stat-label" style="color:#5B21B6">⏳ กำลังเตรียม</div><div class="stat-val" id="cnt-preparing">0</div></div>
      <div class="stat-card" data-status="shipping"><div class="stat-label" style="color:#0F766E">🚚 กำลังส่ง</div><div class="stat-val" id="cnt-shipping">0</div></div>
    </div>
    <div class="table-wrap">
      <div id="ship-body"><div class="loading">⏳ กำลังโหลด...</div></div>
    </div>
  </div>
</div>

<script>
const sb = supabase.createClient('https://qmgyimsptzewwyafvjzk.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtZ3lpbXNwdHpld3d5YWZ2anprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NjA4NDIsImV4cCI6MjA5MzAzNjg0Mn0.pcexjwmQndb_RhZHfKVZ6m2_21sn09iNAMyESjLOVJ0');
window._sb = sb;
let _orders = []; let _filter = 'all'; let _provs = [];

const ST_LABELS = {paid:'📦 รอแพ็ค',preparing:'⏳ กำลังเตรียม',shipping:'🚚 กำลังส่ง',delivered:'✓ ส่งสำเร็จ'};
const ST_CLASS = {paid:'b-paid',preparing:'b-preparing',shipping:'b-shipping',delivered:'b-delivered'};

async function load(){
  const { data:{ session } } = await sb.auth.getSession();
  if (!session){ location.href='login.html?from=admin-shipping.html'; return; }
  
  // Load shipping providers (for tracking URL templates)
  const { data:provs } = await sb.from('shipping_providers').select('*');
  _provs = provs || [];
  
  // Load orders that are paid/preparing/shipping/delivered
  const { data, error } = await sb.from('orders')
    .select('id,order_number,status,shipping_address,total,carrier,tracking_no,shipped_at,delivered_at,items,created_at,user_id')
    .in('status', ['paid','preparing','shipping','delivered'])
    .order('created_at', {ascending:false}).limit(500);
  if (error){ document.getElementById('ship-body').innerHTML = `<div class="empty">⚠️ ${error.message}</div>`; return; }
  
  _orders = data || [];
  updateStats();
  render();
}

function updateStats(){
  const c = {all:_orders.length, paid:0, preparing:0, shipping:0};
  _orders.forEach(o => { if(c[o.status]!==undefined) c[o.status]++; });
  document.getElementById('cnt-all').textContent = c.all;
  document.getElementById('cnt-paid').textContent = c.paid;
  document.getElementById('cnt-preparing').textContent = c.preparing;
  document.getElementById('cnt-shipping').textContent = c.shipping;
}

function trackUrl(carrier, no){
  if (!no) return null;
  const prov = _provs.find(p => p.name === carrier || p.code === carrier);
  if (prov?.tracking_url_template) return prov.tracking_url_template.replace('{tracking_no}', encodeURIComponent(no));
  return null;
}

function render(){
  let list = [..._orders];
  if (_filter !== 'all') list = list.filter(o => o.status === _filter);
  
  const body = document.getElementById('ship-body');
  if (!list.length){ body.innerHTML = `<div class="empty">📭 ไม่มีออเดอร์ในสถานะนี้</div>`; return; }
  
  body.innerHTML = `<table>
    <thead><tr>
      <th>ออเดอร์</th><th>ผู้รับ</th><th>รายการ</th>
      <th>ขนส่ง / Tracking</th><th>สถานะ</th><th>วันที่</th><th></th>
    </tr></thead>
    <tbody>${list.map(o=>{
      const a = o.shipping_address || {};
      const items = Array.isArray(o.items)?o.items:[];
      const totalQty = items.reduce((s,i)=>s+(i.qty||1),0);
      const url = trackUrl(o.carrier, o.tracking_no);
      const dateStr = new Date(o.created_at).toLocaleDateString('th-TH',{day:'numeric',month:'short'});
      return `<tr class="row" onclick="location.href='admin-order-detail.html?order=${o.order_number}'">
        <td><div style="font-family:'DM Mono',monospace;font-size:12px;font-weight:600">${o.order_number}</div><div style="font-size:11px;color:var(--g500);margin-top:2px">฿${Number(o.total).toLocaleString()}</div></td>
        <td><div style="font-weight:500">${a.name||'-'}</div><div style="font-size:11px;color:var(--g500);margin-top:2px">${(a.detail||'').slice(0,40)}${(a.detail||'').length>40?'...':''}</div></td>
        <td><div style="font-size:11px">${totalQty} ชิ้น</div><div style="font-size:11px;color:var(--g500);margin-top:2px">${(items[0]?.name||'-').slice(0,30)}</div></td>
        <td>
          ${o.carrier?`<div style="font-weight:600;font-size:12px">${o.carrier}</div>`:'<span style="color:var(--g400);font-size:11px">— ยังไม่ได้กำหนด —</span>'}
          ${o.tracking_no?`<div style="font-family:'DM Mono',monospace;font-size:11px;margin-top:2px">${o.tracking_no}</div>`:''}
          ${url?`<a href="${url}" target="_blank" class="tracking-link" onclick="event.stopPropagation()">เปิดเว็บขนส่ง ↗</a>`:''}
        </td>
        <td><span class="badge ${ST_CLASS[o.status]||''}">${ST_LABELS[o.status]||o.status}</span></td>
        <td style="font-size:11px;color:var(--g500)">${dateStr}</td>
        <td>
          ${o.status==='paid'||o.status==='preparing'?`<button class="btn btn-primary" onclick="event.stopPropagation();location.href='admin-order-detail.html?order=${o.order_number}'">📦 จัดส่ง</button>`:''}
        </td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

document.querySelectorAll('.stat-card').forEach(card => {
  card.addEventListener('click', ()=>{
    document.querySelectorAll('.stat-card').forEach(c=>c.classList.remove('active'));
    card.classList.add('active');
    _filter = card.dataset.status;
    render();
  });
});

load();
</script>
</body>
</html>
