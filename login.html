<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>เข้าสู่ระบบ — Thailand Market</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=DM+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--accent:#E63329;--g100:#F5F5F5;--g200:#E5E5E5;--g400:#A3A3A3;--g500:#737373;--g700:#404040;--mono:'DM Mono',monospace}
body{font-family:'IBM Plex Sans Thai','Inter',sans-serif;background:#FAFAFA;color:#0A0A0A;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border:1px solid var(--g200);border-radius:8px;padding:40px;max-width:420px;width:100%;box-shadow:0 4px 20px rgba(0,0,0,.04)}
.logo{font-family:'Inter';font-weight:800;font-size:24px;text-align:center;margin-bottom:8px}
.logo .dot{color:var(--accent)}
.subtitle{text-align:center;font-size:13px;color:var(--g500);margin-bottom:28px}
.fg{margin-bottom:14px}
.lbl{font-size:11px;color:var(--g700);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;display:block}
.inp{width:100%;padding:11px 14px;border:1px solid var(--g200);border-radius:4px;font-family:inherit;font-size:14px;background:#fff}
.inp:focus{outline:none;border-color:#0A0A0A}
.btn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:4px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px}
.btn:hover{background:#B5261F}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-out{background:#fff;color:var(--g700);border:1px solid var(--g200)}
.foot{text-align:center;margin-top:20px;font-size:13px;color:var(--g500)}
.foot a{color:var(--accent);text-decoration:none;font-weight:500}
.err{font-size:11px;color:var(--accent);margin-top:8px;text-align:center;display:none}
.err.on{display:block}
.divider{text-align:center;color:var(--g400);font-size:11px;margin:18px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--g200)}
.divider::before{left:0}
.divider::after{right:0}
.fpass{text-align:right;margin-top:6px}
.fpass a{font-size:12px;color:var(--g500);text-decoration:none}
.fpass a:hover{color:var(--accent)}

/* 2FA step */
.step{display:none}
.step.on{display:block}
.otp-box{display:flex;gap:8px;justify-content:center;margin:24px 0}
.otp-inp{width:48px;height:56px;text-align:center;font-size:22px;font-family:var(--mono);font-weight:700;border:2px solid var(--g200);border-radius:6px;background:#fff}
.otp-inp:focus{outline:none;border-color:var(--accent);background:#FEF2F2}
.mfa-icon{font-size:50px;text-align:center;margin-bottom:14px}
.mfa-info{text-align:center;font-size:13px;color:var(--g500);margin-bottom:6px}
</style>

<style>/* 📱 responsive patch */

@media (max-width: 480px){
  .card{padding:24px 18px;border:none;box-shadow:none;border-radius:0}
  body{overflow-x:hidden}
  input,button{font-size:16px}  /* กัน iOS ซูมเอง */
}
</style>
  <link rel="stylesheet" href="mobile-nav-fix.css">
</head>
<body>
<div class="card">
<div class="logo">Thailand<span class="dot">.</span>Market</div>
<div class="subtitle" id="subtitle">เข้าสู่ระบบ</div>

<!-- STEP 1: Login -->
<div class="step on" id="step-login">
  <div class="fg"><label class="lbl">อีเมล</label>
    <input class="inp" id="email" type="email" placeholder="your@email.com" autocomplete="username">
  </div>
  <div class="fg"><label class="lbl">รหัสผ่าน</label>
    <input class="inp" id="pwd" type="password" placeholder="••••••••" autocomplete="current-password">
    <div class="fpass"><a href="forgot-password.html">ลืมรหัสผ่าน?</a></div>
  </div>

  <button class="btn" id="btn-login" onclick="doLogin()">เข้าสู่ระบบ</button>

  <div class="err" id="err-login"></div>

  <div class="divider">หรือ</div>

  <button class="btn btn-out" onclick="loginWithOtp()">📧 รับ OTP ทางอีเมล (ไม่ใช้รหัสผ่าน)</button>

  <div class="foot">
    ยังไม่มีบัญชี? <a href="signup.html">สมัครสมาชิก</a>
  </div>
</div>

<!-- STEP 2: 2FA Challenge -->
<div class="step" id="step-2fa">
  <div class="mfa-icon">🛡️</div>
  <div class="mfa-info" style="font-weight:600;color:#0A0A0A;font-size:14px;margin-bottom:4px">ยืนยันตัวตน 2 ขั้น</div>
  <div class="mfa-info">เปิดแอป Authenticator แล้วใส่รหัส 6 หลัก</div>

  <div style="margin:24px 0">
    <input class="inp" id="mfa-single" inputmode="numeric" autocomplete="one-time-code"
      style="text-align:center;font-family:var(--mono);font-size:24px;letter-spacing:6px;font-weight:700;padding:14px"
      placeholder="------"
      maxlength="6">
    <div style="text-align:center;margin-top:8px;font-size:11px;color:var(--g500)">🛡️ TOTP 6 หลัก จาก Authenticator</div>
  </div>

  <button class="btn" id="btn-verify-mfa" onclick="verifyMFA()">ยืนยัน</button>

  <div class="err" id="err-mfa"></div>

  <div class="foot" style="margin-top:24px">
    <a onclick="cancelMFA()" style="cursor:pointer">← เปลี่ยนบัญชี</a>
  </div>
</div>

<!-- STEP 3: OTP Login -->
<div class="step" id="step-otp-login">
  <div class="mfa-icon">📧</div>
  <div class="mfa-info" style="font-weight:600;color:#0A0A0A;font-size:14px;margin-bottom:4px">ส่ง OTP ทางอีเมลแล้ว</div>
  <div class="mfa-info">ใส่รหัส 6 หลักที่ได้รับ</div>
  <div class="mfa-info" style="font-family:var(--mono);font-weight:600;color:#0A0A0A" id="otp-login-email"></div>

  <div style="margin:24px 0">
    <input class="inp" id="ol-single" inputmode="numeric" autocomplete="one-time-code"
      style="text-align:center;font-family:var(--mono);font-size:24px;letter-spacing:6px;font-weight:700;padding:14px"
      placeholder="------"
      maxlength="10">
    <div style="text-align:center;margin-top:8px;font-size:11px;color:var(--g500)">💡 รองรับ 6 หรือ 8 หลัก</div>
  </div>

  <button class="btn" onclick="verifyOtpLogin()">เข้าสู่ระบบ</button>

  <div class="err" id="err-otp-login"></div>

  <div class="foot" style="margin-top:24px">
    <a onclick="goLoginStep()" style="cursor:pointer">← กลับ</a>
  </div>
</div>
</div>

<script>
const _sb = window.supabase.createClient('https://qmgyimsptzewwyafvjzk.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtZ3lpbXNwdHpld3d5YWZ2anprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NjA4NDIsImV4cCI6MjA5MzAzNjg0Mn0.pcexjwmQndb_RhZHfKVZ6m2_21sn09iNAMyESjLOVJ0');
let _factorId = null, _challengeId = null, _otpEmail = '';

function showErr(id, msg, ok){
  const el = document.getElementById('err-'+id);
  if (el) { el.textContent = msg; el.classList.add('on'); el.style.color = ok ? '#10B981' : '#E63329'; }
}
function clearErr(id){document.getElementById('err-'+id)?.classList.remove('on');}

function goStep(id){
  document.querySelectorAll('.step').forEach(s => s.classList.remove('on'));
  document.getElementById('step-'+id).classList.add('on');
}

function goLoginStep(){goStep('login');}

// ── Password login ──
async function doLogin(){
  clearErr('login');
  const email = document.getElementById('email').value.trim().toLowerCase();
  const pwd = document.getElementById('pwd').value;
  if (!email || !pwd) { showErr('login', '⚠️ กรุณากรอกอีเมลและรหัสผ่าน'); return; }

  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.textContent = '⏳ กำลังเข้าสู่ระบบ...';

  try {
    const { data, error } = await _sb.auth.signInWithPassword({ email, password: pwd });
    if (error) throw error;

    // ตรวจว่ามี 2FA factor ไหม
    const { data: factors } = await _sb.auth.mfa.listFactors();
    const verified = (factors?.totp || []).filter(f => f.status === 'verified');

    if (verified.length > 0) {
      // ต้อง verify 2FA
      _factorId = verified[0].id;
      const { data: ch, error: chErr } = await _sb.auth.mfa.challenge({ factorId: _factorId });
      if (chErr) throw chErr;
      _challengeId = ch.id;
      goStep('2fa');
      setTimeout(() => { const i=document.getElementById('mfa-single'); if(i) i.focus(); }, 200);
    } else {
      // เข้าได้เลย
      redirectAfterLogin();
    }
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'เข้าสู่ระบบ';
    showErr('login', '❌ ' + (e.message.includes('Invalid') ? 'อีเมลหรือรหัสผ่านไม่ถูกต้อง' : e.message));
  }
}

// ── 2FA verify ──
function mfaInput(el, idx){
  el.value = el.value.replace(/\D/g, '');
  if (el.value && idx < 6) document.getElementById('mfa-' + (idx+1)).focus();
  if (idx === 6 && el.value) setTimeout(verifyMFA, 100);
}

async function verifyMFA(){
  clearErr('mfa');
  const inp = document.getElementById('mfa-single');
  let code = (inp ? inp.value : '').replace(/[^0-9]/g, '').trim();
  if (code.length !== 6) { showErr('mfa', '⚠️ TOTP 6 หลัก'); return; }

  const btn = document.getElementById('btn-verify-mfa');
  btn.disabled = true;
  btn.textContent = '⏳ กำลังยืนยัน...';

  try {
    const { error } = await _sb.auth.mfa.verify({
      factorId: _factorId,
      challengeId: _challengeId,
      code: code
    });
    if (error) throw error;
    redirectAfterLogin();
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'ยืนยัน';
    showErr('mfa', '❌ รหัสไม่ถูกต้อง');
    const i=document.getElementById('mfa-single'); if(i){i.value='';i.focus();}
  }
}

function cancelMFA(){
  _sb.auth.signOut();
  goStep('login');
}

// ── Login via OTP (no password) ──
async function loginWithOtp(){
  const email = document.getElementById('email').value.trim().toLowerCase();
  if (!email.match(/^\S+@\S+\.\S+$/)) { showErr('login', '⚠️ กรอกอีเมลก่อน'); return; }

  try {
    const { error } = await _sb.auth.signInWithOtp({
      email,
      options: { shouldCreateUser: false }  // ไม่สร้าง user ใหม่ ต้องสมัครก่อน
    });
    if (error) throw error;
    _otpEmail = email;
    document.getElementById('otp-login-email').textContent = email;
    goStep('otp-login');
    setTimeout(() => { const i=document.getElementById('ol-single'); if(i) i.focus(); }, 200);
  } catch(e) {
    showErr('login', '❌ ' + e.message);
  }
}

function olInput(el, idx){
  el.value = el.value.replace(/\D/g, '');
  if (el.value && idx < 6) document.getElementById('ol-' + (idx+1)).focus();
  if (idx === 6 && el.value) setTimeout(verifyOtpLogin, 100);
}

async function verifyOtpLogin(){
  clearErr('otp-login');
  const inp = document.getElementById('ol-single');
  let otp = (inp ? inp.value : '').replace(/[^0-9]/g, '').trim();
  if (otp.length !== 6 && otp.length !== 8) { showErr('otp-login', '⚠️ OTP 6 หรือ 8 หลัก'); return; }

  try {
    const { error } = await _sb.auth.verifyOtp({
      email: _otpEmail,
      token: otp,
      type: 'email'
    });
    if (error) throw error;
    redirectAfterLogin();
  } catch(e) {
    showErr('otp-login', '❌ OTP ไม่ถูกต้องหรือหมดอายุ');
    const i=document.getElementById('ol-single'); if(i){i.value='';i.focus();}
  }
}

// ── Handle backspace ──
document.addEventListener('keydown', e => {
  if (e.key === 'Backspace' && e.target.classList?.contains('otp-inp')) {
    if (!e.target.value) {
      const parts = e.target.id.split('-');
      const idx = parseInt(parts[1]);
      const prefix = parts[0];
      if (idx > 1) document.getElementById(prefix + '-' + (idx-1)).focus();
    }
  }
});

// ── Enter to submit ──
['email','pwd'].forEach(id => {
  document.getElementById(id)?.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
});

function redirectAfterLogin(){
  const next = new URLSearchParams(location.search).get('next') || 'index.html';
  location.href = next;
}

// ── ถ้า login อยู่แล้ว ตรวจ AAL2 ──
(async () => {
  const { data: { session } } = await _sb.auth.getSession();
  if (!session) return;

  const { data: aalData } = await _sb.auth.mfa.getAuthenticatorAssuranceLevel();
  if (aalData?.currentLevel === 'aal1' && aalData?.nextLevel === 'aal2') {
    // ต้อง verify 2FA
    const { data: factors } = await _sb.auth.mfa.listFactors();
    const verified = (factors?.totp || []).filter(f => f.status === 'verified');
    if (verified.length > 0) {
      _factorId = verified[0].id;
      const { data: ch } = await _sb.auth.mfa.challenge({ factorId: _factorId });
      _challengeId = ch.id;
      goStep('2fa');
      setTimeout(() => { const i=document.getElementById('mfa-single'); if(i) i.focus(); }, 200);
      return;
    }
  }
  redirectAfterLogin();
})();
</script>
</body>
</html>
