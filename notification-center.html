<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>การแจ้งเตือน — Thailand Market</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=DM+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--accent:#E63329;--g50:#FAFAFA;--g100:#F5F5F5;--g200:#E5E5E5;--g300:#D4D4D4;--g400:#A3A3A3;--g500:#737373;--g700:#404040}
body{font-family:'IBM Plex Sans Thai','Inter',sans-serif;background:#FAFAFA;color:#0A0A0A;font-size:14px;min-height:100vh}
.nav{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--g200);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;z-index:100;flex-wrap:wrap;gap:8px}
.logo{font-family:'Inter';font-weight:800;font-size:18px;text-decoration:none;color:#0A0A0A}.logo .dot{color:var(--accent)}
.back{padding:6px 12px;background:#fff;border:1px solid var(--g200);border-radius:4px;text-decoration:none;color:var(--g700);font-size:12px;font-family:inherit;cursor:pointer}
.back:hover{background:var(--g100)}
.main{padding:24px 16px;max-width:780px;margin:0 auto}
.page-header{display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.ph-title{font-size:22px;font-weight:700}
.unread-cnt{background:var(--accent);color:#fff;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:600}
.ph-actions{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
.act-btn{padding:7px 12px;background:#fff;border:1px solid var(--g200);border-radius:4px;cursor:pointer;font-size:12px;color:var(--g700);font-family:inherit;font-weight:500}
.act-btn:hover{background:var(--g100);border-color:#0A0A0A}

.filter-tabs{display:flex;gap:6px;margin-bottom:18px;overflow-x:auto;padding-bottom:4px}
.ft{padding:8px 14px;background:#fff;border:1px solid var(--g200);border-radius:99px;cursor:pointer;font-size:12px;color:var(--g700);white-space:nowrap;display:flex;align-items:center;gap:6px;font-family:inherit;font-weight:500}
.ft.active{background:#0A0A0A;color:#fff;border-color:#0A0A0A}
.ft-cnt{background:rgba(0,0,0,.1);padding:1px 7px;border-radius:9px;font-size:10px;font-weight:600;min-width:18px;text-align:center}
.ft.active .ft-cnt{background:rgba(255,255,255,.2)}
.ft-cnt.unread{background:var(--accent);color:#fff}

.notif{display:flex;gap:12px;padding:14px;background:#fff;border:1px solid var(--g200);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:.15s;align-items:flex-start}
.notif:hover{border-color:#0A0A0A;transform:translateX(2px)}
.notif.unread{background:#FFF7ED;border-left:3px solid var(--accent)}
.notif-ico{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background:#F5F5F5}
.notif-body{flex:1;min-width:0}
.notif-title{font-weight:600;font-size:14px;margin-bottom:2px;display:flex;align-items:center;gap:6px}
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
.notif-text{font-size:13px;color:var(--g700);line-height:1.5;margin-bottom:4px;word-break:break-word}
.notif-time{font-size:11px;color:var(--g400)}

.empty{padding:60px 20px;text-align:center;background:#fff;border-radius:8px;border:1px solid var(--g200)}
.empty-icon{font-size:50px;margin-bottom:14px;opacity:.7}
.empty-title{font-size:15px;font-weight:600;margin-bottom:6px}
.empty-desc{font-size:13px;color:var(--g500);margin-bottom:18px}
.empty .btn{display:inline-block;padding:11px 24px;background:var(--accent);color:#fff;border-radius:6px;text-decoration:none;font-weight:600;font-size:13px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0A0A0A;color:#fff;padding:11px 20px;border-radius:6px;z-index:9999;font-size:13px;opacity:0;transition:.3s;pointer-events:none}
.toast.on{opacity:1}

@media(max-width:480px){
  .ph-title{font-size:18px}
  .ph-actions{margin-left:0;width:100%}
  .act-btn{flex:1}
}
</style>
</head>
<body>
<nav class="nav">
  <a href="profile.html" class="back">← โปรไฟล์</a>
  <a href="index.html" class="logo">Thailand<span class="dot">.</span>Market</a>
  <a href="chat.html" class="back">💬 แชท</a>
</nav>

<main class="main">
  <div class="page-header">
    <div class="ph-title">🔔 การแจ้งเตือน</div>
    <div class="unread-cnt" id="unread-count">— ใหม่</div>
    <div class="ph-actions">
      <button class="act-btn" onclick="markAllRead()">✓ อ่านทั้งหมด</button>
      <button class="act-btn" onclick="loadNotifications(_curFilter)">🔄 รีเฟรช</button>
    </div>
  </div>

  <div class="filter-tabs">
    <button class="ft active" data-filter="all">
      ทั้งหมด <span class="ft-cnt" id="cnt-all">0</span>
    </button>
    <button class="ft" data-filter="order">
      📦 ออเดอร์ <span class="ft-cnt" id="cnt-order">0</span>
    </button>
    <button class="ft" data-filter="promo">
      🎟️ โปรโมชัน <span class="ft-cnt" id="cnt-promo">0</span>
    </button>
    <button class="ft" data-filter="loyalty">
      ⭐ Loyalty <span class="ft-cnt" id="cnt-loyalty">0</span>
    </button>
    <button class="ft" data-filter="system">
      🔧 ระบบ <span class="ft-cnt" id="cnt-system">0</span>
    </button>
  </div>

  <div id="notif-list">
    <div class="empty">
      <div class="empty-icon">⏳</div>
      <div class="empty-title">กำลังโหลด...</div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
// ── Supabase ──
const _sb = window.supabase.createClient(
  'https://qmgyimsptzewwyafvjzk.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtZ3lpbXNwdHpld3d5YWZ2anprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NjA4NDIsImV4cCI6MjA5MzAzNjg0Mn0.pcexjwmQndb_RhZHfKVZ6m2_21sn09iNAMyESjLOVJ0'
);
window._sb = _sb;

let _curFilter = 'all';
let _notifs = [];
let _userId = null;

// ── Helpers ──
function esc(s){return(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function toast(msg, kind){
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.style.background = kind === 'ok' ? '#10B981' : kind === 'err' ? '#E63329' : '#0A0A0A';
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2500);
}

function timeAgo(d){
  if (!d) return '';
  const diff = (Date.now() - new Date(d).getTime()) / 1000;
  if (diff < 60) return 'เมื่อสักครู่';
  if (diff < 3600) return 'เมื่อ ' + Math.floor(diff/60) + ' นาทีที่แล้ว';
  if (diff < 86400) return 'เมื่อ ' + Math.floor(diff/3600) + ' ชั่วโมงที่แล้ว';
  if (diff < 604800) return 'เมื่อ ' + Math.floor(diff/86400) + ' วันที่แล้ว';
  return new Date(d).toLocaleDateString('th-TH');
}

// ── โหลด notifications ──
async function loadNotifications(filter){
  filter = filter || 'all';
  _curFilter = filter;

  const wrap = document.getElementById('notif-list');
  wrap.innerHTML = '<div class="empty"><div class="empty-icon">⏳</div><div class="empty-title">กำลังโหลด...</div></div>';

  try {
    const { data: { user } } = await _sb.auth.getUser();
    if (!user) {
      wrap.innerHTML = '<div class="empty">' +
        '<div class="empty-icon">🔒</div>' +
        '<div class="empty-title">ยังไม่ได้เข้าสู่ระบบ</div>' +
        '<div class="empty-desc">เข้าสู่ระบบเพื่อดูการแจ้งเตือนของคุณ</div>' +
        '<a href="login.html?next=' + encodeURIComponent('notification-center.html') + '" class="btn">เข้าสู่ระบบ</a>' +
        '</div>';
      // hide controls
      document.querySelector('.ph-actions').style.display = 'none';
      document.querySelector('.filter-tabs').style.display = 'none';
      document.getElementById('unread-count').style.display = 'none';
      return;
    }

    // ดึง user_id
    if (!_userId) {
      const { data: udata } = await _sb.from('users').select('id').eq('email', user.email).maybeSingle();
      _userId = udata ? udata.id : user.id;
    }

    // ดึง notifications ตรงๆ (ไม่ผ่าน RPC เพื่อ compatible)
    let q = _sb.from('notifications').select('*');
    
    // user ของตัวเอง + global
    q = q.or('user_id.eq.' + _userId + ',target.eq.all_users');
    
    // filter type
    if (filter !== 'all') q = q.eq('type', filter);
    
    const { data, error } = await q.order('created_at', { ascending: false }).limit(100);
    
    if (error) throw error;
    
    _notifs = data || [];
    updateCounts();
    renderList();
    
  } catch(e) {
    console.error('loadNotifications:', e);
    wrap.innerHTML = '<div class="empty">' +
      '<div class="empty-icon">⚠️</div>' +
      '<div class="empty-title">เกิดข้อผิดพลาด</div>' +
      '<div class="empty-desc">' + esc(e.message || 'ไม่สามารถโหลดข้อมูลได้') + '</div>' +
      '<button class="btn" onclick="loadNotifications(_curFilter)">ลองใหม่</button>' +
      '</div>';
  }
}

// ── Update counts ──
function updateCounts(){
  const counts = { all: 0, order: 0, promo: 0, loyalty: 0, system: 0 };
  let unread = 0;
  
  _notifs.forEach(n => {
    counts.all++;
    if (counts[n.type] !== undefined) counts[n.type]++;
    if (!n.is_read) unread++;
  });
  
  // ถ้า filter ไม่ใช่ all → ต้องดึง count ของ filter อื่นๆ ด้วย
  // ทำง่ายๆ: นับเฉพาะที่ filter ปัจจุบันแสดง
  
  Object.keys(counts).forEach(k => {
    const el = document.getElementById('cnt-' + k);
    if (el) {
      el.textContent = counts[k];
    }
  });
  
  const unreadEl = document.getElementById('unread-count');
  if (unreadEl) {
    unreadEl.textContent = unread + ' ใหม่';
    unreadEl.style.display = unread > 0 ? '' : 'none';
  }
}

// ── Render list ──
function renderList(){
  const wrap = document.getElementById('notif-list');
  
  if (!_notifs || _notifs.length === 0) {
    wrap.innerHTML = '<div class="empty">' +
      '<div class="empty-icon">🔔</div>' +
      '<div class="empty-title">ยังไม่มีการแจ้งเตือน</div>' +
      '<div class="empty-desc">เมื่อมีอัปเดตใหม่ จะแสดงที่นี่</div>' +
      '</div>';
    return;
  }
  
  const html = _notifs.map(n => {
    const ico = n.icon || '🔔';
    const title = esc(n.title || '');
    const body = esc(n.message || n.body || '');
    const time = timeAgo(n.created_at);
    const unread = !n.is_read;
    const link = n.link || '';
    
    return '<div class="notif' + (unread ? ' unread' : '') + '" onclick="onClickNotif(\'' + n.id + '\', \'' + esc(link).replace(/'/g, '\\\'') + '\')">' +
      '<div class="notif-ico">' + esc(ico) + '</div>' +
      '<div class="notif-body">' +
        '<div class="notif-title">' + title + (unread ? '<span class="notif-dot"></span>' : '') + '</div>' +
        '<div class="notif-text">' + body + '</div>' +
        '<div class="notif-time">' + esc(time) + '</div>' +
      '</div>' +
    '</div>';
  }).join('');
  
  wrap.innerHTML = html;
}

// ── คลิก notification ──
async function onClickNotif(id, link){
  try {
    await _sb.from('notifications').update({ is_read: true }).eq('id', id);
    
    // update local state
    const n = _notifs.find(x => x.id === id);
    if (n) n.is_read = true;
    
    updateCounts();
    
    // ถ้ามี link ให้ไป
    if (link && link !== 'null' && link !== '') {
      location.href = link;
    } else {
      renderList();
    }
  } catch(e) {
    console.warn('mark read:', e);
    if (link && link !== 'null' && link !== '') location.href = link;
  }
}

// ── Mark all read ──
async function markAllRead(){
  if (!_userId) return;
  
  try {
    const { error } = await _sb.from('notifications')
      .update({ is_read: true })
      .or('user_id.eq.' + _userId + ',target.eq.all_users')
      .eq('is_read', false);
    
    if (error) throw error;
    
    _notifs.forEach(n => n.is_read = true);
    updateCounts();
    renderList();
    toast('✓ อ่านทั้งหมดแล้ว', 'ok');
  } catch(e) {
    toast('❌ ' + e.message, 'err');
  }
}

// ── Filter tabs ──
document.querySelectorAll('.filter-tabs .ft').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-tabs .ft').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadNotifications(btn.getAttribute('data-filter'));
  });
});

// ── Init ──
loadNotifications('all');
</script>
</body>
</html>
