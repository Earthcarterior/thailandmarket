<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — รายละเอียดออเดอร์ · Thailand Market</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{--black:#0A0A0A;--white:#FFF;--red:#E63329;--g50:#FAFAFA;--g100:#F5F5F5;--g200:#E5E5E5;--g400:#A3A3A3;--g500:#737373;--g600:#525252;--g700:#404040;--g900:#171717;--green:#16A34A;--orange:#F97316;--blue:#2563EB}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--g50);color:var(--g900);font-size:14px;min-height:100vh}
a{text-decoration:none;color:inherit}

.topbar{background:#fff;border-bottom:1px solid var(--g200);padding:14px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10}
.topbar a.back{font-size:13px;color:var(--g500);display:flex;align-items:center;gap:4px}
.topbar h1{font-size:18px;font-weight:700;font-family:'DM Mono',monospace}
.topbar .actions{margin-left:auto;display:flex;gap:8px}
.btn{padding:8px 14px;border:1px solid var(--g200);background:#fff;font-size:12px;border-radius:4px;cursor:pointer;font-weight:600;font-family:'DM Sans',sans-serif}
.btn:hover{background:var(--g50)}
.btn-primary{background:var(--black);color:#fff;border-color:var(--black)}
.btn-primary:hover{background:#000}
.btn-success{background:var(--green);color:#fff;border-color:var(--green)}
.btn-danger{background:var(--red);color:#fff;border-color:var(--red)}

.content{max-width:1280px;margin:0 auto;padding:20px 24px;display:grid;grid-template-columns:1fr 380px;gap:20px}

.section{background:#fff;border:1px solid var(--g200);border-radius:6px;margin-bottom:16px;overflow:hidden}
.section-head{padding:14px 18px;border-bottom:1px solid var(--g200);background:var(--g50);display:flex;align-items:center;gap:10px}
.section-head h3{font-size:14px;font-weight:700}
.section-body{padding:18px}

.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 10px;border-radius:3px;font-weight:600;font-family:'DM Mono',monospace}
.b-pending{background:#FEF3C7;color:#92400E}
.b-paid{background:#DBEAFE;color:#1E40AF}
.b-preparing{background:#EDE9FE;color:#5B21B6}
.b-shipping{background:#CCFBF1;color:#0F766E}
.b-delivered{background:#DCFCE7;color:#166534}
.b-cancelled{background:#F3F4F6;color:#525252}
.b-returned{background:#FEE2E2;color:#991B1B}

/* items */
.item-row{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--g100)}
.item-row:last-child{border-bottom:0}
.item-img{width:56px;height:56px;background:var(--g100);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;overflow:hidden}
.item-img img{width:100%;height:100%;object-fit:cover}
.item-info{flex:1}
.item-name{font-size:13px;font-weight:600}
.item-meta{font-size:11px;color:var(--g500);margin-top:2px}
.item-qty{font-family:'DM Mono',monospace;font-size:12px;color:var(--g500);margin-top:4px}
.item-price{text-align:right;font-family:'DM Mono',monospace;font-weight:700}

/* timeline */
.tl-item{padding:10px 0;display:flex;gap:12px;position:relative}
.tl-item:not(:last-child)::before{content:'';position:absolute;left:11px;top:30px;bottom:-10px;width:2px;background:var(--g200)}
.tl-item.done::before{background:var(--green)}
.tl-dot{width:24px;height:24px;border-radius:50%;background:var(--g100);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;border:2px solid var(--g200)}
.tl-item.done .tl-dot{background:var(--green);color:#fff;border-color:var(--green)}
.tl-info{flex:1}
.tl-title{font-size:13px;font-weight:600}
.tl-desc{font-size:11px;color:var(--g500);margin-top:2px}
.tl-time{font-size:10px;color:var(--g400);font-family:'DM Mono',monospace;margin-top:2px}

/* form */
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:600;margin-bottom:6px;color:var(--g700)}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 12px;border:1px solid var(--g200);border-radius:4px;font-size:13px;font-family:'DM Sans',sans-serif}
.fg input:focus,.fg select:focus{outline:0;border-color:var(--black)}

/* sidebar info */
.info-row{display:flex;justify-content:space-between;padding:8px 0;font-size:13px;border-bottom:1px solid var(--g100)}
.info-row:last-child{border-bottom:0}
.info-row .lbl{color:var(--g500);font-size:12px}
.info-row .val{font-weight:600;text-align:right}

.summary-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px}
.summary-total{font-weight:700;font-size:16px;color:var(--red);border-top:1px solid var(--g200);padding-top:10px;margin-top:6px}

.action-btn-grid{display:grid;gap:8px}
.danger-zone{padding:16px;background:#FEF2F2;border:1px solid #FECACA;border-radius:6px;margin-top:12px}
.danger-zone h4{font-size:12px;color:#991B1B;margin-bottom:8px;font-weight:700}

.empty,.loading{text-align:center;padding:60px 20px;color:var(--g500)}

@media(max-width:980px){
  .content{grid-template-columns:1fr}
}
</style>
  <link rel="stylesheet" href="mobile-nav-fix.css">   <script src="admin-guard.js"></script>
</head>
<body>

<div class="topbar">
  <a href="admin-orders.html" class="back">← กลับ</a>
  <h1 id="page-title">⏳ Loading...</h1>
  <div class="actions" id="page-actions"></div>
</div>

<div class="content" id="page-content">
  <div class="loading" style="grid-column:1/-1">⏳ กำลังโหลด...</div>
</div>

<script>
const SB_URL = 'https://qmgyimsptzewwyafvjzk.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtZ3lpbXNwdHpld3d5YWZ2anprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NjA4NDIsImV4cCI6MjA5MzAzNjg0Mn0.pcexjwmQndb_RhZHfKVZ6m2_21sn09iNAMyESjLOVJ0';
const sb = supabase.createClient(SB_URL, SB_KEY);
window._sb = sb;

const ST_LABELS = {pending:'⏳ รอชำระ',paid:'💳 ชำระแล้ว',preparing:'📦 เตรียมของ',shipping:'🚚 กำลังส่ง',delivered:'✓ ส่งสำเร็จ',cancelled:'✕ ยกเลิก',returned:'↩️ คืนสินค้า'};
const ST_CLASS = {pending:'b-pending',paid:'b-paid',preparing:'b-preparing',shipping:'b-shipping',delivered:'b-delivered',cancelled:'b-cancelled',returned:'b-returned'};
const ST_ICONS = {placed:'📝',paid:'💳',preparing:'📦',shipping:'🚚',delivered:'🎉',cancelled:'❌'};
const ST_FLOW = ['placed','paid','preparing','shipping','delivered'];

let _order = null;
let _payment = null;
let _events = [];
let _shipProviders = [];

async function load(){
  const orderNum = new URLSearchParams(location.search).get('order');
  if (!orderNum){
    document.getElementById('page-content').innerHTML = `<div class="empty" style="grid-column:1/-1"><div style="font-size:48px;margin-bottom:12px">⚠️</div>กรุณาระบุเลขออเดอร์</div>`;
    return;
  }

  // Auth
  const { data:{ session } } = await sb.auth.getSession();
  if (!session){ location.href='login.html?from=admin-orders.html'; return; }

  // Order
  const { data:order, error } = await sb.from('orders').select('*').eq('order_number', orderNum).maybeSingle();
  if (error || !order){
    document.getElementById('page-content').innerHTML = `<div class="empty" style="grid-column:1/-1"><div style="font-size:48px;margin-bottom:12px">🔍</div>ไม่พบออเดอร์ ${orderNum}</div>`;
    return;
  }
  _order = order;

  // Payment
  const { data:payment } = await sb.from('payments').select('*').eq('order_id', order.id).maybeSingle();
  _payment = payment;

  // Tracking events
  const { data:events } = await sb.from('order_tracking').select('*').eq('order_id', order.id).order('created_at',{ascending:true});
  _events = events || [];

  // Shipping providers
  const { data:provs } = await sb.from('shipping_providers').select('*').eq('is_active', true).order('display_order');
  _shipProviders = provs || [];

  render();
}

function render(){
  const o = _order;
  const p = _payment;
  document.getElementById('page-title').textContent = '#' + o.order_number;

  // Page actions buttons (top right)
  const actions = [];
  if (o.status === 'pending' && p?.status !== 'paid'){
    actions.push(`<button class="btn btn-success" onclick="confirmPayment()">✓ ยืนยันรับชำระ</button>`);
  }
  if (o.status === 'paid'){
    actions.push(`<button class="btn btn-primary" onclick="setStatus('preparing')">📦 เริ่มเตรียมพัสดุ</button>`);
  }
  if (o.status !== 'cancelled' && o.status !== 'delivered'){
    actions.push(`<button class="btn btn-danger" onclick="cancelOrder()">ยกเลิก</button>`);
  }
  document.getElementById('page-actions').innerHTML = actions.join('');

  const items = Array.isArray(o.items) ? o.items : [];
  const addr = o.shipping_address || {};
  const dateStr = new Date(o.created_at).toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'}) + ' · ' + new Date(o.created_at).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});

  // payment method label
  const payIcon = {credit:'💳',qr:'📱',install:'🏦',counter:'🏪'};
  const payLabel = {credit:'บัตรเครดิต/เดบิต',qr:'QR PromptPay',install:'ผ่อน 0%',counter:'Counter Service'};
  const payText = `${payIcon[o.payment_method]||''} ${payLabel[o.payment_method]||o.payment_method}`;
  const cardInfo = p?.card_brand ? ` · ${p.card_brand} ····${p.card_last4||''}` : '';

  // current step
  const eventStatuses = _events.map(e=>e.status);
  const currentIdx = Math.max(...ST_FLOW.map((s,i)=>eventStatuses.includes(s)?i:-1), 0);

  // ── LEFT COLUMN ──
  const leftHTML = `
    <!-- ITEMS -->
    <div class="section">
      <div class="section-head"><h3>📦 รายการสินค้า (${items.length} ชิ้น)</h3></div>
      <div class="section-body">
        ${items.map(it=>`<div class="item-row">
          <div class="item-img">${it.thumbnail?`<img src="${it.thumbnail}">`:'📦'}</div>
          <div class="item-info">
            <div class="item-name">${it.name||'สินค้า'}</div>
            <div class="item-meta">${it.shop||''} ${it.variant?'· '+it.variant:''}</div>
            <div class="item-qty">฿${Number(it.price).toLocaleString()} × ${it.qty}</div>
          </div>
          <div class="item-price">฿${Number(it.subtotal||it.price*it.qty).toLocaleString()}</div>
        </div>`).join('')}
      </div>
    </div>

    <!-- TIMELINE -->
    <div class="section">
      <div class="section-head"><h3>📍 ประวัติการดำเนินการ</h3></div>
      <div class="section-body">
        ${_events.length === 0 ? '<div class="empty">ยังไม่มีเหตุการณ์</div>' : _events.slice().reverse().map((ev,i,arr)=>`
          <div class="tl-item done">
            <div class="tl-dot">${ST_ICONS[ev.status]||'•'}</div>
            <div class="tl-info">
              <div class="tl-title">${ev.description||ev.status}</div>
              ${ev.location?`<div class="tl-desc">📍 ${ev.location}</div>`:''}
              ${ev.tracking_no?`<div class="tl-desc">🔢 ${ev.carrier||''} ${ev.tracking_no}</div>`:''}
              <div class="tl-time">${new Date(ev.created_at).toLocaleString('th-TH')}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>

    <!-- SHIPPING ACTION (if order is paid/preparing) -->
    ${(o.status==='paid'||o.status==='preparing'||o.status==='shipping') ? `
    <div class="section">
      <div class="section-head"><h3>🚚 จัดการการขนส่ง</h3></div>
      <div class="section-body">
        ${o.tracking_no ? `
          <div style="background:var(--g50);padding:12px;border-radius:4px;margin-bottom:14px">
            <div style="font-size:12px;color:var(--g500);margin-bottom:4px">เลขพัสดุปัจจุบัน</div>
            <div style="font-family:'DM Mono',monospace;font-size:15px;font-weight:700">${o.carrier||''} · ${o.tracking_no}</div>
          </div>
        ` : ''}
        <div class="fg">
          <label>ผู้ให้บริการขนส่ง</label>
          <select id="ship-carrier">
            <option value="">— เลือก —</option>
            ${_shipProviders.map(sp=>`<option value="${sp.code}" ${o.carrier===sp.name?'selected':''}>${sp.name} (${sp.estimated_days||'-'})</option>`).join('')}
          </select>
        </div>
        <div class="fg">
          <label>เลข Tracking Number</label>
          <input id="ship-tracking" type="text" placeholder="เช่น TH123456789TM" value="${o.tracking_no||''}">
        </div>
        <div class="fg">
          <label>หมายเหตุ (optional)</label>
          <input id="ship-note" type="text" placeholder="เช่น ส่งวันนี้รอบบ่าย">
        </div>
        <button class="btn btn-primary" style="width:100%;padding:11px" onclick="updateShipping()">${o.status==='shipping'?'📝 อัปเดตข้อมูลพัสดุ':'🚚 ทำเครื่องหมายว่าจัดส่งแล้ว'}</button>
        ${o.status==='shipping' ? `<button class="btn btn-success" style="width:100%;padding:11px;margin-top:8px" onclick="setStatus('delivered')">✓ ทำเครื่องหมายว่าถึงผู้รับแล้ว</button>` : ''}
      </div>
    </div>` : ''}
  `;

  // ── RIGHT SIDEBAR ──
  const rightHTML = `
    <!-- ORDER INFO -->
    <div class="section">
      <div class="section-head"><h3>ℹ️ ข้อมูลออเดอร์</h3></div>
      <div class="section-body">
        <div class="info-row"><span class="lbl">สถานะ</span><span class="val"><span class="badge ${ST_CLASS[o.status]||''}">${ST_LABELS[o.status]||o.status}</span></span></div>
        <div class="info-row"><span class="lbl">เลขออเดอร์</span><span class="val" style="font-family:'DM Mono',monospace">${o.order_number}</span></div>
        <div class="info-row"><span class="lbl">วันที่สั่ง</span><span class="val" style="font-size:11px">${dateStr}</span></div>
        <div class="info-row"><span class="lbl">User ID</span><span class="val" style="font-size:10px;font-family:'DM Mono',monospace">${o.user_id?.slice(0,8)||'-'}...</span></div>
      </div>
    </div>

    <!-- CUSTOMER -->
    <div class="section">
      <div class="section-head"><h3>👤 ลูกค้า / ที่อยู่จัดส่ง</h3></div>
      <div class="section-body">
        <div style="font-weight:600;margin-bottom:4px">${addr.name||'-'}</div>
        <div style="font-size:12px;color:var(--g500);margin-bottom:8px">${addr.detail||'-'}</div>
        ${addr.tag?`<span class="badge b-paid">${addr.tag}</span>`:''}
      </div>
    </div>

    <!-- PAYMENT -->
    <div class="section">
      <div class="section-head"><h3>💳 การชำระเงิน</h3></div>
      <div class="section-body">
        <div class="info-row"><span class="lbl">วิธีชำระ</span><span class="val">${payText}</span></div>
        ${p?.card_brand ? `<div class="info-row"><span class="lbl">บัตร</span><span class="val">${p.card_brand} ····${p.card_last4||'????'}</span></div>` : ''}
        ${p?.card_holder ? `<div class="info-row"><span class="lbl">ชื่อบนบัตร</span><span class="val" style="font-size:11px">${p.card_holder}</span></div>` : ''}
        ${p?.qr_ref ? `<div class="info-row"><span class="lbl">QR Ref</span><span class="val" style="font-family:'DM Mono',monospace;font-size:10px">${p.qr_ref}</span></div>` : ''}
        ${p?.counter_ref ? `<div class="info-row"><span class="lbl">Counter Ref</span><span class="val" style="font-family:'DM Mono',monospace;font-size:11px">${p.counter_ref}</span></div>` : ''}
        <div class="info-row"><span class="lbl">สถานะชำระ</span><span class="val">${p?.status==='paid'?'<span class="badge b-delivered">✓ ชำระแล้ว</span>':'<span class="badge b-pending">⏳ รอ</span>'}</span></div>
        ${p?.confirmed_at ? `<div class="info-row"><span class="lbl">ยืนยันเมื่อ</span><span class="val" style="font-size:10px">${new Date(p.confirmed_at).toLocaleString('th-TH')}</span></div>` : ''}
      </div>
    </div>

    <!-- AMOUNT -->
    <div class="section">
      <div class="section-head"><h3>💰 ยอดรวม</h3></div>
      <div class="section-body">
        <div class="summary-row"><span>ราคาสินค้า</span><span style="font-family:'DM Mono',monospace">฿${Number(o.subtotal).toLocaleString()}</span></div>
        ${Number(o.discount)>0?`<div class="summary-row" style="color:var(--green)"><span>ส่วนลด</span><span style="font-family:'DM Mono',monospace">-฿${Number(o.discount).toLocaleString()}</span></div>`:''}
        <div class="summary-row"><span>ค่าจัดส่ง</span><span style="font-family:'DM Mono',monospace">${Number(o.shipping_fee)===0?'ฟรี':'฿'+Number(o.shipping_fee).toLocaleString()}</span></div>
        <div class="summary-row summary-total"><span>ยอดรวม</span><span style="font-family:'DM Mono',monospace">฿${Number(o.total).toLocaleString()}</span></div>
      </div>
    </div>
  `;

  document.getElementById('page-content').innerHTML = `<div>${leftHTML}</div><div>${rightHTML}</div>`;
}

// ─── ACTIONS ───────────────────────────────────────────────

async function confirmPayment(){
  if (!confirm('ยืนยันการรับชำระเงินสำหรับออเดอร์นี้?')) return;
  const { data:{ user } } = await sb.auth.getUser();
  try {
    if (_payment) {
      await sb.from('payments').update({status:'paid', confirmed_at: new Date().toISOString()}).eq('id', _payment.id);
    }
    await sb.from('orders').update({
      status:'paid',
      payment_confirmed_at: new Date().toISOString(),
      payment_confirmed_by: user?.id || null
    }).eq('id', _order.id);
    await sb.from('order_tracking').insert({
      order_id: _order.id, status: 'paid',
      description: 'ชำระเงินสำเร็จ — ตรวจสอบโดย admin'
    });
    await sb.from('notifications').insert({
      user_id: _order.user_id, type:'order',
      title: 'ชำระเงินยืนยันแล้ว ✅',
      message: `ออเดอร์ ${_order.order_number} ของคุณยืนยันแล้ว ร้านค้ากำลังเตรียมพัสดุ`,
      link:'order-history.html', icon:'✅', is_read:false
    });
    alert('✓ ยืนยันการชำระเงินแล้ว');
    location.reload();
  } catch(e) { alert('Error: '+e.message); }
}

async function setStatus(newStatus){
  const labels = {preparing:'เตรียมพัสดุ',shipping:'กำลังจัดส่ง',delivered:'ส่งสำเร็จ',cancelled:'ยกเลิก'};
  if (!confirm(`เปลี่ยนสถานะเป็น "${labels[newStatus]||newStatus}"?`)) return;
  try {
    const upd = {status: newStatus};
    if (newStatus==='delivered') upd.delivered_at = new Date().toISOString();
    if (newStatus==='shipping') upd.shipped_at = new Date().toISOString();
    await sb.from('orders').update(upd).eq('id', _order.id);
    await sb.from('order_tracking').insert({
      order_id: _order.id, status: newStatus,
      description: 'อัปเดตโดย admin: ' + (labels[newStatus]||newStatus)
    });
    await sb.from('notifications').insert({
      user_id: _order.user_id, type:'order',
      title: `อัปเดตสถานะ: ${labels[newStatus]||newStatus}`,
      message: `ออเดอร์ ${_order.order_number} ${labels[newStatus]||newStatus}แล้ว`,
      link: 'tracking.html?order='+_order.order_number, icon:'📦', is_read:false
    });
    location.reload();
  } catch(e) { alert('Error: '+e.message); }
}

async function updateShipping(){
  const carrierCode = document.getElementById('ship-carrier').value;
  const trackingNo = document.getElementById('ship-tracking').value.trim();
  const note = document.getElementById('ship-note').value.trim();
  if (!carrierCode){ alert('กรุณาเลือกผู้ให้บริการขนส่ง'); return; }
  if (!trackingNo){ alert('กรุณากรอกเลข tracking'); return; }

  const carrier = _shipProviders.find(p=>p.code===carrierCode);
  try {
    await sb.from('orders').update({
      tracking_no: trackingNo,
      carrier: carrier?.name || carrierCode,
      shipped_at: _order.shipped_at || new Date().toISOString(),
      status: 'shipping'
    }).eq('id', _order.id);
    await sb.from('order_tracking').insert({
      order_id: _order.id, status: 'shipping',
      description: note || `จัดส่งโดย ${carrier?.name||carrierCode}`,
      carrier: carrier?.name || carrierCode,
      tracking_no: trackingNo
    });
    await sb.from('notifications').insert({
      user_id: _order.user_id, type:'order',
      title: '📦 พัสดุของคุณกำลังจัดส่ง!',
      message: `${carrier?.name||carrierCode} · เลขติดตาม: ${trackingNo}`,
      link: 'tracking.html?order='+_order.order_number, icon:'🚚', is_read:false
    });
    alert('✓ บันทึกข้อมูลขนส่งแล้ว');
    location.reload();
  } catch(e) { alert('Error: '+e.message); }
}

async function cancelOrder(){
  const reason = prompt('เหตุผลการยกเลิก:');
  if (!reason) return;
  try {
    await sb.from('orders').update({status:'cancelled', admin_notes:reason}).eq('id', _order.id);
    await sb.from('order_tracking').insert({
      order_id: _order.id, status: 'cancelled',
      description: 'ยกเลิกโดย admin: ' + reason
    });
    await sb.from('notifications').insert({
      user_id: _order.user_id, type:'order',
      title: '❌ ออเดอร์ถูกยกเลิก',
      message: `${_order.order_number} ถูกยกเลิก เหตุผล: ${reason}`,
      link:'order-history.html', icon:'❌', is_read:false
    });
    location.reload();
  } catch(e) { alert('Error: '+e.message); }
}

load();
</script>
